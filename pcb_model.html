<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Модель Платы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            color: white;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            z-index: 100;
            max-width: 300px;
        }
        
        #info h2 {
            margin-bottom: 10px;
            color: #4fc3f7;
        }
        
        #info p {
            font-size: 14px;
            line-height: 1.5;
            opacity: 0.9;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        
        button {
            background: linear-gradient(45deg, #2196f3, #21cbf3);
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.5);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #4fc3f7;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="info">
            <h2>🖥️ 3D Модель Платы</h2>
            <p>Интерактивная модель печатной платы с компонентами. Используйте мышь для вращения, масштабирования и перемещения.</p>
        </div>
        <div id="controls">
            <button onclick="resetView()">Сброс вида</button>
            <button onclick="toggleAnimation()">Анимация</button>
            <button onclick="changeColor()">Цвет платы</button>
        </div>
        <div class="loading" id="loading">Загрузка 3D сцены...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        let scene, camera, renderer, controls;
        let pcbBoard, components = [];
        let isAnimating = true;
        let boardColors = ['#1a472a', '#2d5a3d', '#3d6b4f', '#1e3a2f'];
        let currentColorIndex = 0;
        
        function init() {
            // Сцена
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            // Камера
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 6, 8);
            
            // Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('container').appendChild(renderer.domElement);
            
            // Контролы
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            
            // Освещение
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            const pointLight = new THREE.PointLight(0x4fc3f7, 0.5);
            pointLight.position.set(-5, 5, -5);
            scene.add(pointLight);
            
            // Создаем плату
            createPCBBoard();
            
            // Добавляем компоненты
            addComponents();
            
            // Убираем индикатор загрузки
            document.getElementById('loading').style.display = 'none';
            
            // Обработчик изменения размера окна
            window.addEventListener('resize', onWindowResize);
            
            // Запуск анимации
            animate();
        }
        
        function createPCBBoard() {
            // Основная плата
            const geometry = new THREE.BoxGeometry(6, 0.2, 4);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x1a472a,
                roughness: 0.7,
                metalness: 0.1
            });
            
            pcbBoard = new THREE.Mesh(geometry, material);
            pcbBoard.castShadow = true;
            pcbBoard.receiveShadow = true;
            scene.add(pcbBoard);
            
            // Добавляем текстурные линии (дорожки)
            addCircuitTraces();
        }
        
        function addCircuitTraces() {
            const traceMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xd4af37,
                roughness: 0.3,
                metalness: 0.8
            });
            
            // Горизонтальные дорожки
            for (let i = -2.5; i <= 2.5; i += 0.8) {
                const traceGeo = new THREE.BoxGeometry(5.8, 0.05, 0.1);
                const trace = new THREE.Mesh(traceGeo, traceMaterial);
                trace.position.set(i, 0.12, 0);
                trace.rotation.y = Math.random() * Math.PI;
                pcbBoard.add(trace);
            }
            
            // Вертикальные дорожки
            for (let i = -1.5; i <= 1.5; i += 0.6) {
                const traceGeo = new THREE.BoxGeometry(0.1, 0.05, 3.8);
                const trace = new THREE.Mesh(traceGeo, traceMaterial);
                trace.position.set(0, 0.12, i);
                trace.rotation.y = Math.random() * Math.PI;
                pcbBoard.add(trace);
            }
        }
        
        function addComponents() {
            // Процессор/Чип
            const chipGeometry = new THREE.BoxGeometry(1.5, 0.3, 1.5);
            const chipMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x2c3e50,
                roughness: 0.4,
                metalness: 0.6
            });
            const chip = new THREE.Mesh(chipGeometry, chipMaterial);
            chip.position.set(0, 0.25, 0);
            chip.castShadow = true;
            pcbBoard.add(chip);
            components.push(chip);
            
            // Контакты чипа
            for (let i = -0.6; i <= 0.6; i += 0.2) {
                const pinGeo = new THREE.BoxGeometry(0.1, 0.15, 0.05);
                const pinMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.9 });
                
                // Верхние контакты
                const pin1 = new THREE.Mesh(pinGeo, pinMat);
                pin1.position.set(i, 0.25, 0.77);
                pcbBoard.add(pin1);
                
                // Нижние контакты
                const pin2 = new THREE.Mesh(pinGeo, pinMat);
                pin2.position.set(i, 0.25, -0.77);
                pcbBoard.add(pin2);
                
                // Левые контакты
                const pin3 = new THREE.Mesh(pinGeo, pinMat);
                pin3.position.set(-0.77, 0.25, i);
                pin3.rotation.y = Math.PI / 2;
                pcbBoard.add(pin3);
                
                // Правые контакты
                const pin4 = new THREE.Mesh(pinGeo, pinMat);
                pin4.position.set(0.77, 0.25, i);
                pin4.rotation.y = Math.PI / 2;
                pcbBoard.add(pin4);
            }
            
            // Конденсаторы
            const capacitorGeometry = new THREE.CylinderGeometry(0.2, 0.2, 0.4, 16);
            const capacitorMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x34495e,
                roughness: 0.5
            });
            
            const capacitorPositions = [
                [-2, 0.3, 1], [2, 0.3, 1], [-2, 0.3, -1], [2, 0.3, -1]
            ];
            
            capacitorPositions.forEach(pos => {
                const capacitor = new THREE.Mesh(capacitorGeometry, capacitorMaterial);
                capacitor.position.set(...pos);
                capacitor.castShadow = true;
                pcbBoard.add(capacitor);
                components.push(capacitor);
            });
            
            // Резисторы
            const resistorGeometry = new THREE.CylinderGeometry(0.08, 0.08, 0.3, 8);
            const resistorMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x8e44ad,
                roughness: 0.6
            });
            
            for (let i = -1.5; i <= 1.5; i += 0.5) {
                const resistor = new THREE.Mesh(resistorGeometry, resistorMaterial);
                resistor.position.set(i, 0.25, 1.5);
                resistor.rotation.z = Math.PI / 2;
                resistor.castShadow = true;
                pcbBoard.add(resistor);
                components.push(resistor);
                
                const resistor2 = new THREE.Mesh(resistorGeometry, resistorMaterial);
                resistor2.position.set(i, 0.25, -1.5);
                resistor2.rotation.z = Math.PI / 2;
                resistor2.castShadow = true;
                pcbBoard.add(resistor2);
                components.push(resistor2);
            }
            
            // Разъемы
            const connectorGeometry = new THREE.BoxGeometry(0.8, 0.4, 0.3);
            const connectorMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xf39c12,
                roughness: 0.4,
                metalness: 0.3
            });
            
            const connectorPositions = [
                [-2.8, 0.3, 0], [2.8, 0.3, 0]
            ];
            
            connectorPositions.forEach(pos => {
                const connector = new THREE.Mesh(connectorGeometry, connectorMaterial);
                connector.position.set(...pos);
                connector.castShadow = true;
                pcbBoard.add(connector);
                components.push(connector);
            });
            
            // Светодиоды
            const ledGeometry = new THREE.SphereGeometry(0.15, 16, 16);
            const ledMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xe74c3c,
                emissive: 0xe74c3c,
                emissiveIntensity: 0.5
            });
            
            const ledPositions = [
                [-1, 0.4, 1.8], [0, 0.4, 1.8], [1, 0.4, 1.8]
            ];
            
            ledPositions.forEach((pos, index) => {
                const led = new THREE.Mesh(ledGeometry, ledMaterial);
                led.position.set(...pos);
                led.castShadow = true;
                pcbBoard.add(led);
                components.push(led);
                
                // Анимация мерцания для светодиодов
                if (index % 2 === 0) {
                    led.userData = { originalY: pos[1], speed: 0.02 + Math.random() * 0.02 };
                }
            });
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (isAnimating) {
                // Вращение платы
                pcbBoard.rotation.y += 0.005;
                
                // Анимация светодиодов
                components.forEach(component => {
                    if (component.userData && component.userData.originalY) {
                        component.position.y = component.userData.originalY + 
                            Math.sin(Date.now() * component.userData.speed) * 0.1;
                    }
                });
            }
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        function resetView() {
            camera.position.set(8, 6, 8);
            controls.reset();
            pcbBoard.rotation.set(0, 0, 0);
        }
        
        function toggleAnimation() {
            isAnimating = !isAnimating;
        }
        
        function changeColor() {
            currentColorIndex = (currentColorIndex + 1) % boardColors.length;
            pcbBoard.material.color.set(boardColors[currentColorIndex]);
        }
        
        // Инициализация после загрузки страницы
        window.addEventListener('load', init);
    </script>
</body>
</html>
