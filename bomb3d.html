<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Bomb - 3D Interactive Model</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        h1 {
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 165, 0, 0.5);
            margin-bottom: 20px;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }
        
        #canvas-container {
            position: relative;
            width: 800px;
            height: 600px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        0 0 40px rgba(255, 165, 0, 0.2);
        }
        
        canvas {
            display: block;
            background: radial-gradient(circle at center, #2a2a4a 0%, #1a1a2e 100%);
        }
        
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            padding: 12px 25px;
            background: linear-gradient(45deg, #ff6b35, #ff8c42);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.5);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .instructions {
            color: #aaa;
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
        
        .timer {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            color: #ff4444;
            font-size: 2rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            border: 2px solid #ff4444;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }
    </style>
</head>
<body>
    <h1>COUNTER-STRIKE 2 BOMB</h1>
    
    <div id="canvas-container">
        <canvas id="bombCanvas"></canvas>
        <div class="timer" id="timer">00:00</div>
    </div>
    
    <div class="controls">
        <button class="btn" onclick="plantBomb()">Plant Bomb</button>
        <button class="btn" onclick="defuseBomb()">Defuse</button>
        <button class="btn" onclick="resetBomb()">Reset</button>
        <button class="btn" onclick="toggleAutoRotate()">Auto Rotate</button>
    </div>
    
    <p class="instructions">
        🖱️ Left-click + drag to rotate • Scroll to zoom • Right-click + drag to pan
    </p>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const canvas = document.getElementById('bombCanvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        
        // Camera position
        camera.position.z = 5;
        camera.position.y = 2;
        camera.lookAt(0, 0, 0);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 5, 5);
        directionalLight.castShadow = true;
        scene.add(directionalLight);
        
        const pointLight1 = new THREE.PointLight(0xff6b35, 0.5, 10);
        pointLight1.position.set(-2, 2, 2);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0x4444ff, 0.3, 10);
        pointLight2.position.set(2, -2, -2);
        scene.add(pointLight2);
        
        // Bomb group
        const bombGroup = new THREE.Group();
        scene.add(bombGroup);
        
        // Create bomb materials
        const mainMaterial = new THREE.MeshStandardMaterial({
            color: 0xd4af37,
            metalness: 0.8,
            roughness: 0.3,
        });
        
        const darkMaterial = new THREE.MeshStandardMaterial({
            color: 0x2a2a2a,
            metalness: 0.6,
            roughness: 0.4,
        });
        
        const screenMaterial = new THREE.MeshStandardMaterial({
            color: 0x00ff00,
            emissive: 0x00ff00,
            emissiveIntensity: 0.5,
        });
        
        const buttonMaterial = new THREE.MeshStandardMaterial({
            color: 0xff4444,
            metalness: 0.7,
            roughness: 0.2,
        });
        
        const wireMaterial = new THREE.MeshStandardMaterial({
            color: 0x333333,
            metalness: 0.5,
            roughness: 0.6,
        });
        
        // Main bomb body
        const mainGeometry = new THREE.BoxGeometry(2, 1.2, 1);
        const mainBody = new THREE.Mesh(mainGeometry, mainMaterial);
        mainBody.castShadow = true;
        mainBody.receiveShadow = true;
        bombGroup.add(mainBody);
        
        // Side panels
        const sidePanelGeometry = new THREE.BoxGeometry(0.1, 1.3, 1.1);
        const leftPanel = new THREE.Mesh(sidePanelGeometry, darkMaterial);
        leftPanel.position.x = -1.05;
        leftPanel.castShadow = true;
        bombGroup.add(leftPanel);
        
        const rightPanel = new THREE.Mesh(sidePanelGeometry, darkMaterial);
        rightPanel.position.x = 1.05;
        rightPanel.castShadow = true;
        bombGroup.add(rightPanel);
        
        // Digital screen
        const screenGeometry = new THREE.PlaneGeometry(0.8, 0.4);
        const screen = new THREE.Mesh(screenGeometry, screenMaterial);
        screen.position.set(0, 0.3, 0.51);
        bombGroup.add(screen);
        
        // Screen frame
        const screenFrameGeometry = new THREE.BoxGeometry(0.9, 0.5, 0.05);
        const screenFrame = new THREE.Mesh(screenFrameGeometry, darkMaterial);
        screenFrame.position.set(0, 0.3, 0.53);
        bombGroup.add(screenFrame);
        
        // Buttons
        const buttonGeometry = new THREE.CylinderGeometry(0.08, 0.08, 0.05, 16);
        
        const button1 = new THREE.Mesh(buttonGeometry, buttonMaterial);
        button1.rotation.x = Math.PI / 2;
        button1.position.set(-0.3, -0.2, 0.53);
        bombGroup.add(button1);
        
        const button2 = new THREE.Mesh(buttonGeometry, buttonMaterial);
        button2.rotation.x = Math.PI / 2;
        button2.position.set(0, -0.2, 0.53);
        bombGroup.add(button2);
        
        const button3 = new THREE.Mesh(buttonGeometry, buttonMaterial);
        button3.rotation.x = Math.PI / 2;
        button3.position.set(0.3, -0.2, 0.53);
        bombGroup.add(button3);
        
        // Antenna
        const antennaGeometry = new THREE.CylinderGeometry(0.02, 0.02, 0.8, 8);
        const antenna = new THREE.Mesh(antennaGeometry, darkMaterial);
        antenna.position.set(0.5, 0.8, 0);
        antenna.rotation.z = -0.2;
        bombGroup.add(antenna);
        
        // Antenna tip
        const antennaTipGeometry = new THREE.SphereGeometry(0.04, 8, 8);
        const antennaTip = new THREE.Mesh(antennaTipGeometry, 
            new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.3 }));
        antennaTip.position.set(0.5, 1.2, 0);
        bombGroup.add(antennaTip);
        
        // Wires
        function createWire(startPos, endPos, color) {
            const points = [];
            const segments = 20;
            
            for (let i = 0; i <= segments; i++) {
                const t = i / segments;
                const x = startPos.x + (endPos.x - startPos.x) * t;
                const y = startPos.y + (endPos.y - startPos.y) * t + Math.sin(t * Math.PI) * 0.1;
                const z = startPos.z + (endPos.z - startPos.z) * t + Math.cos(t * Math.PI * 2) * 0.05;
                points.push(new THREE.Vector3(x, y, z));
            }
            
            const curve = new THREE.CatmullRomCurve3(points);
            const tubeGeometry = new THREE.TubeGeometry(curve, 20, 0.015, 8, false);
            const wireMat = new THREE.MeshStandardMaterial({ 
                color: color,
                metalness: 0.3,
                roughness: 0.7
            });
            const wire = new THREE.Mesh(tubeGeometry, wireMat);
            return wire;
        }
        
        const wire1 = createWire(
            {x: -0.5, y: 0, z: 0.5},
            {x: 0.3, y: 0.4, z: 0.3},
            0xff0000
        );
        bombGroup.add(wire1);
        
        const wire2 = createWire(
            {x: -0.3, y: -0.1, z: 0.5},
            {x: 0.5, y: 0.2, z: 0.3},
            0x00ff00
        );
        bombGroup.add(wire2);
        
        const wire3 = createWire(
            {x: 0, y: -0.1, z: 0.5},
            {x: 0.4, y: 0.6, z: 0.3},
            0x0000ff
        );
        bombGroup.add(wire3);
        
        // Straps/bands
        const strapGeometry = new THREE.TorusGeometry(1.1, 0.05, 8, 32);
        const strapMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a1a1a,
            metalness: 0.4,
            roughness: 0.8,
        });
        
        const strap1 = new THREE.Mesh(strapGeometry, strapMaterial);
        strap1.rotation.y = Math.PI / 2;
        strap1.position.x = -0.6;
        bombGroup.add(strap1);
        
        const strap2 = new THREE.Mesh(strapGeometry, strapMaterial);
        strap2.rotation.y = Math.PI / 2;
        strap2.position.x = 0.6;
        bombGroup.add(strap2);
        
        // Ground plane
        const groundGeometry = new THREE.PlaneGeometry(20, 20);
        const groundMaterial = new THREE.MeshStandardMaterial({
            color: 0x333333,
            metalness: 0.5,
            roughness: 0.8,
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -1;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Mouse controls
        let isDragging = false;
        let isRightDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let autoRotate = true;
        let rotationSpeed = 0.005;
        
        // Timer variables
        let timerInterval = null;
        let timeLeft = 0;
        let isPlanted = false;
        
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isDragging = true;
            } else if (e.button === 2) {
                isRightDragging = true;
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;
                
                bombGroup.rotation.y += deltaX * rotationSpeed;
                bombGroup.rotation.x += deltaY * rotationSpeed;
                
                autoRotate = false;
            }
            
            if (isRightDragging) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;
                
                camera.position.x -= deltaX * 0.01;
                camera.position.y += deltaY * 0.01;
                camera.lookAt(0, 0, 0);
            }
            
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });
        
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
            isRightDragging = false;
        });
        
        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
            isRightDragging = false;
        });
        
        canvas.addEventListener('wheel', (e) => {
            camera.position.z += e.deltaY * 0.005;
            camera.position.z = Math.max(2, Math.min(10, camera.position.z));
        });
        
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });
        
        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                previousMousePosition = {
                    x: e.touches[0].clientX,
                    y: e.touches[0].clientY
                };
            }
        });
        
        canvas.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                const deltaX = e.touches[0].clientX - previousMousePosition.x;
                const deltaY = e.touches[0].clientY - previousMousePosition.y;
                
                bombGroup.rotation.y += deltaX * rotationSpeed;
                bombGroup.rotation.x += deltaY * rotationSpeed;
                
                previousMousePosition = {
                    x: e.touches[0].clientX,
                    y: e.touches[0].clientY
                };
                
                autoRotate = false;
            }
        });
        
        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });
        
        // Bomb functions
        function plantBomb() {
            if (isPlanted) return;
            
            isPlanted = true;
            timeLeft = 40; // 40 seconds countdown
            
            // Animate bomb planting
            const plantAnimation = setInterval(() => {
                bombGroup.position.y -= 0.05;
                if (bombGroup.position.y <= -0.5) {
                    clearInterval(plantAnimation);
                    startTimer();
                }
            }, 16);
            
            // Flash screen red
            screenMaterial.color.setHex(0xff0000);
            screenMaterial.emissive.setHex(0xff0000);
        }
        
        function startTimer() {
            const timerElement = document.getElementById('timer');
            
            timerInterval = setInterval(() => {
                timeLeft--;
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                // Blink when low on time
                if (timeLeft <= 10) {
                    screenMaterial.emissiveIntensity = timeLeft % 2 === 0 ? 1 : 0.3;
                }
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    explode();
                }
            }, 1000);
        }
        
        function defuseBomb() {
            if (!isPlanted || timeLeft <= 0) return;
            
            clearInterval(timerInterval);
            
            // Animate defusing
            const defuseAnimation = setInterval(() => {
                screenMaterial.emissiveIntensity -= 0.1;
                if (screenMaterial.emissiveIntensity <= 0) {
                    clearInterval(defuseAnimation);
                    screenMaterial.color.setHex(0x444444);
                    screenMaterial.emissive.setHex(0x000000);
                    isPlanted = false;
                    document.getElementById('timer').textContent = '00:00';
                }
            }, 100);
        }
        
        function resetBomb() {
            clearInterval(timerInterval);
            isPlanted = false;
            timeLeft = 0;
            
            bombGroup.position.set(0, 0, 0);
            bombGroup.rotation.set(0, 0, 0);
            
            screenMaterial.color.setHex(0x00ff00);
            screenMaterial.emissive.setHex(0x00ff00);
            screenMaterial.emissiveIntensity = 0.5;
            
            document.getElementById('timer').textContent = '00:00';
            autoRotate = true;
        }
        
        function explode() {
            // Flash effect
            const flash = new THREE.PointLight(0xffaa00, 5, 10);
            flash.position.set(0, 0, 0);
            scene.add(flash);
            
            setTimeout(() => {
                scene.remove(flash);
                resetBomb();
            }, 500);
        }
        
        function toggleAutoRotate() {
            autoRotate = !autoRotate;
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            if (autoRotate && !isPlanted) {
                bombGroup.rotation.y += rotationSpeed;
            }
            
            // Subtle floating animation
            if (!isPlanted) {
                bombGroup.position.y = Math.sin(Date.now() * 0.001) * 0.05;
            }
            
            renderer.render(scene, camera);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            camera.aspect = canvas.width / canvas.height;
            camera.updateProjectionMatrix();
            renderer.setSize(canvas.width, canvas.height);
        });
        
        animate();
    </script>
</body>
</html>
