<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Платформер: Путь Памяти</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
            z-index: 10;
        }
        #restart-btn {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 20px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 20;
        }
        #win-screen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 30px;
            background: #2ed573;
            color: white;
            border-radius: 10px;
            z-index: 20;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="info">Уровень: <span id="level-display">1</span><br>Найди безопасную платформу!</div>
<button id="restart-btn" onclick="resetGame()">Попробовать снова</button>
<div id="win-screen">ПОБЕДА!<br><small>Ты прошел все испытания</small><br><button onclick="location.reload()" style="margin-top:10px; padding:10px; cursor:pointer;">Играть заново</button></div>

<!-- Подключаем Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- НАСТРОЙКИ ИГРЫ ---
    const PLAYER_SPEED = 0.15;
    const JUMP_FORCE = 0.25;
    const GRAVITY = 0.012;
    const TOTAL_LEVELS = 5;

    let scene, camera, renderer;
    let player;
    let platforms = [];
    let obstacles = []; // Смертельные платформы
    let finishZone;
    
    // Физика игрока
    let velocity = new THREE.Vector3(0, 0, 0);
    let isGrounded = false;
    let keys = { w: false, a: false, s: false, d: false, space: false };
    
    let currentLevel = 1;
    let isGameOver = false;
    let safePathIndex = 0; // 0 = слева, 1 = справа

    // Элементы UI
    const levelDisplay = document.getElementById('level-display');
    const restartBtn = document.getElementById('restart-btn');
    const winScreen = document.getElementById('win-screen');

    function init() {
        // Сцена
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Небо
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

        // Камера
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        // Рендерер
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Свет
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        scene.add(dirLight);

        createPlayer();
        loadLevel(1);

        // Обработчики событий
        window.addEventListener('resize', onWindowResize, false);
        document.addEventListener('keydown', (e) => handleKey(e, true));
        document.addEventListener('keyup', (e) => handleKey(e, false));

        animate();
    }

    function createPlayer() {
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
        player = new THREE.Mesh(geometry, material);
        player.castShadow = true;
        player.position.y = 2;
        scene.add(player);
    }

    function clearLevel() {
        // Удаляем старые платформы
        platforms.forEach(p => scene.remove(p.mesh));
        obstacles.forEach(o => scene.remove(o.mesh));
        if (finishZone) scene.remove(finishZone);
        
        platforms = [];
        obstacles = [];
        finishZone = null;
        
        // Сброс позиции игрока
        player.position.set(0, 2, 0);
        velocity.set(0, 0, 0);
        isGameOver = false;
        restartBtn.style.display = 'none';
    }

    function loadLevel(level) {
        clearLevel();
        currentLevel = level;
        levelDisplay.innerText = currentLevel;

        // Стартовая платформа (безопасная)
        createPlatform(0, 0, 0, 4, 1, 4, 0xaaaaaa);

        // Генерация выбора пути
        const gapZ = 6; // Расстояние до развилки
        const platformZ = -gapZ;
        const leftX = -3;
        const rightX = 3;
        const platWidth = 2.5;
        const platDepth = 4;

        // Случайно выбираем, какая платформа безопасна (0 - лево, 1 - право)
        safePathIndex = Math.random() < 0.5 ? 0 : 1;

        // Цвета для визуального обмана (они выглядят одинаково опасно или нормально)
        const colorSafe = 0x4CAF50; // Зеленый (но игрок не знает этого заранее)
        const colorDeadly = 0xF44336; // Красный
        
        // Для сложности сделаем их визуально похожими на стартовую или нейтральными, 
        // но в этой версии мы сделаем их разными цветами для наглядности механики,
        // либо можно сделать их одинаковыми серыми для хардкора.
        // Давайте сделаем их ОДИНАКОВЫМИ серыми, чтобы игрок гадал.
        const neutralColor = 0x888888;

        // Левая платформа
        createPlatform(leftX, 0, platformZ, platWidth, 1, platDepth, neutralColor, safePathIndex === 0);
        // Правая платформа
        createPlatform(rightX, 0, platformZ, platWidth, 1, platDepth, neutralColor, safePathIndex === 1);

        // Финишная зона (если это последний уровень) или переход
        if (currentLevel >= TOTAL_LEVELS) {
            createFinishZone(0, 0.5, platformZ - 4);
        } else {
            // Мостик к следующему уровню (условно)
            // Для простоты, если выжил на развилке - победа в раунде, рестарт уровня но сложнее?
            // Или просто бесконечная генерация?
            // Сделаем так: Выбрал правильно -> Появляется финиш чуть дальше.
            
            const finishZ = platformZ - 3;
            createFinishZone(0, 0.5, finishZ);
        }
    }

    function createPlatform(x, y, z, w, h, d, color, isSafe = true) {
        const geometry = new THREE.BoxGeometry(w, h, d);
        const material = new THREE.MeshStandardMaterial({ color: color });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(x, y - 0.5, z); // Корректировка, чтобы верх был на y
        mesh.receiveShadow = true;
        mesh.castShadow = true;
        
        scene.add(mesh);
        
        const data = {
            mesh: mesh,
            box: new THREE.Box3().setFromObject(mesh),
            isSafe: isSafe,
            type: 'platform'
        };

        if (isSafe) {
            platforms.push(data);
        } else {
            obstacles.push(data);
            // Добавим визуальный маркер опасности (например, шипы или красный свет снизу), 
            // но в задании сказано "игрок должен запоминать/угадывать", значит визуальных подсказок быть не должно.
            // Оставим его серым.
        }
    }

    function createFinishZone(x, y, z) {
        const geometry = new THREE.CylinderGeometry(1.5, 1.5, 0.2, 32);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xFFFF00, 
            emissive: 0xFFAA00,
            transparent: true,
            opacity: 0.8
        });
        finishZone = new THREE.Mesh(geometry, material);
        finishZone.position.set(x, y, z);
        finishZone.rotation.x = Math.PI / 2;
        scene.add(finishZone);
        
        // Добавим светящийся столб
        const light = new THREE.PointLight(0xFFFF00, 1, 10);
        light.position.set(x, 2, z);
        scene.add(light);
    }

    function handleKey(e, isPressed) {
        const key = e.code;
        if (key === 'KeyW' || key === 'ArrowUp') keys.w = isPressed;
        if (key === 'KeyA' || key === 'ArrowLeft') keys.a = isPressed;
        if (key === 'KeyS' || key === 'ArrowDown') keys.s = isPressed;
        if (key === 'KeyD' || key === 'ArrowRight') keys.d = isPressed;
        if (key === 'Space') {
            if (isPressed && !keys.space && isGrounded) {
                velocity.y = JUMP_FORCE;
                isGrounded = false;
            }
            keys.space = isPressed;
        }
    }

    function updatePhysics() {
        if (isGameOver) return;

        // Движение по X и Z
        if (keys.w) player.position.z -= PLAYER_SPEED;
        if (keys.s) player.position.z += PLAYER_SPEED;
        if (keys.a) player.position.x -= PLAYER_SPEED;
        if (keys.d) player.position.x += PLAYER_SPEED;

        // Гравитация
        velocity.y -= GRAVITY;
        player.position.y += velocity.y;

        // Проверка коллизий с полом
        isGrounded = false;
        const playerBox = new THREE.Box3().setFromObject(player);
        // Уменьшим хитбокс игрока немного для честности
        playerBox.expandByScalar(-0.2); 

        // Проверка безопасных платформ
        for (let p of platforms) {
            if (playerBox.intersectsBox(p.box)) {
                // Если мы падаем сверху
                if (velocity.y <= 0 && player.position.y > p.mesh.position.y + 0.5) {
                    player.position.y = p.mesh.position.y + 1; // Ставим на поверхность
                    velocity.y = 0;
                    isGrounded = true;
                }
            }
        }

        // Проверка смертельных платформ
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            if (playerBox.intersectsBox(obs.box)) {
                // Если коснулись плохой платформы
                triggerDeath(obs);
                break;
            }
        }

        // Проверка падения в бездну
        if (player.position.y < -10) {
            triggerDeath(null);
        }

        // Проверка финиша
        if (finishZone) {
            const dist = player.position.distanceTo(finishZone.position);
            if (dist < 1.5) {
                levelComplete();
            }
        }

        // Камера следует за игроком
        camera.position.x = player.position.x;
        camera.position.z = player.position.z + 10;
        camera.lookAt(player.position.x, player.position.y, player.position.z - 5);
    }

    function triggerDeath(obstacleObj) {
        isGameOver = true;
        
        // Эффект смерти
        if (obstacleObj) {
            obstacleObj.mesh.material.color.setHex(0xFF0000); // Становится красной
            // Можно добавить анимацию исчезновения
            let disappearInterval = setInterval(() => {
                obstacleObj.mesh.scale.multiplyScalar(0.9);
                if (obstacleObj.mesh.scale.x < 0.1) {
                    clearInterval(disappearInterval);
                    scene.remove(obstacleObj.mesh);
                }
            }, 50);
        }

        setTimeout(() => {
            restartBtn.style.display = 'block';
        }, 500);
    }

    function levelComplete() {
        if (currentLevel >= TOTAL_LEVELS) {
            winScreen.style.display = 'block';
            isGameOver = true;
        } else {
            // Переход на следующий уровень
            currentLevel++;
            // Небольшая задержка перед загрузкой
            setTimeout(() => {
                loadLevel(currentLevel);
            }, 200);
        }
    }

    function resetGame() {
        loadLevel(1);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        updatePhysics();
        renderer.render(scene, camera);
    }

    // Запуск
    init();

</script>
</body>
</html>
