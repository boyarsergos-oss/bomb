<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Изометрическая Сцена</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
        }
        #info h3 {
            margin-bottom: 10px;
        }
        #info p {
            margin: 5px 0;
            font-size: 14px;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>Управление</h3>
        <p>W / Стрелка вверх - Вперёд</p>
        <p>S / Стрелка вниз - Назад</p>
        <p>A / Стрелка влево - Влево</p>
        <p>D / Стрелка вправо - Вправо</p>
        <p>ЛКМ / Пробел - Стрелять краской</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Инициализация сцены
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        // Камера с изометрической проекцией (ортографическая)
        const aspect = window.innerWidth / window.innerHeight;
        const d = 20;
        const camera = new THREE.OrthographicCamera(
            -d * aspect, d * aspect, d, -d, 1, 1000
        );
        
        // Изометрический угол
        camera.position.set(20, 20, 20);
        camera.lookAt(scene.position);

        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        // Земля (плоскость)
        const groundGeometry = new THREE.PlaneGeometry(50, 50);
        const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x3a7d3a });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Сетка на земле
        const gridHelper = new THREE.GridHelper(50, 10, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Создаём персонажа (группа объектов)
        const player = new THREE.Group();

        // Тело
        const bodyGeometry = new THREE.BoxGeometry(1, 1.5, 0.6);
        const bodyMaterial = new THREE.MeshLambertMaterial({ color: 0xff6b6b });
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        body.position.y = 0.75;
        body.castShadow = true;
        player.add(body);

        // Голова
        const headGeometry = new THREE.BoxGeometry(0.7, 0.7, 0.7);
        const headMaterial = new THREE.MeshLambertMaterial({ color: 0xffccaa });
        const head = new THREE.Mesh(headGeometry, headMaterial);
        head.position.y = 1.85;
        head.castShadow = true;
        player.add(head);

        // Ноги
        const legGeometry = new THREE.BoxGeometry(0.3, 0.7, 0.3);
        const legMaterial = new THREE.MeshLambertMaterial({ color: 0x4a4a4a });
        
        const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
        leftLeg.position.set(-0.25, 0.35, 0);
        leftLeg.castShadow = true;
        player.add(leftLeg);

        const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
        rightLeg.position.set(0.25, 0.35, 0);
        rightLeg.castShadow = true;
        player.add(rightLeg);

        scene.add(player);

        // Добавим несколько декоративных объектов
        function createTree(x, z) {
            const treeGroup = new THREE.Group();
            
            // Ствол
            const trunkGeometry = new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8);
            const trunkMaterial = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = 0.75;
            trunk.castShadow = true;
            treeGroup.add(trunk);

            // Крона
            const leavesGeometry = new THREE.ConeGeometry(1, 2, 8);
            const leavesMaterial = new THREE.MeshLambertMaterial({ color: 0x228b22 });
            const leaves = new THREE.Mesh(leavesGeometry, leavesMaterial);
            leaves.position.y = 2.5;
            leaves.castShadow = true;
            treeGroup.add(leaves);

            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);
        }

        // Создаём несколько деревьев
        createTree(-8, -8);
        createTree(8, -6);
        createTree(-6, 8);
        createTree(7, 7);
        createTree(-10, 5);
        createTree(10, -10);

        // Добавим камни
        function createRock(x, z) {
            const rockGeometry = new THREE.DodecahedronGeometry(0.5, 0);
            const rockMaterial = new THREE.MeshLambertMaterial({ color: 0x808080 });
            const rock = new THREE.Mesh(rockGeometry, rockMaterial);
            rock.position.set(x, 0.3, z);
            rock.scale.set(1 + Math.random() * 0.5, 0.8 + Math.random() * 0.4, 1 + Math.random() * 0.5);
            rock.castShadow = true;
            scene.add(rock);
        }

        createRock(-5, -3);
        createRock(6, 4);
        createRock(-3, 6);
        createRock(4, -8);

        // Массив для хранения следов краски
        const paintMarks = [];
        const paintColor = 0xff1493; // Ярко-розовый цвет краски
        
        // Переменные для мыши
        const mouse = new THREE.Vector2();
        let targetPoint = new THREE.Vector3(0, 0, 0);
        
        // Создаём текстуру для брызг краски (процедурно)
        function createPaintTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            // Градиент для круглой формы
            const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, 'rgba(255, 20, 147, 1)');
            gradient.addColorStop(0.5, 'rgba(255, 20, 147, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 20, 147, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 128, 128);
            
            // Добавляем случайные "брызги"
            for (let i = 0; i < 20; i++) {
                const x = Math.random() * 128;
                const y = Math.random() * 128;
                const radius = Math.random() * 8 + 2;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 20, 147, ${Math.random() * 0.5 + 0.3})`;
                ctx.fill();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }
        
        const paintTexture = createPaintTexture();
        
        // Геометрия для пятен краски (плоский круг)
        const paintGeometry = new THREE.CircleGeometry(1, 16);

        // Текущее направление персонажа (по умолчанию смотрит вниз-вправо по экрану)
        let playerDirection = new THREE.Vector3(1, 0, -1).normalize();

        // Обработка движения мыши для определения направления стрельбы
        document.addEventListener('mousemove', (event) => {
            // Нормализованные координаты мыши (-1 до +1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Создаем луч из камеры через позицию мыши
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            // Находим пересечение с землей
            const intersects = raycaster.intersectObject(ground);
            
            if (intersects.length > 0) {
                targetPoint.copy(intersects[0].point);
            }
        });

        // Функция выстрела краской
        function shootPaint() {
            // Точка начала луча - позиция игрока + смещение вверх (откуда стреляет)
            const rayOrigin = player.position.clone();
            rayOrigin.y = 1.2; // Высота "руки" или оружия

            // Направление выстрела - к точке, куда указывает курсор мыши
            const shootDirection = targetPoint.clone().sub(rayOrigin).normalize();

            // Используем Raycaster для определения попадания в землю
            const raycaster = new THREE.Raycaster(rayOrigin, shootDirection);

            const intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0) {
                const hitPoint = intersects[0].point;

                // Создаем меш с краской в точке попадания (плоский круг на земле)
                const paintMaterial = new THREE.MeshBasicMaterial({ 
                    map: paintTexture, 
                    color: paintColor,
                    transparent: true,
                    opacity: 0.95,
                    side: THREE.DoubleSide,
                    depthWrite: false
                });
                
                const paintMesh = new THREE.Mesh(paintGeometry, paintMaterial);

                paintMesh.position.copy(hitPoint);
                paintMesh.position.y += 0.01; // Чуть выше поверхности чтобы не мерцало
                
                // Поворачиваем меш чтобы он лежал на земле
                paintMesh.rotation.x = -Math.PI / 2;

                // Случайный размер пятна
                const scale = 1.2 + Math.random() * 0.8;
                paintMesh.scale.set(scale, scale, scale);

                // Случайная ориентация
                paintMesh.rotation.z = Math.random() * Math.PI * 2;

                scene.add(paintMesh);
                paintMarks.push(paintMesh);

                // Ограничиваем количество пятен (удаляем старые)
                if (paintMarks.length > 150) {
                    const oldMark = paintMarks.shift();
                    scene.remove(oldMark);
                    oldMark.geometry.dispose();
                    oldMark.material.dispose();
                }
            }

            // Добавляем эффект частиц при выстреле
            createPaintParticles(rayOrigin, shootDirection);
        }
        
        // Эффект частиц краски при выстреле
        const paintParticles = [];
        
        function createPaintParticles(origin, direction) {
            const particleCount = 8;
            const particleGeometry = new THREE.BoxGeometry(0.15, 0.15, 0.15);
            const particleMaterial = new THREE.MeshBasicMaterial({ color: paintColor });
            
            for (let i = 0; i < particleCount; i++) {
                const particle = new THREE.Mesh(particleGeometry, particleMaterial.clone());
                particle.position.copy(origin);
                
                // Случайное отклонение от направления выстрела
                particle.userData.velocity = new THREE.Vector3(
                    direction.x + (Math.random() - 0.5) * 0.3,
                    0.2 + Math.random() * 0.3,
                    direction.z + (Math.random() - 0.5) * 0.3
                );
                particle.userData.life = 1.0;
                
                scene.add(particle);
                paintParticles.push(particle);
            }
        }
        
        // Обновление частиц
        function updatePaintParticles() {
            for (let i = paintParticles.length - 1; i >= 0; i--) {
                const particle = paintParticles[i];
                particle.userData.life -= 0.03;
                
                if (particle.userData.life <= 0) {
                    scene.remove(particle);
                    particle.geometry.dispose();
                    particle.material.dispose();
                    paintParticles.splice(i, 1);
                    continue;
                }
                
                // Движение частицы
                particle.position.add(particle.userData.velocity.clone().multiplyScalar(0.4));
                particle.userData.velocity.y -= 0.02; // Гравитация
                
                // Уменьшение размера
                const scale = particle.userData.life;
                particle.scale.set(scale, scale, scale);
                
                // Поворот
                particle.rotation.x += 0.1;
                particle.rotation.y += 0.1;
            }
        }

        // Управление
        const keys = {
            w: false,
            a: false,
            s: false,
            d: false,
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };

        let isShooting = false;
        let shootCooldown = 0;
        const shootDelay = 8; // Задержка между выстрелами (чем меньше, тем быстрее)

        document.addEventListener('keydown', (event) => {
            // Обработка движения
            if (keys.hasOwnProperty(event.key)) {
                keys[event.key] = true;
            }
            // Обработка начала стрельбы (Пробел)
            if (event.code === 'Space') {
                isShooting = true;
            }
        });

        document.addEventListener('keyup', (event) => {
            // Обработка движения
            if (keys.hasOwnProperty(event.key)) {
                keys[event.key] = false;
            }
            // Остановка стрельбы при отпускании пробела
            if (event.code === 'Space') {
                isShooting = false;
            }
        });

        // Стрельба по клику мыши (начало)
        document.addEventListener('mousedown', (event) => {
            if (event.button === 0) { // Левая кнопка мыши
                isShooting = true;
            }
        });

        // Остановка стрельбы при отпускании кнопки мыши
        document.addEventListener('mouseup', (event) => {
            if (event.button === 0) { // Левая кнопка мыши
                isShooting = false;
            }
        });

        // Переменные для движения
        let walkCycle = 0;

        // Обработка изменения размера окна
        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Анимация
        function animate() {
            requestAnimationFrame(animate);

            let isMoving = false;
            const moveSpeed = 0.15;

            // Движение персонажа в изометрической проекции
            // В изометрии: 
            // - Вверх по экрану = комбинация -X и -Z
            // - Вниз по экрану = комбинация +X и +Z
            // - Влево по экрану = комбинация -X и +Z
            // - Вправо по экрану = комбинация +X и -Z
            
            if (keys.w || keys.ArrowUp) {
                // Визуально вверх по экрану
                player.position.x -= moveSpeed * Math.cos(Math.PI / 4);
                player.position.z -= moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(-1, 0, -1).normalize();
            }
            if (keys.s || keys.ArrowDown) {
                // Визуально вниз по экрану
                player.position.x += moveSpeed * Math.cos(Math.PI / 4);
                player.position.z += moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(1, 0, 1).normalize();
            }
            if (keys.a || keys.ArrowLeft) {
                // Визуально влево по экрану
                player.position.x -= moveSpeed * Math.cos(Math.PI / 4);
                player.position.z += moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(-1, 0, 1).normalize();
            }
            if (keys.d || keys.ArrowRight) {
                // Визуально вправо по экрану
                player.position.x += moveSpeed * Math.cos(Math.PI / 4);
                player.position.z -= moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(1, 0, -1).normalize();
            }

            // Ограничение движения границами земли
            player.position.x = Math.max(-24, Math.min(24, player.position.x));
            player.position.z = Math.max(-24, Math.min(24, player.position.z));

            // Поворот персонажа за мышкой (всегда, независимо от движения)
            // Вычисляем направление от игрока к точке под мышкой
            const directionToMouse = new THREE.Vector3()
                .subVectors(targetPoint, player.position)
                .normalize();
            
            // Обновляем направление персонажа (только по горизонтали)
            playerDirection.set(directionToMouse.x, 0, directionToMouse.z).normalize();
            
            // Поворачиваем персонажа в направлении мыши
            if (directionToMouse.length() > 0.01) {
                const targetRotation = Math.atan2(directionToMouse.x, directionToMouse.z);
                player.rotation.y = targetRotation;
            }

            // Анимация ходьбы
            if (isMoving) {
                walkCycle += 0.2;
                leftLeg.rotation.x = Math.sin(walkCycle) * 0.5;
                rightLeg.rotation.x = Math.sin(walkCycle + Math.PI) * 0.5;
                
                // Небольшое покачивание тела
                body.position.y = 0.75 + Math.sin(walkCycle * 2) * 0.05;
                head.position.y = 1.85 + Math.sin(walkCycle * 2) * 0.05;
            } else {
                // Возврат ног в исходное положение
                leftLeg.rotation.x = THREE.MathUtils.lerp(leftLeg.rotation.x, 0, 0.1);
                rightLeg.rotation.x = THREE.MathUtils.lerp(rightLeg.rotation.x, 0, 0.1);
                body.position.y = THREE.MathUtils.lerp(body.position.y, 0.75, 0.1);
                head.position.y = THREE.MathUtils.lerp(head.position.y, 1.85, 0.1);
            }

            // Камера следует за игроком
            camera.position.x = player.position.x + 20;
            camera.position.z = player.position.z + 20;
            camera.position.y = 20;
            camera.lookAt(player.position);

            // Обновление частиц краски
            updatePaintParticles();

            // Обработка непрерывной стрельбы
            if (isShooting) {
                if (shootCooldown <= 0) {
                    shootPaint();
                    shootCooldown = shootDelay;
                } else {
                    shootCooldown--;
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
