<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>3D Полёт на самолёте</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #87CEEB;
            font-family: Arial, sans-serif;
            touch-action: none;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }
        
        #joystickZone {
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: relative;
            touch-action: none;
        }
        
        #joystickKnob {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.6);
            border: 3px solid white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 200;
        }
        
        #startScreen h1 {
            font-size: 32px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        #startScreen p {
            font-size: 16px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 80%;
        }
        
        #startBtn {
            padding: 15px 40px;
            font-size: 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        #gameOver {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 200;
        }
        
        #gameOver h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ff4444;
        }
        
        #restartBtn {
            padding: 15px 40px;
            font-size: 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div>Счёт: <span id="score">0</span></div>
        <div>Высота: <span id="altitude">1000</span> м</div>
        <div>Скорость: <span id="speed">500</span> км/ч</div>
    </div>
    
    <div id="controls">
        <div id="joystickZone">
            <div id="joystickKnob"></div>
        </div>
    </div>
    
    <div id="startScreen">
        <h1>✈️ 3D Полёт</h1>
        <p>Управляйте самолётом с помощью джойстика справа!<br><br>Двигайте джойстик для управления вверх/вниз/влево/вправо</p>
        <button id="startBtn">Начать полёт</button>
    </div>
    
    <div id="gameOver">
        <h2>Игра окончена!</h2>
        <div>Ваш счёт: <span id="finalScore">0</span></div>
        <button id="restartBtn">Играть снова</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Инициализация Three.js
        let scene, camera, renderer;
        let airplane, propeller;
        let obstacles = [];
        let clouds = [];
        let gameRunning = false;
        let score = 0;
        let speed = 0.5;
        let altitude = 1000;
        
        // Управление
        let targetX = 0;
        let targetY = 0;
        let joystickActive = false;
        let joystickCenterX = 0;
        let joystickCenterY = 0;
        
        function init() {
            // Сцена
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 100, 500);
            
            // Камера - вид из-за самолёта
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 8);
            camera.lookAt(0, 0, -10);
            
            // Рендерер
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // Свет
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);
            
            // Создаём самолёт
            createAirplane();
            
            // Создаём землю
            createGround();
            
            // Обработчики событий
            setupControls();
            
            // Анимация
            animate();
        }
        
        function createAirplane() {
            airplane = new THREE.Group();
            
            // Фюзеляж
            const fuselageGeometry = new THREE.ConeGeometry(1, 4, 8);
            const fuselageMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            const fuselage = new THREE.Mesh(fuselageGeometry, fuselageMaterial);
            fuselage.rotation.x = Math.PI / 2;
            airplane.add(fuselage);
            
            // Крылья
            const wingGeometry = new THREE.BoxGeometry(6, 0.2, 1.5);
            const wingMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });
            const wings = new THREE.Mesh(wingGeometry, wingMaterial);
            wings.position.z = 0.5;
            airplane.add(wings);
            
            // Хвост
            const tailGeometry = new THREE.BoxGeometry(2, 0.2, 1);
            const tail = new THREE.Mesh(tailGeometry, wingMaterial);
            tail.position.z = 2;
            tail.position.y = 0.5;
            airplane.add(tail);
            
            // Вертикальный стабилизатор
            const vStabGeometry = new THREE.BoxGeometry(0.2, 1.5, 1);
            const vStab = new THREE.Mesh(vStabGeometry, wingMaterial);
            vStab.position.z = 2;
            vStab.position.y = 1;
            airplane.add(vStab);
            
            // Пропеллер
            const propGeometry = new THREE.BoxGeometry(3, 0.1, 0.2);
            const propMaterial = new THREE.MeshPhongMaterial({ color: 0x333333 });
            propeller = new THREE.Mesh(propGeometry, propMaterial);
            propeller.position.z = -2;
            airplane.add(propeller);
            
            // Кабина
            const cockpitGeometry = new THREE.SphereGeometry(0.8, 8, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const cockpitMaterial = new THREE.MeshPhongMaterial({ color: 0x87CEEB, transparent: true, opacity: 0.7 });
            const cockpit = new THREE.Mesh(cockpitGeometry, cockpitMaterial);
            cockpit.position.z = 0.5;
            cockpit.position.y = 0.8;
            cockpit.rotation.x = Math.PI;
            airplane.add(cockpit);
            
            scene.add(airplane);
        }
        
        function createGround() {
            const groundGeometry = new THREE.PlaneGeometry(1000, 1000, 50, 50);
            const groundMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x228B22,
                flatShading: true
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -50;
            scene.add(ground);
        }
        
        function createCloud() {
            const cloudGroup = new THREE.Group();
            const cloudMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });
            
            for (let i = 0; i < 5; i++) {
                const cloudGeometry = new THREE.SphereGeometry(2 + Math.random() * 2, 8, 8);
                const cloud = new THREE.Mesh(cloudGeometry, cloudMaterial);
                cloud.position.set(
                    (Math.random() - 0.5) * 6,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 4
                );
                cloudGroup.add(cloud);
            }
            
            cloudGroup.position.set(
                (Math.random() - 0.5) * 100,
                20 + Math.random() * 30,
                -200 - Math.random() * 100
            );
            
            scene.add(cloudGroup);
            clouds.push(cloudGroup);
        }
        
        function createObstacle() {
            const obstacleType = Math.random() > 0.5 ? 'mountain' : 'tower';
            
            if (obstacleType === 'mountain') {
                const geometry = new THREE.ConeGeometry(5 + Math.random() * 10, 20 + Math.random() * 30, 8);
                const material = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
                const mountain = new THREE.Mesh(geometry, material);
                mountain.position.set(
                    (Math.random() - 0.5) * 80,
                    -50,
                    -300
                );
                scene.add(mountain);
                obstacles.push(mountain);
            } else {
                const geometry = new THREE.CylinderGeometry(2, 3, 30, 8);
                const material = new THREE.MeshPhongMaterial({ color: 0x555555 });
                const tower = new THREE.Mesh(geometry, material);
                tower.position.set(
                    (Math.random() - 0.5) * 60,
                    -35,
                    -300
                );
                scene.add(tower);
                obstacles.push(tower);
            }
        }
        
        function setupControls() {
            const joystickZone = document.getElementById('joystickZone');
            const joystickKnob = document.getElementById('joystickKnob');
            const maxDistance = 45; // Максимальное расстояние перемещения джойстика
            
            // Touch события для джойстика
            joystickZone.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.changedTouches[0];
                joystickActive = true;
                
                const rect = joystickZone.getBoundingClientRect();
                joystickCenterX = rect.left + rect.width / 2;
                joystickCenterY = rect.top + rect.height / 2;
                
                updateJoystick(touch.clientX, touch.clientY);
            }, { passive: false });
            
            joystickZone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (joystickActive) {
                    const touch = e.changedTouches[0];
                    updateJoystick(touch.clientX, touch.clientY);
                }
            }, { passive: false });
            
            joystickZone.addEventListener('touchend', (e) => {
                e.preventDefault();
                joystickActive = false;
                targetX = 0;
                targetY = 0;
                joystickKnob.style.transform = `translate(-50%, -50%)`;
            }, { passive: false });
            
            // Mouse события для тестирования на ПК
            joystickZone.addEventListener('mousedown', (e) => {
                joystickActive = true;
                const rect = joystickZone.getBoundingClientRect();
                joystickCenterX = rect.left + rect.width / 2;
                joystickCenterY = rect.top + rect.height / 2;
                updateJoystick(e.clientX, e.clientY);
            });
            
            document.addEventListener('mousemove', (e) => {
                if (joystickActive) {
                    updateJoystick(e.clientX, e.clientY);
                }
            });
            
            document.addEventListener('mouseup', () => {
                if (joystickActive) {
                    joystickActive = false;
                    targetX = 0;
                    targetY = 0;
                    joystickKnob.style.transform = `translate(-50%, -50%)`;
                }
            });
            
            function updateJoystick(clientX, clientY) {
                let deltaX = clientX - joystickCenterX;
                let deltaY = clientY - joystickCenterY;
                
                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                
                if (distance > maxDistance) {
                    const ratio = maxDistance / distance;
                    deltaX *= ratio;
                    deltaY *= ratio;
                }
                
                // Перемещение визуального джойстика
                joystickKnob.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px))`;
                
                // Нормализация значений от -1 до 1
                targetX = deltaX / maxDistance;
                targetY = -deltaY / maxDistance; // Инвертируем Y для управления высотой
            }
            
            // Клавиатура (для тестирования на ПК)
            const keys = {};
            document.addEventListener('keydown', (e) => {
                keys[e.key] = true;
                updateKeyboard();
            });
            
            document.addEventListener('keyup', (e) => {
                keys[e.key] = false;
                updateKeyboard();
            });
            
            function updateKeyboard() {
                if (!joystickActive) {
                    targetX = 0;
                    targetY = 0;
                    if (keys['ArrowLeft'] || keys['a']) targetX = -1;
                    if (keys['ArrowRight'] || keys['d']) targetX = 1;
                    if (keys['ArrowUp'] || keys['w']) targetY = 1;
                    if (keys['ArrowDown'] || keys['s']) targetY = -1;
                }
            }
            
            // Кнопки старта
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('restartBtn').addEventListener('click', restartGame);
            
            // Изменение размера окна
            window.addEventListener('resize', onWindowResize, false);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            speed = 0.5;
            altitude = 1000;
            updateUI();
        }
        
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            
            // Очистка препятствий
            obstacles.forEach(obs => scene.remove(obs));
            obstacles = [];
            
            // Сброс позиции самолёта
            airplane.position.x = 0;
            airplane.position.y = 0;
            airplane.rotation.z = 0;
            airplane.rotation.x = 0;
            targetX = 0;
            targetY = 0;
            
            gameRunning = true;
            score = 0;
            speed = 0.5;
            altitude = 1000;
            updateUI();
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('gameOver').style.display = 'flex';
        }
        
        function updateUI() {
            document.getElementById('score').textContent = Math.floor(score);
            document.getElementById('altitude').textContent = Math.floor(altitude);
            document.getElementById('speed').textContent = Math.floor(500 + speed * 200);
        }
        
        function checkCollision() {
            const airplaneBox = new THREE.Box3().setFromObject(airplane);
            
            for (let obstacle of obstacles) {
                const obstacleBox = new THREE.Box3().setFromObject(obstacle);
                if (airplaneBox.intersectsBox(obstacleBox)) {
                    return true;
                }
            }
            return false;
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (gameRunning) {
                // Вращение пропеллера
                propeller.rotation.z += 0.5;
                
                // Движение самолёта на основе джойстика
                const moveSpeed = 0.3;
                const maxX = 40;
                const maxY = 15;
                const minY = -10;
                
                // Обновление позиции на основе джойстика
                if (targetX !== 0 || targetY !== 0) {
                    airplane.position.x += targetX * moveSpeed;
                    airplane.position.y += targetY * moveSpeed;
                    
                    // Наклон самолёта при движении
                    airplane.rotation.z = -targetX * 0.5;
                    airplane.rotation.x = targetY * 0.3;
                } else {
                    // Возврат к нейтральной позиции - выравниваем самолёт
                    airplane.rotation.z *= 0.95;
                    airplane.rotation.x *= 0.95;
                }
                
                // Выравнивание самолёта по горизонтали (чтобы не летел под углом)
                airplane.rotation.y = 0;
                
                // Ограничение границ
                airplane.position.x = Math.max(-maxX, Math.min(maxX, airplane.position.x));
                airplane.position.y = Math.max(minY, Math.min(maxY, airplane.position.y));
                
                // Камера следует за самолётом
                camera.position.x += (airplane.position.x - camera.position.x) * 0.05;
                camera.position.y += (airplane.position.y + 3 - camera.position.y) * 0.05;
                camera.lookAt(airplane.position.x, airplane.position.y, -10);
                
                // Создание препятствий
                if (Math.random() < 0.02) {
                    createObstacle();
                }
                
                // Создание облаков
                if (Math.random() < 0.03) {
                    createCloud();
                }
                
                // Движение препятствий
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].position.z += speed;
                    
                    if (obstacles[i].position.z > 20) {
                        scene.remove(obstacles[i]);
                        obstacles.splice(i, 1);
                        score += 10;
                        speed += 0.001;
                        updateUI();
                    }
                }
                
                // Движение облаков
                for (let i = clouds.length - 1; i >= 0; i--) {
                    clouds[i].position.z += speed * 0.5;
                    
                    if (clouds[i].position.z > 20) {
                        scene.remove(clouds[i]);
                        clouds.splice(i, 1);
                    }
                }
                
                // Проверка столкновений
                if (checkCollision()) {
                    gameOver();
                }
                
                // Увеличение счёта со временем
                score += 0.1;
                updateUI();
            } else {
                // Анимация на экране старта
                propeller.rotation.z += 0.2;
                airplane.rotation.y += 0.005;
            }
            
            renderer.render(scene, camera);
        }
        
        // Запуск
        init();
    </script>
</body>
</html>
