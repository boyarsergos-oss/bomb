<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Drone Delivery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #16213e, #1a1a2e);
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #levelInfo {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            font-size: 16px;
            text-align: right;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #stars {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            display: none;
            z-index: 100;
        }
        
        #message {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 24px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            display: none;
        }
        
        #mobileControls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
        }
        
        .mobile-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .mobile-btn.active {
            background: rgba(255, 255, 255, 0.4);
        }
        
        #stabilizeBtn {
            width: 70px;
            height: 70px;
            font-size: 12px;
        }
        
        @media (max-width: 768px) {
            #mobileControls {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div>Скорость: <span id="velocity">0</span></div>
            <div>Раскачка: <span id="swing">0</span>%</div>
        </div>
        <div id="levelInfo">
            <div>Уровень: <span id="levelNum">1</span>/10</div>
            <div>Время: <span id="timer">0.0</span>s</div>
        </div>
        <div id="stars">⭐⭐⭐</div>
        <div id="message">Уровень пройден!</div>
        <div id="mobileControls">
            <div class="mobile-btn" id="leftBtn">◀</div>
            <div class="mobile-btn" id="rightBtn">▶</div>
            <div class="mobile-btn" id="thrustBtn">▲</div>
            <div class="mobile-btn" id="stabilizeBtn">STAB</div>
        </div>
    </div>

    <script src="matter.js"></script>
    <script src="game.js"></script>
</body>
</html>
