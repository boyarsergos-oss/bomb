<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Изометрическая Сцена</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
        }
        #info h3 {
            margin-bottom: 10px;
        }
        #info p {
            margin: 5px 0;
            font-size: 14px;
        }
        #paint-indicator {
            position: absolute;
            bottom: 2vh;
            left: 2vw;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 1.5vh 1.5vw;
            border-radius: 0.8vh;
            z-index: 100;
            transform-origin: bottom left;
            transition: transform 0.1s;
        }
        #paint-bar-container {
            width: 20vw;
            height: 2vh;
            background: #333;
            border-radius: 1vh;
            overflow: hidden;
            margin-top: 0.5vh;
        }
        #paint-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff1493, #ff69b4);
            transition: width 0.1s;
        }
        #reload-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff1493;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            display: none;
            z-index: 100;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>Управление</h3>
        <p>W / Стрелка вверх - Вперёд</p>
        <p>S / Стрелка вниз - Назад</p>
        <p>A / Стрелка влево - Влево</p>
        <p>D / Стрелка вправо - Вправо</p>
        <p>ЛКМ / Пробел - Стрелять краской</p>
    </div>
    
    <div id="paint-indicator">
        <h3>Краска: <span id="paint-percent">100</span>%</h3>
        <div id="paint-bar-container">
            <div id="paint-bar"></div>
        </div>
        <p style="margin-top: 10px; font-size: 12px;">Подойдите к резервуару для перезарядки</p>
    </div>
    
    <div id="reload-message">Зажмите E для перезарядки</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Инициализация сцены
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        // Камера с изометрической проекцией (ортографическая)
        const aspect = window.innerWidth / window.innerHeight;
        const d = 20;
        const camera = new THREE.OrthographicCamera(
            -d * aspect, d * aspect, d, -d, 1, 1000
        );
        
        // Изометрический угол
        camera.position.set(20, 20, 20);
        camera.lookAt(scene.position);

        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        // Земля (плоскость) с динамической текстурой для краски
        const groundSize = 50;
        const groundResolution = 512; // Разрешение текстуры для рисования
        const groundCanvas = document.createElement('canvas');
        groundCanvas.width = groundResolution;
        groundCanvas.height = groundResolution;
        const groundCtx = groundCanvas.getContext('2d');
        
        // Заполняем начальным цветом (зелёный - трава)
        groundCtx.fillStyle = '#3a7d3a';
        groundCtx.fillRect(0, 0, groundResolution, groundResolution);
        
        const groundTexture = new THREE.CanvasTexture(groundCanvas);
        groundTexture.needsUpdate = true;
        
        const groundGeometry = new THREE.PlaneGeometry(groundSize, groundSize);
        const groundMaterial = new THREE.MeshLambertMaterial({ 
            map: groundTexture,
            color: 0xffffff
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Сетка на земле
        const gridHelper = new THREE.GridHelper(50, 10, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Создаём персонажа (группа объектов)
        const player = new THREE.Group();

        // Тело
        const bodyGeometry = new THREE.BoxGeometry(1, 1.5, 0.6);
        const bodyMaterial = new THREE.MeshLambertMaterial({ color: 0xff6b6b });
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        body.position.y = 0.75;
        body.castShadow = true;
        player.add(body);

        // Голова
        const headGeometry = new THREE.BoxGeometry(0.7, 0.7, 0.7);
        const headMaterial = new THREE.MeshLambertMaterial({ color: 0xffccaa });
        const head = new THREE.Mesh(headGeometry, headMaterial);
        head.position.y = 1.85;
        head.castShadow = true;
        player.add(head);

        // Ноги
        const legGeometry = new THREE.BoxGeometry(0.3, 0.7, 0.3);
        const legMaterial = new THREE.MeshLambertMaterial({ color: 0x4a4a4a });
        
        const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
        leftLeg.position.set(-0.25, 0.35, 0);
        leftLeg.castShadow = true;
        player.add(leftLeg);

        const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
        rightLeg.position.set(0.25, 0.35, 0);
        rightLeg.castShadow = true;
        player.add(rightLeg);

        scene.add(player);

        // Создаём резервуар для перезарядки краски с коллизиями
        const tankGroup = new THREE.Group();
        
        // Основной бак (цилиндр)
        const tankBaseGeometry = new THREE.CylinderGeometry(2, 2, 3, 16);
        const tankBaseMaterial = new THREE.MeshLambertMaterial({ color: 0x4a90e2 });
        const tankBase = new THREE.Mesh(tankBaseGeometry, tankBaseMaterial);
        tankBase.position.y = 1.5;
        tankBase.castShadow = true;
        tankGroup.add(tankBase);
        
        // Верхняя часть бака
        const tankTopGeometry = new THREE.CylinderGeometry(1.5, 2, 1, 16);
        const tankTop = new THREE.Mesh(tankTopGeometry, tankBaseMaterial);
        tankTop.position.y = 3.5;
        tankTop.castShadow = true;
        tankGroup.add(tankTop);
        
        // Трубы/вентили сверху
        const valveGeometry = new THREE.CylinderGeometry(0.3, 0.3, 0.8, 8);
        const valveMaterial = new THREE.MeshLambertMaterial({ color: 0x888888 });
        const valve1 = new THREE.Mesh(valveGeometry, valveMaterial);
        valve1.position.set(0.8, 4.2, 0);
        valve1.rotation.z = Math.PI / 4;
        tankGroup.add(valve1);
        
        const valve2 = new THREE.Mesh(valveGeometry, valveMaterial);
        valve2.position.set(-0.8, 4.2, 0);
        valve2.rotation.z = -Math.PI / 4;
        tankGroup.add(valve2);
        
        // Платформа под резервуаром
        const platformGeometry = new THREE.BoxGeometry(5, 0.3, 5);
        const platformMaterial = new THREE.MeshLambertMaterial({ color: 0x666666 });
        const platform = new THREE.Mesh(platformGeometry, platformMaterial);
        platform.position.y = 0.15;
        platform.receiveShadow = true;
        tankGroup.add(platform);
        
        // Устанавливаем позицию резервуара
        tankGroup.position.set(15, 0, 15);
        scene.add(tankGroup);
        
        // Коллайдер для резервуара (невидимый box для проверки столкновений)
        const tankCollider = new THREE.Box3();
        const tankSize = new THREE.Vector3(2.5, 4, 2.5); // Размер зоны коллизии
        tankCollider.setFromCenterAndSize(tankGroup.position, tankSize);

        // Добавим несколько декоративных объектов
        function createTree(x, z) {
            const treeGroup = new THREE.Group();
            
            // Ствол
            const trunkGeometry = new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8);
            const trunkMaterial = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = 0.75;
            trunk.castShadow = true;
            treeGroup.add(trunk);

            // Крона
            const leavesGeometry = new THREE.ConeGeometry(1, 2, 8);
            const leavesMaterial = new THREE.MeshLambertMaterial({ color: 0x228b22 });
            const leaves = new THREE.Mesh(leavesGeometry, leavesMaterial);
            leaves.position.y = 2.5;
            leaves.castShadow = true;
            treeGroup.add(leaves);

            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);
        }

        // Создаём несколько деревьев
        createTree(-8, -8);
        createTree(8, -6);
        createTree(-6, 8);
        createTree(7, 7);
        createTree(-10, 5);
        createTree(10, -10);

        // Добавим камни
        function createRock(x, z) {
            const rockGeometry = new THREE.DodecahedronGeometry(0.5, 0);
            const rockMaterial = new THREE.MeshLambertMaterial({ color: 0x808080 });
            const rock = new THREE.Mesh(rockGeometry, rockMaterial);
            rock.position.set(x, 0.3, z);
            rock.scale.set(1 + Math.random() * 0.5, 0.8 + Math.random() * 0.4, 1 + Math.random() * 0.5);
            rock.castShadow = true;
            scene.add(rock);
        }

        createRock(-5, -3);
        createRock(6, 4);
        createRock(-3, 6);
        createRock(4, -8);

        // Переменные для мыши
        const mouse = new THREE.Vector2();
        let targetPoint = new THREE.Vector3(0, 0, 0);
        const paintColor = 0xff1493; // Ярко-розовый цвет краски
        
        // Массив для отслеживания закрашенных клеток (сетка 32x32)
        const gridResolution = 32;
        const paintedGrid = new Array(gridResolution).fill(null).map(() => new Array(gridResolution).fill(false));
        
        // Функция проверки, закрашена ли клетка
        function isCellPainted(x, z) {
            const gridX = Math.floor((x + groundSize / 2) / groundSize * gridResolution);
            const gridZ = Math.floor((z + groundSize / 2) / groundSize * gridResolution);
            
            if (gridX < 0 || gridX >= gridResolution || gridZ < 0 || gridZ >= gridResolution) {
                return false;
            }
            
            return paintedGrid[gridX][gridZ];
        }
        
        // Функция получения скорости в зависимости от покрытия под ногами
        function getMovementSpeed(x, z) {
            const baseSpeed = 0.15;
            const slowSpeed = 0.05;
            
            // Размер основания игрока (примерно)
            const playerRadius = 0.8;
            
            // Проверяем несколько точек под игроком: центр и 4 точки вокруг
            const checkPoints = [
                { x: x, z: z }, // центр
                { x: x + playerRadius, z: z }, // право
                { x: x - playerRadius, z: z }, // лево
                { x: x, z: z + playerRadius }, // низ
                { x: x, z: z - playerRadius }  // верх
            ];
            
            // Считаем количество закрашенных точек
            let paintedCount = 0;
            for (const point of checkPoints) {
                if (isCellPainted(point.x, point.z)) {
                    paintedCount++;
                }
            }
            
            // Если больше половины точек на закрашенной территории - быстро, иначе медленно
            if (paintedCount >= 3) {
                return baseSpeed;
            } else {
                return slowSpeed;
            }
        }
        
        // Текущее направление персонажа (по умолчанию смотрит вниз-вправо по экрану)
        let playerDirection = new THREE.Vector3(1, 0, -1).normalize();
        
        // Переменные для системы краски
        let maxPaint = 100;
        let currentPaint = 100;
        const paintConsumptionRate = 0.2; // Расход краски за кадр при стрельбе (уменьшен)
        const reloadSpeed = 1.5; // Скорость перезарядки у резервуара
        let isReloading = false;
        let canShoot = true;


        // Обработка движения мыши для определения направления стрельбы
        document.addEventListener('mousemove', (event) => {
            // Нормализованные координаты мыши (-1 до +1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Создаем луч из камеры через позицию мыши
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            // Находим пересечение с землей
            const intersects = raycaster.intersectObject(ground);
            
            if (intersects.length > 0) {
                targetPoint.copy(intersects[0].point);
            }
        });

        // Функция рисования краски на земле
        function paintOnGround(position, radius = 0.5) {
            // Преобразуем 3D координаты в 2D координаты текстуры
            const u = (position.x + groundSize / 2) / groundSize * groundResolution;
            const v = (position.z + groundSize / 2) / groundSize * groundResolution;
            
            // Рисуем круг на canvas
            groundCtx.beginPath();
            groundCtx.arc(u, v, radius / groundSize * groundResolution, 0, Math.PI * 2);
            groundCtx.fillStyle = '#ff1493'; // Ярко-розовый цвет краски
            groundCtx.fill();
            
            // Обновляем текстуру
            groundTexture.needsUpdate = true;
            
            // Обновляем сетку закрашенных клеток
            const gridX = Math.floor((position.x + groundSize / 2) / groundSize * gridResolution);
            const gridZ = Math.floor((position.z + groundSize / 2) / groundSize * gridResolution);
            
            // Закрашиваем клетку и соседние клетки в зависимости от радиуса
            const cellsToPaint = Math.ceil(radius / groundSize * gridResolution);
            for (let dx = -cellsToPaint; dx <= cellsToPaint; dx++) {
                for (let dz = -cellsToPaint; dz <= cellsToPaint; dz++) {
                    const nx = gridX + dx;
                    const nz = gridZ + dz;
                    if (nx >= 0 && nx < gridResolution && nz >= 0 && nz < gridResolution) {
                        paintedGrid[nx][nz] = true;
                    }
                }
            }
        }
        
        // Функция выстрела краской
        function shootPaint() {
            // Точка начала луча - позиция игрока + смещение вверх (откуда стреляет)
            const rayOrigin = player.position.clone();
            rayOrigin.y = 1.2; // Высота "руки" или оружия

            // Направление выстрела - к точке, куда указывает курсор мыши
            const shootDirection = targetPoint.clone().sub(rayOrigin).normalize();

            // Добавляем эффект частиц при выстреле (шланг) - теперь создаём поток постоянно
            createHoseStream(rayOrigin, shootDirection);
        }
        
        // Эффект "шланга" - поток жидкости
        const hoseParticles = [];
        const splashParticles = []; // Частицы для эффекта разбрызгивания
        
        // Функция создания потока жидкости из шланга
        function createHoseStream(origin, direction) {
            const particleCount = 4; // Уменьшено количество частиц за кадр при стрельбе
            const particleGeometry = new THREE.SphereGeometry(0.08, 8, 8);
            
            for (let i = 0; i < particleCount; i++) {
                const particleMaterial = new THREE.MeshBasicMaterial({ 
                    color: paintColor,
                    transparent: true,
                    opacity: 0.9
                });
                const particle = new THREE.Mesh(particleGeometry, particleMaterial);
                
                // Все частицы начинают движение от игрока с небольшим разбросом
                const spreadOffset = (Math.random() - 0.5) * 0.3;
                particle.position.copy(origin);
                particle.position.x += spreadOffset;
                particle.position.z += spreadOffset;
                
                // Направление с небольшим разбросом для более естественного потока
                const spreadAngle = (Math.random() - 0.5) * 0.15;
                const spreadDirection = direction.clone();
                spreadDirection.applyAxisAngle(new THREE.Vector3(0, 1, 0), spreadAngle);
                particle.userData.velocity = spreadDirection;
                
                // Скорость потока - высокая для быстрой доставки к цели
                particle.userData.speed = 1.2 + Math.random() * 0.3;
                particle.userData.life = 1.0;
                particle.userData.onGround = false;
                
                scene.add(particle);
                hoseParticles.push(particle);
            }
        }
        
        // Функция создания брызг при ударе о землю
        function createSplash(position, normal) {
            const splashCount = 3; // Количество брызг на одно попадание (уменьшено)
            const splashGeometry = new THREE.SphereGeometry(0.04, 6, 6);
            
            for (let i = 0; i < splashCount; i++) {
                const particleMaterial = new THREE.MeshBasicMaterial({ 
                    color: paintColor,
                    transparent: true,
                    opacity: 0.85
                });
                const particle = new THREE.Mesh(splashGeometry, particleMaterial);
                
                particle.position.copy(position);
                particle.position.y += 0.1;
                
                // Случайное направление разбрызгивания вверх и в стороны (уменьшен радиус)
                const angle = Math.random() * Math.PI * 2;
                const horizontalSpeed = 0.05 + Math.random() * 0.1; // Уменьшена горизонтальная скорость
                const verticalSpeed = 0.1 + Math.random() * 0.15; // Уменьшена вертикальная скорость
                
                particle.userData.velocity = new THREE.Vector3(
                    Math.cos(angle) * horizontalSpeed,
                    verticalSpeed,
                    Math.sin(angle) * horizontalSpeed
                );
                
                particle.userData.speed = 1.0;
                particle.userData.life = 0.6 + Math.random() * 0.3;
                particle.userData.onGround = false;
                particle.userData.isSplash = true;
                
                scene.add(particle);
                splashParticles.push(particle);
            }
        }
        
        // Обновление частиц шланга
        function updateHoseParticles() {
            for (let i = hoseParticles.length - 1; i >= 0; i--) {
                const particle = hoseParticles[i];
                
                if (!particle.userData.onGround) {
                    // Движение частицы в полёте
                    particle.position.add(
                        particle.userData.velocity.clone().multiplyScalar(particle.userData.speed)
                    );
                    
                    // Гравитация (более сильная для эффекта жидкости)
                    particle.userData.velocity.y -= 0.025;
                    
                    // Проверка столкновения с землёй
                    if (particle.position.y <= 0.1) {
                        particle.position.y = 0.1;
                        particle.userData.onGround = true;
                        particle.userData.spreadTime = 0;
                        
                        // Рисуем краску на земле в точке попадания
                        paintOnGround(particle.position.clone(), 0.4);
                        
                        // Создаём эффект брызг при ударе о землю
                        createSplash(particle.position.clone(), new THREE.Vector3(0, 1, 0));
                        
                        // Расплющиваем частицу на земле
                        particle.scale.set(1.5, 0.3, 1.5);
                    }
                } else {
                    // Частица на земле - растекается и исчезает
                    particle.userData.spreadTime += 0.05;
                    particle.userData.life -= 0.04;
                    
                    // Растекание по поверхности
                    const spreadScale = 1.5 + particle.userData.spreadTime * 2;
                    particle.scale.set(spreadScale, 0.2, spreadScale);
                }
                
                // Уменьшение прозрачности
                particle.material.opacity = particle.userData.life * 0.9;
                
                if (particle.userData.life <= 0) {
                    scene.remove(particle);
                    particle.geometry.dispose();
                    particle.material.dispose();
                    hoseParticles.splice(i, 1);
                    continue;
                }
            }
        }
        
        // Обновление частиц разбрызгивания
        function updateSplashParticles() {
            for (let i = splashParticles.length - 1; i >= 0; i--) {
                const particle = splashParticles[i];
                
                // Движение частицы
                particle.position.add(
                    particle.userData.velocity.clone().multiplyScalar(particle.userData.speed)
                );
                
                // Гравитация
                particle.userData.velocity.y -= 0.03;
                
                // Проверка столкновения с землёй
                if (particle.position.y <= 0.05) {
                    particle.position.y = 0.05;
                    particle.userData.onGround = true;
                    particle.userData.velocity.set(0, 0, 0); // Останавливаем движение
                    
                    // Рисуем краску на земле от брызг (только один раз при касании)
                    if (!particle.userData.painted) {
                        paintOnGround(particle.position.clone(), 0.2);
                        particle.userData.painted = true;
                    }
                    
                    // Расплющиваем частицу брызг
                    particle.scale.set(0.8, 0.2, 0.8);
                }
                
                // Уменьшение жизни
                particle.userData.life -= 0.025;
                
                // Уменьшение прозрачности
                particle.material.opacity = particle.userData.life * 0.85;
                
                if (particle.userData.life <= 0) {
                    scene.remove(particle);
                    particle.geometry.dispose();
                    particle.material.dispose();
                    splashParticles.splice(i, 1);
                    continue;
                }
            }
        }

        // Управление
        const keys = {
            w: false,
            a: false,
            s: false,
            d: false,
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };

        let isShooting = false;
        let shootCooldown = 0;
        const shootDelay = 2; // Задержка между выстрелами (чем меньше, тем быстрее)

        document.addEventListener('keydown', (event) => {
            // Обработка движения
            if (keys.hasOwnProperty(event.key)) {
                keys[event.key] = true;
            }
            // Обработка начала стрельбы (Пробел)
            if (event.code === 'Space') {
                isShooting = true;
            }
        });

        document.addEventListener('keyup', (event) => {
            // Обработка движения
            if (keys.hasOwnProperty(event.key)) {
                keys[event.key] = false;
            }
            // Остановка стрельбы при отпускании пробела
            if (event.code === 'Space') {
                isShooting = false;
            }
            // Остановка перезарядки при отпускании E
            if (event.code === 'KeyE') {
                isReloading = false;
            }
        });

        // Стрельба по клику мыши (начало)
        document.addEventListener('mousedown', (event) => {
            if (event.button === 0) { // Левая кнопка мыши
                isShooting = true;
            }
        });

        // Остановка стрельбы при отпускании кнопки мыши
        document.addEventListener('mouseup', (event) => {
            if (event.button === 0) { // Левая кнопка мыши
                isShooting = false;
            }
        });
        
        // Начало перезарядки при нажатии E
        document.addEventListener('keydown', (event) => {
            if (event.code === 'KeyE') {
                isReloading = true;
            }
        });
        
        // Остановка перезарядки при отпускании E
        document.addEventListener('keyup', (event) => {
            if (event.code === 'KeyE') {
                isReloading = false;
            }
        });

        // Переменные для движения
        let walkCycle = 0;

        // Обработка изменения размера окна
        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // Масштабирование индикатора краски вместе с игровой сценой
            const paintIndicator = document.getElementById('paint-indicator');
            const baseScale = Math.min(window.innerWidth, window.innerHeight) / 1000;
            const scale = Math.max(0.5, Math.min(2, baseScale));
            paintIndicator.style.transform = `scale(${scale})`;
        });

        // Анимация
        function animate() {
            requestAnimationFrame(animate);

            let isMoving = false;
            // Вычисляем скорость в зависимости от закрашенности территории под ногами игрока
            const moveSpeed = getMovementSpeed(player.position.x, player.position.z);

            // Движение персонажа в изометрической проекции
            // В изометрии: 
            // - Вверх по экрану = комбинация -X и -Z
            // - Вниз по экрану = комбинация +X и +Z
            // - Влево по экрану = комбинация -X и +Z
            // - Вправо по экрану = комбинация +X и -Z
            
            if (keys.w || keys.ArrowUp) {
                // Визуально вверх по экрану
                player.position.x -= moveSpeed * Math.cos(Math.PI / 4);
                player.position.z -= moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(-1, 0, -1).normalize();
            }
            if (keys.s || keys.ArrowDown) {
                // Визуально вниз по экрану
                player.position.x += moveSpeed * Math.cos(Math.PI / 4);
                player.position.z += moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(1, 0, 1).normalize();
            }
            if (keys.a || keys.ArrowLeft) {
                // Визуально влево по экрану
                player.position.x -= moveSpeed * Math.cos(Math.PI / 4);
                player.position.z += moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(-1, 0, 1).normalize();
            }
            if (keys.d || keys.ArrowRight) {
                // Визуально вправо по экрану
                player.position.x += moveSpeed * Math.cos(Math.PI / 4);
                player.position.z -= moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(1, 0, -1).normalize();
            }

            // Ограничение движения границами земли
            player.position.x = Math.max(-24, Math.min(24, player.position.x));
            player.position.z = Math.max(-24, Math.min(24, player.position.z));

            // Поворот персонажа за мышкой (всегда, независимо от движения)
            // Вычисляем направление от игрока к точке под мышкой
            const directionToMouse = new THREE.Vector3()
                .subVectors(targetPoint, player.position)
                .normalize();
            
            // Обновляем направление персонажа (только по горизонтали)
            playerDirection.set(directionToMouse.x, 0, directionToMouse.z).normalize();
            
            // Поворачиваем персонажа в направлении мыши
            if (directionToMouse.length() > 0.01) {
                const targetRotation = Math.atan2(directionToMouse.x, directionToMouse.z);
                player.rotation.y = targetRotation;
            }

            // Анимация ходьбы
            if (isMoving) {
                walkCycle += 0.2;
                leftLeg.rotation.x = Math.sin(walkCycle) * 0.5;
                rightLeg.rotation.x = Math.sin(walkCycle + Math.PI) * 0.5;
                
                // Небольшое покачивание тела
                body.position.y = 0.75 + Math.sin(walkCycle * 2) * 0.05;
                head.position.y = 1.85 + Math.sin(walkCycle * 2) * 0.05;
            } else {
                // Возврат ног в исходное положение
                leftLeg.rotation.x = THREE.MathUtils.lerp(leftLeg.rotation.x, 0, 0.1);
                rightLeg.rotation.x = THREE.MathUtils.lerp(rightLeg.rotation.x, 0, 0.1);
                body.position.y = THREE.MathUtils.lerp(body.position.y, 0.75, 0.1);
                head.position.y = THREE.MathUtils.lerp(head.position.y, 1.85, 0.1);
            }

            // Камера следует за игроком
            camera.position.x = player.position.x + 20;
            camera.position.z = player.position.z + 20;
            camera.position.y = 20;
            camera.lookAt(player.position);

            // Обновление частиц шланга
            updateHoseParticles();
            
            // Обновление частиц разбрызгивания
            updateSplashParticles();
            
            // Проверка коллизии с резервуаром для перезарядки
            const playerCollider = new THREE.Box3().setFromObject(body);
            const distanceToTank = player.position.distanceTo(tankGroup.position);
            const isNearTank = distanceToTank < 5; // Расстояние до резервуара для активации перезарядки
            
            // Показываем сообщение о перезарядке, если игрок рядом с резервуаром
            const reloadMessage = document.getElementById('reload-message');
            if (isNearTank && currentPaint < maxPaint) {
                reloadMessage.style.display = 'block';
            } else {
                reloadMessage.style.display = 'none';
            }
            
            // Перезарядка краски у резервуара
            if (isReloading && isNearTank && currentPaint < maxPaint) {
                currentPaint = Math.min(maxPaint, currentPaint + reloadSpeed);
                updatePaintIndicator();
            }
            
            // Расход краски при стрельбе
            if (isShooting && canShoot && currentPaint > 0) {
                currentPaint -= paintConsumptionRate;
                if (currentPaint <= 0) {
                    currentPaint = 0;
                    canShoot = false; // Блокируем стрельбу, когда краска закончилась
                }
                updatePaintIndicator();
                
                if (shootCooldown <= 0) {
                    shootPaint();
                    shootCooldown = shootDelay;
                } else {
                    shootCooldown--;
                }
                // Создаём поток частиц каждый кадр пока нажата кнопка
                const rayOrigin = player.position.clone();
                rayOrigin.y = 1.2;
                const shootDirection = targetPoint.clone().sub(rayOrigin).normalize();
                createHoseStream(rayOrigin, shootDirection);
            }
            
            // Разблокируем стрельбу, если есть краска
            if (currentPaint > 0) {
                canShoot = true;
            }
            
            // Обновляем текст сообщения в зависимости от состояния
            if (!canShoot && currentPaint <= 0) {
                reloadMessage.textContent = 'Краска закончилась! Подойдите к резервуару и зажмите E';
            } else if (isNearTank && currentPaint < maxPaint) {
                reloadMessage.textContent = 'Зажмите E для перезарядки';
            }

            renderer.render(scene, camera);
        }
        
        // Функция обновления индикатора краски
        function updatePaintIndicator() {
            const paintBar = document.getElementById('paint-bar');
            const paintPercent = document.getElementById('paint-percent');
            const percent = (currentPaint / maxPaint) * 100;
            
            paintBar.style.width = percent + '%';
            paintPercent.textContent = Math.round(percent);
            
            // Изменяем цвет полоски в зависимости от уровня краски
            if (percent > 60) {
                paintBar.style.background = 'linear-gradient(90deg, #ff1493, #ff69b4)';
            } else if (percent > 30) {
                paintBar.style.background = 'linear-gradient(90deg, #ffa500, #ffd700)';
            } else {
                paintBar.style.background = 'linear-gradient(90deg, #ff0000, #ff6347)';
            }
        }
        
        // Применяем начальное масштабирование индикатора при загрузке
        window.dispatchEvent(new Event('resize'));

        animate();
    </script>
</body>
</html>
