<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Puzzle 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #level-info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 18px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.3);
            padding: 15px 30px;
            border-radius: 10px;
        }
        #win-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4ade80;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            display: none;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }
        #next-level-btn {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: none;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
            transition: all 0.3s;
        }
        #next-level-btn:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.6);
        }
        #restart-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 10px rgba(249, 115, 22, 0.4);
        }
        #progress-bar {
            position: absolute;
            top: 20px;
            right: 100px;
            color: white;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas"></canvas>
        <div id="ui-overlay">
            <div id="level-info">Уровень 1</div>
            <div id="progress-bar">1/10</div>
            <button id="restart-btn">↻ Рестарт</button>
            <div id="instructions">Перетащите шар к зеленой зоне!</div>
            <div id="win-message">🎉 Уровень пройден!</div>
            <button id="next-level-btn">Следующий уровень →</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.19.0/dist/cannon-es.min.js"></script>
    <script>
        // Game state
        let currentLevel = 1;
        const totalLevels = 10;
        let isDragging = false;
        let dragPlane;
        let selectedObject = null;
        let raycaster, mouse;
        
        // Three.js setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 20);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        
        // Cannon.js setup
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);
        world.broadphase = new CANNON.NaiveBroadphase();
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);
        
        // Arrays to store objects
        const physicsObjects = [];
        const visualObjects = [];
        let goalZone = null;
        let playerBall = null;
        
        // Materials
        const groundMaterial = new CANNON.Material('ground');
        const objectMaterial = new CANNON.Material('object');
        const ballMaterial = new CANNON.Material('ball');
        
        const groundObjectContact = new CANNON.ContactMaterial(groundMaterial, objectMaterial, {
            friction: 0.5,
            restitution: 0.3
        });
        const ballObjectContact = new CANNON.ContactMaterial(ballMaterial, objectMaterial, {
            friction: 0.3,
            restitution: 0.7
        });
        
        world.addContactMaterial(groundObjectContact);
        world.addContactMaterial(ballObjectContact);
        
        // Create ground
        function createGround(width, depth) {
            const groundShape = new CANNON.Box(new CANNON.Vec3(width/2, 0.5, depth/2));
            const groundBody = new CANNON.Body({ mass: 0, material: groundMaterial });
            groundBody.addShape(groundShape);
            world.addBody(groundBody);
            
            const groundGeo = new THREE.BoxGeometry(width, 1, depth);
            const groundMat = new THREE.MeshStandardMaterial({ 
                color: 0x2d3748,
                roughness: 0.8
            });
            const groundMesh = new THREE.Mesh(groundGeo, groundMat);
            groundMesh.position.copy(groundBody.position);
            groundMesh.receiveShadow = true;
            scene.add(groundMesh);
            
            return { body: groundBody, mesh: groundMesh };
        }
        
        // Create box
        function createBox(x, y, z, width, height, depth, mass = 1) {
            const shape = new CANNON.Box(new CANNON.Vec3(width/2, height/2, depth/2));
            const body = new CANNON.Body({ mass: mass, material: objectMaterial });
            body.addShape(shape);
            body.position.set(x, y, z);
            world.addBody(body);
            
            const geo = new THREE.BoxGeometry(width, height, depth);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x4a90e2,
                roughness: 0.3,
                metalness: 0.5
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            
            physicsObjects.push(body);
            visualObjects.push(mesh);
            
            return { body, mesh };
        }
        
        // Create sphere (player ball)
        function createBall(x, y, z, radius, mass = 5) {
            const shape = new CANNON.Sphere(radius);
            const body = new CANNON.Body({ mass: mass, material: ballMaterial });
            body.addShape(shape);
            body.position.set(x, y, z);
            body.linearDamping = 0.3;
            body.angularDamping = 0.3;
            world.addBody(body);
            
            const geo = new THREE.SphereGeometry(radius, 32, 32);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0xf5a623,
                roughness: 0.2,
                metalness: 0.8
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            scene.add(mesh);
            
            playerBall = { body, mesh };
            physicsObjects.push(body);
            visualObjects.push(mesh);
            
            return { body, mesh };
        }
        
        // Create goal zone
        function createGoal(x, y, z, width, depth) {
            const geo = new THREE.BoxGeometry(width, 0.2, depth);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x4ade80,
                transparent: true,
                opacity: 0.6,
                emissive: 0x22c55e,
                emissiveIntensity: 0.5
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            mesh.receiveShadow = true;
            scene.add(mesh);
            
            goalZone = { mesh, x, y, z, width, depth };
            
            // Add particles around goal
            const particleGeo = new THREE.SphereGeometry(0.1, 8, 8);
            const particleMat = new THREE.MeshBasicMaterial({ color: 0x4ade80 });
            
            for (let i = 0; i < 20; i++) {
                const particle = new THREE.Mesh(particleGeo, particleMat);
                particle.position.set(
                    x + (Math.random() - 0.5) * width,
                    y + 0.5 + Math.random() * 2,
                    z + (Math.random() - 0.5) * depth
                );
                scene.add(particle);
                
                // Animate particles
                animateParticle(particle);
            }
        }
        
        function animateParticle(particle) {
            const originalY = particle.position.y;
            const speed = 0.5 + Math.random() * 0.5;
            const offset = Math.random() * Math.PI * 2;
            
            function animate() {
                particle.position.y = originalY + Math.sin(Date.now() * 0.001 * speed + offset) * 0.5;
                particle.rotation.y += 0.02;
                requestAnimationFrame(animate);
            }
            animate();
        }
        
        // Create ramp
        function createRamp(x, y, z, width, length, angle) {
            const height = 0.5;
            const shape = new CANNON.Box(new CANNON.Vec3(width/2, height/2, length/2));
            const body = new CANNON.Body({ mass: 0, material: objectMaterial });
            body.addShape(shape);
            body.position.set(x, y, z);
            body.quaternion.setFromEuler(-angle, 0, 0);
            world.addBody(body);
            
            const geo = new THREE.BoxGeometry(width, height, length);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x9b59b6,
                roughness: 0.4
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(body.position);
            mesh.quaternion.copy(body.quaternion);
            mesh.receiveShadow = true;
            scene.add(mesh);
            
            return { body, mesh };
        }
        
        // Create domino
        function createDomino(x, y, z, width, height, depth) {
            return createBox(x, y, z, width, height, depth, 0.5);
        }
        
        // Level designs
        const levels = [
            // Level 1: Simple push
            () => {
                createGround(30, 30);
                createBall(-8, 2, 0, 1);
                createBox(3, 0.5, 0, 2, 1, 2, 2);
                createGoal(8, 0.1, 0, 4, 4);
                document.getElementById('instructions').textContent = 'Перетащите оранжевый шар к зеленой зоне!';
            },
            
            // Level 2: Ramp introduction
            () => {
                createGround(30, 30);
                createBall(-10, 2, 0, 1);
                createRamp(-3, 1, 0, 4, 8, 0.3);
                createBox(5, 0.5, 0, 2, 1, 2, 1);
                createGoal(10, 0.1, 0, 4, 4);
                document.getElementById('instructions').textContent = 'Используйте рампу для достижения цели!';
            },
            
            // Level 3: Domino effect
            () => {
                createGround(30, 30);
                createBall(-12, 2, 0, 1);
                
                // Create line of dominos
                for (let i = 0; i < 5; i++) {
                    createDomino(-5 + i * 1.5, 1.5, 0, 0.3, 3, 0.5);
                }
                
                createBox(5, 0.5, 0, 2, 1, 2, 2);
                createGoal(10, 0.1, 0, 4, 4);
                document.getElementById('instructions').textContent = 'Создайте эффект домино!';
            },
            
            // Level 4: Multiple obstacles
            () => {
                createGround(35, 35);
                createBall(-14, 2, 0, 1);
                
                createBox(-8, 0.5, -3, 2, 2, 2, 3);
                createBox(-8, 0.5, 3, 2, 2, 2, 3);
                createBox(-3, 1, 0, 4, 2, 2, 4);
                
                createRamp(3, 1, 0, 4, 6, 0.25);
                createGoal(12, 0.1, 0, 4, 4);
                document.getElementById('instructions').textContent = 'Обойдите препятствия!';
            },
            
            // Level 5: Bridge challenge
            () => {
                createGround(40, 40);
                createBall(-15, 2, 0, 1);
                
                // Create gap
                createBox(-8, 0.5, -5, 3, 1, 8, 0);
                createBox(-8, 0.5, 5, 3, 1, 8, 0);
                
                // Create bridge pieces
                for (let i = 0; i < 4; i++) {
                    createBox(-3 + i * 2, 2, 0, 2, 0.5, 1, 1);
                }
                
                createGoal(10, 0.1, 0, 4, 4);
                document.getElementById('instructions').textContent = 'Постройте мост через пропасть!';
            },
            
            // Level 6: Seesaw balance
            () => {
                createGround(40, 40);
                createBall(-15, 2, 0, 1);
                
                // Create seesaw
                createBox(0, 1, 0, 1, 2, 1, 0);
                createBox(-5, 2.5, 0, 10, 0.5, 3, 2);
                
                createBox(8, 0.5, 0, 2, 1, 2, 3);
                createGoal(13, 0.1, 0, 4, 4);
                document.getElementById('instructions').textContent = 'Используйте качели для перехода!';
            },
            
            // Level 7: Tower collapse
            () => {
                createGround(40, 40);
                createBall(-15, 2, 0, 1);
                
                // Create tower
                for (let i = 0; i < 4; i++) {
                    createBox(0, 0.5 + i * 1, -2, 2, 1, 2, 1);
                    createBox(0, 0.5 + i * 1, 2, 2, 1, 2, 1);
                    if (i < 3) {
                        createBox(0, 1.5 + i * 1, 0, 4, 0.5, 4, 0.5);
                    }
                }
                
                createGoal(8, 0.1, 0, 4, 4);
                document.getElementById('instructions').textContent = 'Разрушьте башню чтобы пройти!';
            },
            
            // Level 8: Precision platforming
            () => {
                createGround(45, 45);
                createBall(-18, 2, 0, 1);
                
                // Small platforms
                createBox(-10, 1, 0, 3, 2, 3, 0);
                createBox(-5, 2, 0, 3, 4, 3, 0);
                createBox(0, 3, 0, 3, 6, 3, 0);
                createBox(5, 2, 0, 3, 4, 3, 0);
                
                createGoal(12, 0.1, 0, 4, 4);
                document.getElementById('instructions').textContent = 'Прыгайте по платформам точно!';
            },
            
            // Level 9: Complex machine
            () => {
                createGround(50, 50);
                createBall(-20, 2, 0, 1);
                
                // First ramp
                createRamp(-12, 1, 0, 4, 8, 0.3);
                
                // Domino chain
                for (let i = 0; i < 3; i++) {
                    createDomino(-5 + i * 1.5, 1.5, 0, 0.3, 3, 0.5);
                }
                
                // Second ramp
                createRamp(3, 1, 0, 4, 10, 0.35);
                
                createBox(12, 0.5, 0, 3, 1, 3, 5);
                createGoal(18, 0.1, 0, 4, 4);
                document.getElementById('instructions').textContent = 'Запустите сложную машину!';
            },
            
            // Level 10: Ultimate challenge
            () => {
                createGround(50, 50);
                createBall(-22, 2, 0, 1);
                
                // Multiple ramps
                createRamp(-15, 1, -5, 4, 8, 0.3);
                createRamp(-15, 1, 5, 4, 8, 0.3);
                
                // Tower to knock down
                for (let i = 0; i < 3; i++) {
                    createBox(-5, 0.5 + i * 1, 0, 2, 1, 2, 0.8);
                }
                
                // Bridge
                for (let i = 0; i < 3; i++) {
                    createBox(2 + i * 2, 2, 0, 2, 0.5, 1, 0.5);
                }
                
                // Final obstacle
                createBox(12, 0.5, 0, 3, 2, 3, 4);
                
                createGoal(18, 0.1, 0, 5, 5);
                document.getElementById('instructions').textContent = 'Пройдите финальное испытание!';
            }
        ];
        
        // Initialize level
        function initLevel(levelNum) {
            // Clear previous level
            physicsObjects.forEach(body => world.removeBody(body));
            visualObjects.forEach(mesh => scene.remove(mesh));
            if (playerBall && playerBall.mesh) scene.remove(playerBall.mesh);
            if (goalZone && goalZone.mesh) scene.remove(goalZone.mesh);
            
            physicsObjects.length = 0;
            visualObjects.length = 0;
            playerBall = null;
            goalZone = null;
            
            // Reset camera
            camera.position.set(0, 15, 20);
            camera.lookAt(0, 0, 0);
            
            // Create new level
            if (levelNum <= totalLevels) {
                levels[levelNum - 1]();
                
                // Update UI
                document.getElementById('level-info').textContent = `Уровень ${levelNum}`;
                document.getElementById('progress-bar').textContent = `${levelNum}/${totalLevels}`;
                document.getElementById('win-message').style.display = 'none';
                document.getElementById('next-level-btn').style.display = 'none';
            } else {
                // Game completed
                document.getElementById('level-info').textContent = '🎉 Победа!';
                document.getElementById('progress-bar').textContent = 'Все уровни пройдены!';
                document.getElementById('instructions').textContent = 'Вы прошли все уровни! Поздравляем!';
            }
        }
        
        // Check win condition
        function checkWin() {
            if (!playerBall || !goalZone) return false;
            
            const ballPos = playerBall.body.position;
            const goal = goalZone;
            
            const dx = Math.abs(ballPos.x - goal.x);
            const dz = Math.abs(ballPos.z - goal.z);
            
            return dx < goal.width / 2 && dz < goal.depth / 2 && ballPos.y < 1;
        }
        
        // Mouse interaction
        function getMousePosition(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            return {
                x: ((event.clientX - rect.left) / rect.width) * 2 - 1,
                y: -((event.clientY - rect.top) / rect.height) * 2 + 1
            };
        }
        
        function onMouseDown(event) {
            if (event.target !== renderer.domElement) return;
            
            const mousePos = getMousePosition(event);
            raycaster.setFromCamera(mousePos, camera);
            
            if (playerBall && playerBall.mesh) {
                const intersects = raycaster.intersectObject(playerBall.mesh);
                if (intersects.length > 0) {
                    isDragging = true;
                    selectedObject = playerBall;
                    
                    // Create drag plane
                    const planeNormal = new THREE.Vector3(0, 1, 0);
                    const planeConstant = playerBall.body.position.y;
                    dragPlane = new THREE.Plane(planeNormal, planeConstant);
                }
            }
        }
        
        function onMouseMove(event) {
            if (!isDragging || !selectedObject) return;
            
            const mousePos = getMousePosition(event);
            raycaster.setFromCamera(mousePos, camera);
            
            const targetPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, targetPoint);
            
            if (targetPoint) {
                // Apply force to move the ball
                const currentPos = selectedObject.body.position;
                const direction = new THREE.Vector3(
                    targetPoint.x - currentPos.x,
                    0,
                    targetPoint.z - currentPos.z
                );
                
                const force = 50;
                selectedObject.body.applyForce(
                    new CANNON.Vec3(direction.x * force, 0, direction.z * force),
                    new CANNON.Vec3(currentPos.x, currentPos.y, currentPos.z)
                );
            }
        }
        
        function onMouseUp() {
            isDragging = false;
            selectedObject = null;
            dragPlane = null;
        }
        
        // Event listeners
        renderer.domElement.addEventListener('mousedown', onMouseDown);
        renderer.domElement.addEventListener('mousemove', onMouseMove);
        renderer.domElement.addEventListener('mouseup', onMouseUp);
        renderer.domElement.addEventListener('mouseleave', onMouseUp);
        
        // Touch support
        renderer.domElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            onMouseDown({ clientX: touch.clientX, clientY: touch.clientY, target: renderer.domElement });
        });
        
        renderer.domElement.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            onMouseMove({ clientX: touch.clientX, clientY: touch.clientY });
        });
        
        renderer.domElement.addEventListener('touchend', onMouseUp);
        
        // UI buttons
        document.getElementById('restart-btn').addEventListener('click', () => {
            initLevel(currentLevel);
        });
        
        document.getElementById('next-level-btn').addEventListener('click', () => {
            currentLevel++;
            initLevel(currentLevel);
        });
        
        // Animation loop
        const timeStep = 1 / 60;
        let levelCompleted = false;
        
        function animate() {
            requestAnimationFrame(animate);
            
            // Update physics
            world.step(timeStep);
            
            // Sync visual objects with physics bodies
            visualObjects.forEach((mesh, index) => {
                const body = physicsObjects[index];
                mesh.position.copy(body.position);
                mesh.quaternion.copy(body.quaternion);
            });
            
            // Sync player ball
            if (playerBall) {
                playerBall.mesh.position.copy(playerBall.body.position);
                playerBall.mesh.quaternion.copy(playerBall.body.quaternion);
            }
            
            // Check win condition
            if (!levelCompleted && checkWin()) {
                levelCompleted = true;
                document.getElementById('win-message').style.display = 'block';
                document.getElementById('next-level-btn').style.display = 'block';
                
                // Celebration effect
                if (playerBall) {
                    playerBall.mesh.material.emissive.setHex(0x4ade80);
                    playerBall.mesh.material.emissiveIntensity = 0.5;
                }
            }
            
            // Rotate camera slightly for dynamic feel
            const time = Date.now() * 0.0005;
            camera.position.x = Math.sin(time) * 5;
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Start game
        initLevel(currentLevel);
        animate();
    </script>
</body>
</html>
