<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Paint Game - Big Map</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">WASD - Ходить | ЛКМ / Пробел - Красить</div>
    <!-- Подключаем Three.js через CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- НАСТРОЙКИ ---
        const MAP_SIZE = 250; // Увеличено в 5 раз (было 50)
        const SEGMENTS = 250; // Детализация сетки
        const PLAYER_SPEED = 0.8;
        const TURN_SPEED = 0.04;
        const RAY_LENGTH = 15; // Длина луча для покраски (оптимизировано)
        
        // --- СЦЕНА И КАМЕРА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Небо
        scene.fog = new THREE.Fog(0x87CEEB, 10, 90);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- СВЕТ ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        scene.add(dirLight);

        // --- ЗЕМЛЯ (ТЕКСТУРА ДЛЯ РИСОВАНИЯ) ---
        // Создаем канвас для текстуры земли
        const groundCanvas = document.createElement('canvas');
        groundCanvas.width = 1024;
        groundCanvas.height = 1024;
        const groundCtx = groundCanvas.getContext('2d');
        
        // Заполняем зеленым фоном
        groundCtx.fillStyle = '#4CAF50';
        groundCtx.fillRect(0, 0, 1024, 1024);
        
        // Добавим немного шума для красоты
        for(let i=0; i<5000; i++) {
            groundCtx.fillStyle = Math.random() > 0.5 ? '#45a049' : '#55c059';
            const x = Math.random() * 1024;
            const y = Math.random() * 1024;
            const s = Math.random() * 3;
            groundCtx.fillRect(x, y, s, s);
        }

        const groundTexture = new THREE.CanvasTexture(groundCanvas);
        groundTexture.magFilter = THREE.LinearFilter; // Чтобы было чуть мягче
        
        const planeGeometry = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE);
        const planeMaterial = new THREE.MeshLambertMaterial({ map: groundTexture });
        const ground = new THREE.Mesh(planeGeometry, planeMaterial);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Сетка для визуального ориентира
        const gridHelper = new THREE.GridHelper(MAP_SIZE, SEGMENTS, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.1;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // --- ИГРОК ---
        const playerGeometry = new THREE.BoxGeometry(1, 2, 1);
        const playerMaterial = new THREE.MeshNormalMaterial(); // Разноцветный куб
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        player.position.y = 1; // Половина высоты, чтобы стоять на земле
        scene.add(player);

        // Оружие (просто маркер направления)
        const gunGeo = new THREE.BoxGeometry(0.2, 0.2, 1);
        const gunMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
        const gun = new THREE.Mesh(gunGeo, gunMat);
        gun.position.set(0.4, 0.5, -0.5);
        player.add(gun);

        // --- ПРЕПЯТСТВИЯ (Деревья/Камни) ---
        const obstacles = [];
        const boxGeo = new THREE.BoxGeometry(2, 4, 2);
        const boxMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
        
        // Генерируем препятствия случайно, но не в центре (спавн)
        for (let i = 0; i < 60; i++) {
            const mesh = new THREE.Mesh(boxGeo, boxMat);
            let x = (Math.random() - 0.5) * (MAP_SIZE - 10);
            let z = (Math.random() - 0.5) * (MAP_SIZE - 10);
            
            // Не ставим в центре спавна
            if (Math.abs(x) < 10 && Math.abs(z) < 10) continue;

            mesh.position.set(x, 2, z);
            scene.add(mesh);
            obstacles.push(mesh);
        }

        // --- УПРАВЛЕНИЕ ---
        const keys = { w: false, a: false, s: false, d: false };
        let paintColor = new THREE.Color(Math.random(), Math.random(), Math.random());

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
            if (key === ' ') shootPaint();
            
            // Смена цвета по клику правой кнопкой (опционально) или просто рандом при старте
            if (e.key === 'r') paintColor.setHex(Math.random() * 0xffffff);
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        document.addEventListener('mousedown', () => {
            shootPaint();
        });

        // --- ЛОГИКА ПОКРАСКИ ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0); // Центр экрана

        function shootPaint() {
            // Направляем луч от игрока вперед и немного вниз
            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyQuaternion(player.quaternion);
            
            // Луч начинается от игрока
            raycaster.set(player.position, direction);

            // Проверяем пересечение только с землей
            const intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0) {
                const point = intersects[0].point;
                
                // Переводим координаты точки в координаты текстуры
                // Земля имеет размер MAP_SIZE, текстура 1024
                // Центр земли (0,0) соответствует центру текстуры (512, 512)
                
                const u = (point.x + MAP_SIZE / 2) / MAP_SIZE;
                const v = (point.z + MAP_SIZE / 2) / MAP_SIZE; // Z это глубина, в текстуре это Y

                if (u >= 0 && u <= 1 && v >= 0 && v <= 1) {
                    const tx = u * 1024;
                    const ty = (1 - v) * 1024; // Инвертируем Y для канваса

                    // Рисуем круг
                    groundCtx.beginPath();
                    groundCtx.arc(tx, ty, 15, 0, Math.PI * 2);
                    groundCtx.fillStyle = `rgb(${Math.floor(paintColor.r*255)}, ${Math.floor(paintColor.g*255)}, ${Math.floor(paintColor.b*255)})`;
                    groundCtx.fill();

                    groundTexture.needsUpdate = true;
                    
                    // Меняем цвет для следующего выстрела (для веселья)
                    paintColor.setHSL(Math.random(), 1, 0.5);
                }
            }
        }

        // --- ИГРОВОЙ ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);

            // Движение
            if (keys.w) {
                player.translateZ(-PLAYER_SPEED);
            }
            if (keys.s) {
                player.translateZ(PLAYER_SPEED);
            }
            if (keys.a) {
                player.rotation.y += TURN_SPEED;
            }
            if (keys.d) {
                player.rotation.y -= TURN_SPEED;
            }

            // Ограничение границ карты
            const limit = MAP_SIZE / 2 - 1;
            player.position.x = Math.max(-limit, Math.min(limit, player.position.x));
            player.position.z = Math.max(-limit, Math.min(limit, player.position.z));

            // Камера следует за игроком (вид от 3-го лица сверху-сзади)
            // Жесткая привязка, чтобы камера не отдалялась сама по себе
            const relativeCameraOffset = new THREE.Vector3(0, 8, 12);
            const cameraOffset = relativeCameraOffset.applyMatrix4(player.matrixWorld);
            
            camera.position.copy(cameraOffset);
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }

        // Адаптация под размер окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
