<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Изометрическая Сцена</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
        }
        #info h3 {
            margin-bottom: 10px;
        }
        #info p {
            margin: 5px 0;
            font-size: 14px;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>Управление</h3>
        <p>W / Стрелка вверх - Вперёд</p>
        <p>S / Стрелка вниз - Назад</p>
        <p>A / Стрелка влево - Влево</p>
        <p>D / Стрелка вправо - Вправо</p>
        <p>ЛКМ / Пробел - Стрелять краской (в направлении курсора)</p>
        <p style="color: #00ffff;">🎨 Краска закрашивает поверхность!</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Инициализация сцены
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        // Камера с изометрической проекцией (ортографическая)
        const aspect = window.innerWidth / window.innerHeight;
        const d = 20;
        const camera = new THREE.OrthographicCamera(
            -d * aspect, d * aspect, d, -d, 1, 1000
        );
        
        // Изометрический угол
        camera.position.set(20, 20, 20);
        camera.lookAt(scene.position);

        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        // Земля (плоскость) - создаём с canvas текстурой для динамического окрашивания
        const groundCanvas = document.createElement('canvas');
        groundCanvas.width = 1024;
        groundCanvas.height = 1024;
        const groundCtx = groundCanvas.getContext('2d');
        
        // Изначальный зелёный фон
        groundCtx.fillStyle = '#3a7d3a';
        groundCtx.fillRect(0, 0, 1024, 1024);
        
        const groundTexture = new THREE.CanvasTexture(groundCanvas);
        groundTexture.needsUpdate = true;
        
        const groundGeometry = new THREE.PlaneGeometry(50, 50);
        const groundMaterial = new THREE.MeshLambertMaterial({ 
            map: groundTexture,
            color: 0xffffff
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Сетка на земле
        const gridHelper = new THREE.GridHelper(50, 10, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Создаём персонажа (группа объектов)
        const player = new THREE.Group();

        // Тело
        const bodyGeometry = new THREE.BoxGeometry(1, 1.5, 0.6);
        const bodyMaterial = new THREE.MeshLambertMaterial({ color: 0xff6b6b });
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        body.position.y = 0.75;
        body.castShadow = true;
        player.add(body);

        // Голова
        const headGeometry = new THREE.BoxGeometry(0.7, 0.7, 0.7);
        const headMaterial = new THREE.MeshLambertMaterial({ color: 0xffccaa });
        const head = new THREE.Mesh(headGeometry, headMaterial);
        head.position.y = 1.85;
        head.castShadow = true;
        player.add(head);

        // Ноги
        const legGeometry = new THREE.BoxGeometry(0.3, 0.7, 0.3);
        const legMaterial = new THREE.MeshLambertMaterial({ color: 0x4a4a4a });
        
        const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
        leftLeg.position.set(-0.25, 0.35, 0);
        leftLeg.castShadow = true;
        player.add(leftLeg);

        const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
        rightLeg.position.set(0.25, 0.35, 0);
        rightLeg.castShadow = true;
        player.add(rightLeg);

        scene.add(player);

        // Добавим несколько декоративных объектов
        function createTree(x, z) {
            const treeGroup = new THREE.Group();
            
            // Ствол
            const trunkGeometry = new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8);
            const trunkMaterial = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = 0.75;
            trunk.castShadow = true;
            treeGroup.add(trunk);

            // Крона
            const leavesGeometry = new THREE.ConeGeometry(1, 2, 8);
            const leavesMaterial = new THREE.MeshLambertMaterial({ color: 0x228b22 });
            const leaves = new THREE.Mesh(leavesGeometry, leavesMaterial);
            leaves.position.y = 2.5;
            leaves.castShadow = true;
            treeGroup.add(leaves);

            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);
        }

        // Создаём несколько деревьев
        createTree(-8, -8);
        createTree(8, -6);
        createTree(-6, 8);
        createTree(7, 7);
        createTree(-10, 5);
        createTree(10, -10);

        // Добавим камни
        function createRock(x, z) {
            const rockGeometry = new THREE.DodecahedronGeometry(0.5, 0);
            const rockMaterial = new THREE.MeshLambertMaterial({ color: 0x808080 });
            const rock = new THREE.Mesh(rockGeometry, rockMaterial);
            rock.position.set(x, 0.3, z);
            rock.scale.set(1 + Math.random() * 0.5, 0.8 + Math.random() * 0.4, 1 + Math.random() * 0.5);
            rock.castShadow = true;
            scene.add(rock);
        }

        createRock(-5, -3);
        createRock(6, 4);
        createRock(-3, 6);
        createRock(4, -8);

        // Массив для хранения следов краски
        const paintMarks = [];
        const paintColor = 0x00ffff; // Ярко-голубой цвет краски (как в Splatoon)
        
        // Переменные для мыши
        const mouse = new THREE.Vector2();
        let targetPoint = new THREE.Vector3(0, 0, 0);
        
        // Текстура для основного пятна краски
        function createPaintTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            // Создаём сложную форму пятна с неровными краями
            const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
            gradient.addColorStop(0, 'rgba(0, 255, 255, 1)');
            gradient.addColorStop(0.4, 'rgba(0, 255, 255, 0.9)');
            gradient.addColorStop(0.7, 'rgba(0, 255, 255, 0.6)');
            gradient.addColorStop(1, 'rgba(0, 255, 255, 0)');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(128, 128, 128, 0, Math.PI * 2);
            ctx.fill();
            
            // Добавляем случайные выступы по краям для неровной формы
            for (let i = 0; i < 30; i++) {
                const angle = (Math.PI * 2 * i) / 30 + Math.random() * 0.3;
                const radius = 100 + Math.random() * 40;
                const x = 128 + Math.cos(angle) * radius;
                const y = 128 + Math.sin(angle) * radius;
                const blobSize = 15 + Math.random() * 25;
                
                const blobGradient = ctx.createRadialGradient(x, y, 0, x, y, blobSize);
                blobGradient.addColorStop(0, 'rgba(0, 255, 255, 0.7)');
                blobGradient.addColorStop(1, 'rgba(0, 255, 255, 0)');
                
                ctx.fillStyle = blobGradient;
                ctx.beginPath();
                ctx.arc(x, y, blobSize, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Добавляем мелкие брызги вокруг
            for (let i = 0; i < 50; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = 80 + Math.random() * 100;
                const x = 128 + Math.cos(angle) * distance;
                const y = 128 + Math.sin(angle) * distance;
                const radius = Math.random() * 6 + 2;
                
                ctx.fillStyle = `rgba(0, 255, 255, ${Math.random() * 0.5 + 0.2})`;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }
        
        // Текстура для мелких брызг
        function createSplatterTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            // Несколько пятен разного размера
            for (let i = 0; i < 8; i++) {
                const x = Math.random() * 128;
                const y = Math.random() * 128;
                const radius = Math.random() * 20 + 8;
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                gradient.addColorStop(0, `rgba(0, 255, 255, ${Math.random() * 0.6 + 0.4})`);
                gradient.addColorStop(1, 'rgba(0, 255, 255, 0)');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }
        
        const paintTexture = createPaintTexture();
        const splatterTexture = createSplatterTexture();
        
        // Карта краски для отслеживания покрытия поверхности
        const paintMap = new Map();
        const PAINT_GRID_SIZE = 0.5; // Размер ячейки сетки краски

        // Текущее направление персонажа (по умолчанию смотрит вниз-вправо по экрану)
        let playerDirection = new THREE.Vector3(1, 0, -1).normalize();

        // Обработка движения мыши для определения направления стрельбы
        document.addEventListener('mousemove', (event) => {
            // Нормализованные координаты мыши (-1 до +1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Создаем луч из камеры через позицию мыши
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            // Находим пересечение с землей
            const intersects = raycaster.intersectObject(ground);
            
            if (intersects.length > 0) {
                targetPoint.copy(intersects[0].point);
            }
        });

        // Функция выстрела краской - теперь стреляем точно в точку под курсором
        function shootPaint() {
            // Точка начала луча - позиция игрока + смещение вверх (откуда стреляет)
            const rayOrigin = player.position.clone();
            rayOrigin.y = 1.2; // Высота "руки" или оружия

            // Вычисляем направление от игрока к точке под курсором мыши
            const shootDirection = new THREE.Vector3();
            shootDirection.subVectors(targetPoint, rayOrigin).normalize();
            
            // Поднимаем немного направление, чтобы краска летела по дуге
            shootDirection.y = 0.4;

            // Используем Raycaster для определения попадания в землю
            const raycaster = new THREE.Raycaster(rayOrigin, shootDirection);

            const intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0) {
                const hitPoint = intersects[0].point;

                // Создаём основное пятно краски
                createPaintSplat(hitPoint, 1.5 + Math.random() * 0.8);
                
                // Добавляем несколько мелких брызг вокруг
                for (let i = 0; i < 5; i++) {
                    const offsetAngle = Math.random() * Math.PI * 2;
                    const offsetDistance = Math.random() * 1.5 + 0.5;
                    const splatPoint = hitPoint.clone();
                    splatPoint.x += Math.cos(offsetAngle) * offsetDistance;
                    splatPoint.z += Math.sin(offsetAngle) * offsetDistance;
                    createPaintSplat(splatPoint, 0.6 + Math.random() * 0.5, true);
                }

                // Окрашиваем поверхность в области попадания (симуляция покрытия)
                markAreaAsPainted(hitPoint, 2.0);
            }

            // Добавляем эффект частиц при выстреле
            createPaintParticles(rayOrigin, shootDirection);
        }
        
        // Функция создания пятна краски
        function createPaintSplat(position, scale, isSplatter = false) {
            const texture = isSplatter ? splatterTexture : paintTexture;
            const paintSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
                map: texture, 
                color: paintColor,
                transparent: true,
                opacity: isSplatter ? 0.85 : 0.95,
                depthTest: true,
                depthWrite: false
            }));

            paintSprite.position.copy(position);
            paintSprite.position.y += 0.05; // Чуть выше поверхности чтобы не мерцало
            paintSprite.scale.set(scale, scale, 1);
            paintSprite.material.rotation = Math.random() * Math.PI * 2;

            scene.add(paintSprite);
            paintMarks.push(paintSprite);

            // Ограничиваем количество пятен (удаляем старые)
            if (paintMarks.length > 200) {
                const oldMark = paintMarks.shift();
                scene.remove(oldMark);
                oldMark.material.map.dispose();
                oldMark.material.dispose();
            }
        }
        
        // Функция для рисования краски на текстуре земли
        function drawPaintOnGround(worldX, worldZ, radius) {
            // Конвертируем мировые координаты в координаты канваса
            const canvasX = ((worldX + 25) / 50) * 1024;
            const canvasY = ((worldZ + 25) / 50) * 1024;
            
            // Рисуем круг с неровными краями
            groundCtx.save();
            
            // Основной круг с более яркими цветами и большим размером
            const gradient = groundCtx.createRadialGradient(
                canvasX, canvasY, 0,
                canvasX, canvasY, radius * 30
            );
            gradient.addColorStop(0, 'rgba(0, 255, 255, 1)');
            gradient.addColorStop(0.3, 'rgba(0, 255, 255, 0.95)');
            gradient.addColorStop(0.6, 'rgba(0, 255, 255, 0.8)');
            gradient.addColorStop(1, 'rgba(0, 255, 255, 0)');
            
            groundCtx.fillStyle = gradient;
            groundCtx.beginPath();
            groundCtx.arc(canvasX, canvasY, radius * 30, 0, Math.PI * 2);
            groundCtx.fill();
            
            // Добавляем случайные выступы по краям для реалистичности
            for (let i = 0; i < 25; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = radius * 25 * (0.6 + Math.random() * 0.4);
                const blobRadius = radius * 20 * (0.4 + Math.random() * 0.4);
                const blobX = canvasX + Math.cos(angle) * dist;
                const blobY = canvasY + Math.sin(angle) * dist;
                
                const blobGradient = groundCtx.createRadialGradient(
                    blobX, blobY, 0,
                    blobX, blobY, blobRadius
                );
                blobGradient.addColorStop(0, 'rgba(0, 255, 255, 0.85)');
                blobGradient.addColorStop(1, 'rgba(0, 255, 255, 0)');
                
                groundCtx.fillStyle = blobGradient;
                groundCtx.beginPath();
                groundCtx.arc(blobX, blobY, blobRadius, 0, Math.PI * 2);
                groundCtx.fill();
            }
            
            groundCtx.restore();
            groundTexture.needsUpdate = true;
        }
        
        // Функция отметки области как окрашенной (для симуляции покрытия поверхности)
        function markAreaAsPainted(centerPoint, radius) {
            // Рисуем краску непосредственно на текстуре земли
            drawPaintOnGround(centerPoint.x, centerPoint.z, radius);
            
            const gridX = Math.floor(centerPoint.x / PAINT_GRID_SIZE);
            const gridZ = Math.floor(centerPoint.z / PAINT_GRID_SIZE);
            const gridRadius = Math.ceil(radius / PAINT_GRID_SIZE);
            
            // Отмечаем ячейки в радиусе как окрашенные
            for (let x = -gridRadius; x <= gridRadius; x++) {
                for (let z = -gridRadius; z <= gridRadius; z++) {
                    const checkX = gridX + x;
                    const checkZ = gridZ + z;
                    const key = `${checkX},${checkZ}`;
                    
                    const dist = Math.sqrt(x * x + z * z) * PAINT_GRID_SIZE;
                    if (dist <= radius) {
                        // Если ячейка ещё не окрашена или обновляем существующую
                        if (!paintMap.has(key) || paintMap.get(key) < 1) {
                            paintMap.set(key, Math.min(1, (paintMap.get(key) || 0) + 0.3));
                        }
                    }
                }
            }
        }
        
        // Эффект частиц краски при выстреле
        const paintParticles = [];
        
        function createPaintParticles(origin, direction) {
            const particleCount = 8;
            const particleGeometry = new THREE.BoxGeometry(0.15, 0.15, 0.15);
            const particleMaterial = new THREE.MeshBasicMaterial({ color: paintColor });
            
            for (let i = 0; i < particleCount; i++) {
                const particle = new THREE.Mesh(particleGeometry, particleMaterial.clone());
                particle.position.copy(origin);
                
                // Случайное отклонение от направления выстрела
                particle.userData.velocity = new THREE.Vector3(
                    direction.x + (Math.random() - 0.5) * 0.3,
                    0.2 + Math.random() * 0.3,
                    direction.z + (Math.random() - 0.5) * 0.3
                );
                particle.userData.life = 1.0;
                
                scene.add(particle);
                paintParticles.push(particle);
            }
        }
        
        // Обновление частиц
        function updatePaintParticles() {
            for (let i = paintParticles.length - 1; i >= 0; i--) {
                const particle = paintParticles[i];
                particle.userData.life -= 0.03;
                
                if (particle.userData.life <= 0) {
                    scene.remove(particle);
                    particle.geometry.dispose();
                    particle.material.dispose();
                    paintParticles.splice(i, 1);
                    continue;
                }
                
                // Движение частицы
                particle.position.add(particle.userData.velocity.clone().multiplyScalar(0.4));
                particle.userData.velocity.y -= 0.02; // Гравитация
                
                // Уменьшение размера
                const scale = particle.userData.life;
                particle.scale.set(scale, scale, scale);
                
                // Поворот
                particle.rotation.x += 0.1;
                particle.rotation.y += 0.1;
            }
        }

        // Управление
        const keys = {
            w: false,
            a: false,
            s: false,
            d: false,
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };

        let isShooting = false;
        let shootCooldown = 0;
        const shootDelay = 8; // Задержка между выстрелами (чем меньше, тем быстрее)

        document.addEventListener('keydown', (event) => {
            // Обработка движения
            if (keys.hasOwnProperty(event.key)) {
                keys[event.key] = true;
            }
            // Обработка начала стрельбы (Пробел)
            if (event.code === 'Space') {
                isShooting = true;
            }
        });

        document.addEventListener('keyup', (event) => {
            // Обработка движения
            if (keys.hasOwnProperty(event.key)) {
                keys[event.key] = false;
            }
            // Остановка стрельбы при отпускании пробела
            if (event.code === 'Space') {
                isShooting = false;
            }
        });

        // Стрельба по клику мыши (начало)
        document.addEventListener('mousedown', (event) => {
            if (event.button === 0) { // Левая кнопка мыши
                isShooting = true;
            }
        });

        // Остановка стрельбы при отпускании кнопки мыши
        document.addEventListener('mouseup', (event) => {
            if (event.button === 0) { // Левая кнопка мыши
                isShooting = false;
            }
        });

        // Переменные для движения
        let walkCycle = 0;

        // Обработка изменения размера окна
        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Анимация
        function animate() {
            requestAnimationFrame(animate);

            let isMoving = false;
            const moveSpeed = 0.15;

            // Движение персонажа в изометрической проекции
            // В изометрии: 
            // - Вверх по экрану = комбинация -X и -Z
            // - Вниз по экрану = комбинация +X и +Z
            // - Влево по экрану = комбинация -X и +Z
            // - Вправо по экрану = комбинация +X и -Z
            
            if (keys.w || keys.ArrowUp) {
                // Визуально вверх по экрану
                player.position.x -= moveSpeed * Math.cos(Math.PI / 4);
                player.position.z -= moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(-1, 0, -1).normalize();
            }
            if (keys.s || keys.ArrowDown) {
                // Визуально вниз по экрану
                player.position.x += moveSpeed * Math.cos(Math.PI / 4);
                player.position.z += moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(1, 0, 1).normalize();
            }
            if (keys.a || keys.ArrowLeft) {
                // Визуально влево по экрану
                player.position.x -= moveSpeed * Math.cos(Math.PI / 4);
                player.position.z += moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(-1, 0, 1).normalize();
            }
            if (keys.d || keys.ArrowRight) {
                // Визуально вправо по экрану
                player.position.x += moveSpeed * Math.cos(Math.PI / 4);
                player.position.z -= moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(1, 0, -1).normalize();
            }

            // Ограничение движения границами земли
            player.position.x = Math.max(-24, Math.min(24, player.position.x));
            player.position.z = Math.max(-24, Math.min(24, player.position.z));

            // Поворот персонажа за мышкой (всегда, независимо от движения)
            // Вычисляем направление от игрока к точке под мышкой
            const directionToMouse = new THREE.Vector3()
                .subVectors(targetPoint, player.position)
                .normalize();
            
            // Обновляем направление персонажа (только по горизонтали)
            playerDirection.set(directionToMouse.x, 0, directionToMouse.z).normalize();
            
            // Поворачиваем персонажа в направлении мыши
            if (directionToMouse.length() > 0.01) {
                const targetRotation = Math.atan2(directionToMouse.x, directionToMouse.z);
                player.rotation.y = targetRotation;
            }

            // Анимация ходьбы
            if (isMoving) {
                walkCycle += 0.2;
                leftLeg.rotation.x = Math.sin(walkCycle) * 0.5;
                rightLeg.rotation.x = Math.sin(walkCycle + Math.PI) * 0.5;
                
                // Небольшое покачивание тела
                body.position.y = 0.75 + Math.sin(walkCycle * 2) * 0.05;
                head.position.y = 1.85 + Math.sin(walkCycle * 2) * 0.05;
            } else {
                // Возврат ног в исходное положение
                leftLeg.rotation.x = THREE.MathUtils.lerp(leftLeg.rotation.x, 0, 0.1);
                rightLeg.rotation.x = THREE.MathUtils.lerp(rightLeg.rotation.x, 0, 0.1);
                body.position.y = THREE.MathUtils.lerp(body.position.y, 0.75, 0.1);
                head.position.y = THREE.MathUtils.lerp(head.position.y, 1.85, 0.1);
            }

            // Камера следует за игроком
            camera.position.x = player.position.x + 20;
            camera.position.z = player.position.z + 20;
            camera.position.y = 20;
            camera.lookAt(player.position);

            // Обновление частиц краски
            updatePaintParticles();

            // Обработка непрерывной стрельбы
            if (isShooting) {
                if (shootCooldown <= 0) {
                    shootPaint();
                    shootCooldown = shootDelay;
                } else {
                    shootCooldown--;
                }
            }
            
            // Визуализация направления стрельбы (линия от игрока к точке прицеливания)
            // Можно раскомментировать для отладки
            /*
            const debugHelper = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([
                    player.position.clone().add(new THREE.Vector3(0, 1.2, 0)),
                    targetPoint
                ]),
                new THREE.LineBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.5 })
            );
            scene.add(debugHelper);
            */

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
