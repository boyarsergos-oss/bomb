<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Maze - 3D Puzzle Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #0a0a0f;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 100;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }
        #levelInfo {
            font-size: 24px;
            margin-bottom: 10px;
        }
        #moves {
            font-size: 18px;
            color: #0ff;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 14px;
            text-align: center;
        }
        #winMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0ff;
            font-size: 48px;
            text-align: center;
            text-shadow: 0 0 30px rgba(0, 255, 255, 1);
            display: none;
            z-index: 200;
        }
        #nextLevelBtn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(45deg, #0ff, #0088ff);
            border: none;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        #nextLevelBtn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="levelInfo">Уровень: <span id="levelNum">1</span></div>
        <div id="moves">Ходы: <span id="moveCount">0</span></div>
    </div>
    <div id="instructions">
        🎮 ЛКМ + драг: Вращать мир | R: Рестарт уровня
    </div>
    <div id="winMessage">
        🎉 УРОВЕНЬ ПРОЙДЕН! 🎉<br>
        <button id="nextLevelBtn">Следующий уровень</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // === Глобальные переменные ===
        let scene, camera, renderer, controls;
        let ball, goal, platforms = [], obstacles = [];
        let currentLevel = 1;
        let moves = 0;
        let isBallMoving = false;
        let ballVelocity = new THREE.Vector3();
        let lastMousePos = { x: 0, y: 0 };
        let isDragging = false;
        let worldGroup;
        
        const canvas = document.getElementById('gameCanvas');
        const winMessage = document.getElementById('winMessage');
        const nextLevelBtn = document.getElementById('nextLevelBtn');
        const levelNumEl = document.getElementById('levelNum');
        const moveCountEl = document.getElementById('moveCount');

        // === Уровни ===
        const levels = [
            {
                // Уровень 1: Обучение
                platforms: [
                    { pos: [0, 0, 0], size: [10, 1, 10], color: 0x2244aa }
                ],
                ballStart: [-3, 1, -3],
                goalPos: [3, 0.5, 3],
                obstacles: []
            },
            {
                // Уровень 2: Две платформы
                platforms: [
                    { pos: [-5, 0, 0], size: [6, 1, 6], color: 0x2244aa },
                    { pos: [5, -2, 0], size: [6, 1, 6], color: 0x2266cc }
                ],
                ballStart: [-5, 1, -2],
                goalPos: [5, -1.5, 2],
                obstacles: []
            },
            {
                // Уровень 3: С препятствием
                platforms: [
                    { pos: [0, 0, 0], size: [12, 1, 12], color: 0x2244aa }
                ],
                ballStart: [-4, 1, -4],
                goalPos: [4, 0.5, 4],
                obstacles: [
                    { pos: [0, 0.5, 0], size: [2, 1, 8], color: 0xff4444 }
                ]
            },
            {
                // Уровень 4: Лестница
                platforms: [
                    { pos: [-6, 0, 0], size: [5, 1, 5], color: 0x2244aa },
                    { pos: [-2, -1, 0], size: [5, 1, 5], color: 0x2266cc },
                    { pos: [2, -2, 0], size: [5, 1, 5], color: 0x2288ee },
                    { pos: [6, -3, 0], size: [5, 1, 5], color: 0x22aaff }
                ],
                ballStart: [-6, 1, 0],
                goalPos: [6, -2.5, 0],
                obstacles: []
            },
            {
                // Уровень 5: Лабиринт
                platforms: [
                    { pos: [0, 0, 0], size: [15, 1, 15], color: 0x2244aa }
                ],
                ballStart: [-5, 1, -5],
                goalPos: [5, 0.5, 5],
                obstacles: [
                    { pos: [-2, 0.5, -3], size: [1, 1, 8], color: 0xff4444 },
                    { pos: [2, 0.5, 3], size: [1, 1, 8], color: 0xff4444 },
                    { pos: [-3, 0.5, 3], size: [8, 1, 1], color: 0xff4444 },
                    { pos: [3, 0.5, -3], size: [8, 1, 1], color: 0xff4444 }
                ]
            },
            {
                // Уровень 6: Узкий мост
                platforms: [
                    { pos: [-7, 0, 0], size: [5, 1, 5], color: 0x2244aa },
                    { pos: [0, -1, 0], size: [3, 1, 12], color: 0x2266cc },
                    { pos: [7, -2, 0], size: [5, 1, 5], color: 0x2288ee }
                ],
                ballStart: [-7, 1, 0],
                goalPos: [7, -1.5, 0],
                obstacles: []
            },
            {
                // Уровень 7: Кольцо препятствий
                platforms: [
                    { pos: [0, 0, 0], size: [16, 1, 16], color: 0x2244aa }
                ],
                ballStart: [-6, 1, 0],
                goalPos: [6, 0.5, 0],
                obstacles: [
                    { pos: [-3, 0.5, -2], size: [1, 1, 5], color: 0xff4444 },
                    { pos: [-3, 0.5, 2], size: [1, 1, 5], color: 0xff4444 },
                    { pos: [3, 0.5, -2], size: [1, 1, 5], color: 0xff4444 },
                    { pos: [3, 0.5, 2], size: [1, 1, 5], color: 0xff4444 },
                    { pos: [0, 0.5, -4], size: [5, 1, 1], color: 0xff4444 },
                    { pos: [0, 0.5, 4], size: [5, 1, 1], color: 0xff4444 }
                ]
            },
            {
                // Уровень 8: Спираль вниз
                platforms: [
                    { pos: [-8, 0, -8], size: [4, 1, 4], color: 0x2244aa },
                    { pos: [-4, -1, -4], size: [4, 1, 4], color: 0x2266cc },
                    { pos: [0, -2, 0], size: [4, 1, 4], color: 0x2288ee },
                    { pos: [4, -3, 4], size: [4, 1, 4], color: 0x22aaff },
                    { pos: [8, -4, 8], size: [4, 1, 4], color: 0x22ccff }
                ],
                ballStart: [-8, 1, -8],
                goalPos: [8, -3.5, 8],
                obstacles: []
            }
        ];

        // === Инициализация ===
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);
            scene.fog = new THREE.Fog(0x0a0a0f, 20, 50);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 20);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxDistance = 40;
            controls.minDistance = 5;

            // Освещение
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0x00ffff, 0.5, 50);
            pointLight.position.set(0, 10, 0);
            scene.add(pointLight);

            // Создаём группу для мира (всё что вращается)
            worldGroup = new THREE.Group();
            scene.add(worldGroup);

            // Звёзды на фоне
            createStars();

            loadLevel(currentLevel);
            setupEventListeners();
            animate();
        }

        function createStars() {
            const starGeometry = new THREE.BufferGeometry();
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
            const starVertices = [];
            for (let i = 0; i < 2000; i++) {
                const x = (Math.random() - 0.5) * 200;
                const y = (Math.random() - 0.5) * 200;
                const z = (Math.random() - 0.5) * 200;
                starVertices.push(x, y, z);
            }
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        }

        // === Загрузка уровня ===
        function loadLevel(levelIndex) {
            if (levelIndex > levels.length) {
                winMessage.innerHTML = '🏆 ВЫ ПРОШЛИ ВСЕ УРОВНИ! 🏆<br><br>Вы настоящий мастер гравитации!';
                winMessage.style.display = 'block';
                nextLevelBtn.style.display = 'none';
                return;
            }

            // Очистка сцены
            worldGroup.clear();
            platforms = [];
            obstacles = [];
            if (ball) scene.remove(ball);
            if (goal) scene.remove(goal);
            
            moves = 0;
            isBallMoving = false;
            ballVelocity.set(0, 0, 0);
            
            updateUI();
            winMessage.style.display = 'none';

            const level = levels[levelIndex - 1];

            // Создание платформ
            level.platforms.forEach(platformData => {
                const geometry = new THREE.BoxGeometry(...platformData.size);
                const material = new THREE.MeshStandardMaterial({ 
                    color: platformData.color,
                    metalness: 0.3,
                    roughness: 0.7
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(...platformData.pos);
                mesh.receiveShadow = true;
                mesh.castShadow = true;
                worldGroup.add(mesh);
                
                // Добавляем сетку для визуального эффекта
                const edges = new THREE.EdgesGeometry(geometry);
                const lineMaterial = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.3 });
                const wireframe = new THREE.LineSegments(edges, lineMaterial);
                mesh.add(wireframe);
                
                platforms.push({ mesh, size: platformData.size, pos: platformData.pos });
            });

            // Создание препятствий
            level.obstacles.forEach(obsData => {
                const geometry = new THREE.BoxGeometry(...obsData.size);
                const material = new THREE.MeshStandardMaterial({ 
                    color: obsData.color,
                    emissive: 0x440000,
                    metalness: 0.5,
                    roughness: 0.5
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(...obsData.pos);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                worldGroup.add(mesh);
                
                // Пульсирующее свечение
                mesh.userData = { pulse: 0 };
                
                obstacles.push({ mesh, size: obsData.size, pos: obsData.pos });
            });

            // Создание мяча
            const ballGeometry = new THREE.SphereGeometry(0.4, 32, 32);
            const ballMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x00ff88,
                metalness: 0.8,
                roughness: 0.2,
                emissive: 0x00ff88,
                emissiveIntensity: 0.3
            });
            ball = new THREE.Mesh(ballGeometry, ballMaterial);
            ball.position.set(...level.ballStart);
            ball.castShadow = true;
            scene.add(ball);

            // Создание цели
            const goalGeometry = new THREE.TorusGeometry(0.6, 0.1, 16, 32);
            const goalMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xff00ff,
                emissive: 0xff00ff,
                emissiveIntensity: 0.8
            });
            goal = new THREE.Mesh(goalGeometry, goalMaterial);
            goal.position.set(...level.goalPos);
            goal.rotation.x = Math.PI / 2;
            worldGroup.add(goal);
            
            // Анимация появления
            animateGoal();
        }

        function animateGoal() {
            if (goal) {
                goal.rotation.z += 0.02;
                goal.scale.setScalar(1 + Math.sin(Date.now() * 0.003) * 0.1);
            }
            requestAnimationFrame(() => {
                if (goal) animateGoal();
            });
        }

        // === Обработчики событий ===
        function setupEventListeners() {
            window.addEventListener('resize', onWindowResize);
            
            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                lastMousePos = { x: e.clientX, y: e.clientY };
            });
            
            canvas.addEventListener('mouseup', () => {
                isDragging = false;
            });
            
            canvas.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                const deltaX = e.clientX - lastMousePos.x;
                const deltaY = e.clientY - lastMousePos.y;
                
                // Быстрое движение мышью вызывает вращение мира
                if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
                    rotateWorld(deltaX * 0.5, deltaY * 0.5);
                    moves++;
                    updateUI();
                }
                
                lastMousePos = { x: e.clientX, y: e.clientY };
            });

            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
            }, { passive: false });

            document.addEventListener('keydown', (e) => {
                if (e.key.toLowerCase() === 'r') {
                    resetBall();
                }
            });

            nextLevelBtn.addEventListener('click', () => {
                currentLevel++;
                loadLevel(currentLevel);
            });
        }

        function rotateWorld(dx, dy) {
            // Вращаем весь мир
            worldGroup.rotation.y += dx * 0.01;
            worldGroup.rotation.x += dy * 0.01;
            
            // Обновляем позиции платформ и препятствий в мировых координатах
            platforms.forEach(p => {
                const worldPos = new THREE.Vector3();
                p.mesh.getWorldPosition(worldPos);
                p.pos = [worldPos.x, worldPos.y, worldPos.z];
            });
            
            obstacles.forEach(o => {
                const worldPos = new THREE.Vector3();
                o.mesh.getWorldPosition(worldPos);
                o.pos = [worldPos.x, worldPos.y, worldPos.z];
            });
            
            if (goal) {
                const worldPos = new THREE.Vector3();
                goal.getWorldPosition(worldPos);
                goal.userData.worldPos = worldPos;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function resetBall() {
            const level = levels[currentLevel - 1];
            ball.position.set(...level.ballStart);
            ballVelocity.set(0, 0, 0);
            isBallMoving = false;
            moves = 0;
            updateUI();
        }

        function updateUI() {
            levelNumEl.textContent = currentLevel;
            moveCountEl.textContent = moves;
        }

        // === Физика и коллизии ===
        function checkCollision(position) {
            const ballRadius = 0.4;
            
            // Проверка коллизий с платформами
            for (const platform of platforms) {
                const [px, py, pz] = platform.pos;
                const [sx, sy, sz] = platform.size;
                
                const halfSX = sx / 2 + ballRadius;
                const halfSY = sy / 2 + ballRadius;
                const halfSZ = sz / 2 + ballRadius;
                
                if (position.x > px - halfSX && position.x < px + halfSX &&
                    position.y > py - halfSY && position.y < py + halfSY &&
                    position.z > pz - halfSZ && position.z < pz + halfSZ) {
                    
                    // Определяем сторону коллизии
                    const dx = Math.abs(position.x - px);
                    const dy = Math.abs(position.y - py);
                    const dz = Math.abs(position.z - pz);
                    
                    if (dy < halfSY - 0.1 && dx < halfSX - 0.1 && dz < halfSZ - 0.1) {
                        return { collided: true, normal: new THREE.Vector3(0, 1, 0) };
                    }
                }
            }
            
            // Проверка коллизий с препятствиями
            for (const obstacle of obstacles) {
                const [ox, oy, oz] = obstacle.pos;
                const [sx, sy, sz] = obstacle.size;
                
                const halfSX = sx / 2 + ballRadius;
                const halfSY = sy / 2 + ballRadius;
                const halfSZ = sz / 2 + ballRadius;
                
                if (position.x > ox - halfSX && position.x < ox + halfSX &&
                    position.y > oy - halfSY && position.y < oy + halfSY &&
                    position.z > oz - halfSZ && position.z < oz + halfSZ) {
                    return { collided: true, normal: null, hitObstacle: true };
                }
            }
            
            return { collided: false };
        }

        function isOnPlatform(position) {
            const ballRadius = 0.4;
            
            for (const platform of platforms) {
                const [px, py, pz] = platform.pos;
                const [sx, sy, sz] = platform.size;
                
                const halfSX = sx / 2 + ballRadius;
                const halfSY = sy / 2;
                const halfSZ = sz / 2 + ballRadius;
                
                if (position.x >= px - halfSX && position.x <= px + halfSX &&
                    position.y >= py - halfSY - 0.1 && position.y <= py + halfSY + ballRadius &&
                    position.z >= pz - halfSZ && position.z <= pz + halfSZ) {
                    return true;
                }
            }
            return false;
        }

        // === Игровой цикл ===
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = 0.016;
            const gravity = 15;
            
            if (!isBallMoving) {
                // Мяч стоит на платформе
                if (!isOnPlatform(ball.position)) {
                    isBallMoving = true;
                }
            }
            
            if (isBallMoving || !isOnPlatform(ball.position)) {
                // Применяем гравитацию
                ballVelocity.y -= gravity * delta;
                
                // Предсказываем следующую позицию
                const nextPosition = ball.position.clone().add(ballVelocity.clone().multiplyScalar(delta));
                
                // Проверяем коллизии
                const collision = checkCollision(nextPosition);
                
                if (collision.hitObstacle) {
                    // Столкновение с препятствием - рестарт
                    resetBall();
                    return;
                }
                
                if (collision.collided) {
                    // Столкновение с платформой
                    if (ballVelocity.y < 0) {
                        ballVelocity.y = -ballVelocity.y * 0.5; // Отскок
                        if (Math.abs(ballVelocity.y) < 1) {
                            ballVelocity.y = 0;
                        }
                        nextPosition.y = ball.position.y;
                    }
                }
                
                // Проверяем, упал ли мяч
                if (nextPosition.y < -20) {
                    resetBall();
                    return;
                }
                
                ball.position.copy(nextPosition);
                isBallMoving = Math.abs(ballVelocity.length()) > 0.1;
            }
            
            // Вращение мяча при движении
            if (isBallMoving) {
                ball.rotation.x += ballVelocity.z * delta;
                ball.rotation.z -= ballVelocity.x * delta;
            }
            
            // Пульсация препятствий
            obstacles.forEach((obs, index) => {
                obs.mesh.userData.pulse += delta;
                const scale = 1 + Math.sin(obs.mesh.userData.pulse * 3 + index) * 0.05;
                obs.mesh.scale.setScalar(scale);
            });
            
            // Проверка победы
            if (goal) {
                const goalWorldPos = new THREE.Vector3();
                goal.getWorldPosition(goalWorldPos);
                if (ball.position.distanceTo(goalWorldPos) < 0.8) {
                    winMessage.style.display = 'block';
                    isBallMoving = false;
                }
            }
            
            controls.update();
            renderer.render(scene, camera);
        }

        // Запуск игры
        init();
    </script>
</body>
</html>
