<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
            pointer-events: none;
        }
        
        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.7);
            z-index: 200;
        }
        
        #game-over-screen {
            display: none;
        }
        
        h1 {
            font-size: 64px;
            color: #FFD700;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        
        p {
            font-size: 24px;
            color: white;
            margin-bottom: 30px;
        }
        
        button {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
        
        #final-score {
            font-size: 36px;
            color: #FFD700;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score-display">0</div>
        
        <div id="start-screen">
            <h1>Flappy Bird 3D</h1>
            <p>Нажми ПРОБЕЛ или кликни мышкой чтобы взлететь</p>
            <button id="start-btn">Начать игру</button>
        </div>
        
        <div id="game-over-screen">
            <h1>Игра окончена!</h1>
            <div id="final-score">Счёт: 0</div>
            <button id="restart-btn">Играть снова</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Игровые переменные
        let scene, camera, renderer;
        let bird;
        let pipes = [];
        let score = 0;
        let gameActive = false;
        let birdVelocity = 0;
        // Физика точно как в Flappy Bird
        const gravity = 0.25;
        const jumpStrength = -6.0;
        const pipeSpeed = 0.08;
        const pipeSpawnInterval = 1500;
        let lastPipeTime = 0;
        
        // Элементы UI
        const scoreDisplay = document.getElementById('score-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const finalScore = document.getElementById('final-score');
        
        // Инициализация сцены
        function init() {
            // Создание сцены
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 50);
            
            // Настройка камеры (вид от 3-го лица сзади)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(-3, 0, 0);
            camera.lookAt(0, 0, 0);
            
            // Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('game-container').appendChild(renderer.domElement);
            
            // Освещение
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
            
            // Создание птицы
            createBird();
            
            // Земля
            createGround();
            
            // Обработчики событий
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('mousedown', onMouseDown);
            startBtn.addEventListener('click', startGame);
            restartBtn.addEventListener('click', restartGame);
            
            // Запуск анимации
            animate();
        }
        
        function createBird() {
            // Тело птицы
            const bodyGeometry = new THREE.SphereGeometry(0.5, 32, 32);
            const bodyMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xFFD700,
                shininess: 100
            });
            bird = new THREE.Mesh(bodyGeometry, bodyMaterial);
            bird.castShadow = true;
            bird.receiveShadow = true;
            
            // Глаза
            const eyeGeometry = new THREE.SphereGeometry(0.15, 16, 16);
            const eyeMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });
            
            const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            leftEye.position.set(0.3, 0.15, 0.2);
            bird.add(leftEye);
            
            const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            rightEye.position.set(0.3, 0.15, -0.2);
            bird.add(rightEye);
            
            // Клюв
            const beakGeometry = new THREE.ConeGeometry(0.15, 0.4, 8);
            const beakMaterial = new THREE.MeshPhongMaterial({ color: 0xFF6347 });
            const beak = new THREE.Mesh(beakGeometry, beakMaterial);
            beak.rotation.x = Math.PI / 2;
            beak.position.set(0.5, 0, 0);
            bird.add(beak);
            
            // Крылья
            const wingGeometry = new THREE.BoxGeometry(0.3, 0.6, 0.1);
            const wingMaterial = new THREE.MeshPhongMaterial({ color: 0xFFA500 });
            
            const leftWing = new THREE.Mesh(wingGeometry, wingMaterial);
            leftWing.position.set(-0.2, 0, 0.35);
            bird.add(leftWing);
            
            const rightWing = new THREE.Mesh(wingGeometry, wingMaterial);
            rightWing.position.set(-0.2, 0, -0.35);
            bird.add(rightWing);
            
            bird.position.set(0, 0, 0);
            scene.add(bird);
        }
        
        function createGround() {
            const groundGeometry = new THREE.PlaneGeometry(100, 20);
            const groundMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x228B22,
                side: THREE.DoubleSide
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -5;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Небо/облака
            for (let i = 0; i < 20; i++) {
                const cloudGeometry = new THREE.SphereGeometry(1 + Math.random(), 8, 8);
                const cloudMaterial = new THREE.MeshPhongMaterial({ 
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.8
                });
                const cloud = new THREE.Mesh(cloudGeometry, cloudMaterial);
                cloud.position.set(
                    -20 - Math.random() * 30,
                    3 + Math.random() * 5,
                    (Math.random() - 0.5) * 20
                );
                scene.add(cloud);
            }
        }
        
        function createPipe() {
            const pipeGap = 3.5;
            const pipeWidth = 1.5;
            const pipeDepth = 1.5;
            const minHeight = -2;
            const maxHeight = 3;
            
            const gapHeight = (Math.random() * (maxHeight - minHeight)) + minHeight;
            
            // Материал трубы
            const pipeMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x2E8B57,
                shininess: 50
            });
            
            // Верхняя труба
            const topPipeGeometry = new THREE.BoxGeometry(pipeWidth, 10, pipeDepth);
            const topPipe = new THREE.Mesh(topPipeGeometry, pipeMaterial);
            topPipe.position.set(30, gapHeight + pipeGap / 2 + 5, 0);
            topPipe.castShadow = true;
            topPipe.receiveShadow = true;
            scene.add(topPipe);
            
            // Нижняя труба
            const bottomPipeGeometry = new THREE.BoxGeometry(pipeWidth, 10, pipeDepth);
            const bottomPipe = new THREE.Mesh(bottomPipeGeometry, pipeMaterial);
            bottomPipe.position.set(30, gapHeight - pipeGap / 2 - 5, 0);
            bottomPipe.castShadow = true;
            bottomPipe.receiveShadow = true;
            scene.add(bottomPipe);
            
            pipes.push({
                top: topPipe,
                bottom: bottomPipe,
                passed: false,
                gapHeight: gapHeight,
                gapSize: pipeGap
            });
        }
        
        function startGame() {
            gameActive = true;
            startScreen.style.display = 'none';
            resetGame();
        }
        
        function restartGame() {
            gameActive = true;
            gameOverScreen.style.display = 'none';
            resetGame();
        }
        
        function resetGame() {
            // Сброс позиции птицы
            bird.position.set(0, 0, 0);
            birdVelocity = 0;
            bird.rotation.z = 0;
            
            // Удаление всех труб
            pipes.forEach(pipe => {
                scene.remove(pipe.top);
                scene.remove(pipe.bottom);
            });
            pipes = [];
            
            // Сброс счета
            score = 0;
            scoreDisplay.textContent = score;
            
            // Сброс таймера создания труб - устанавливаем время в будущее, 
            // чтобы первая труба появилась только через pipeSpawnInterval
            lastPipeTime = Date.now() + pipeSpawnInterval;
            
            // Принудительно обновляем матрицы птицы для корректного расчета коллизий
            bird.updateMatrixWorld(true);
        }
        
        function gameOver() {
            gameActive = false;
            finalScore.textContent = `Счёт: ${score}`;
            gameOverScreen.style.display = 'flex';
        }
        
        function jump() {
            if (gameActive) {
                birdVelocity = jumpStrength;
            }
        }
        
        function onKeyDown(event) {
            if (event.code === 'Space') {
                event.preventDefault();
                jump();
            }
        }
        
        function onMouseDown(event) {
            if (event.target.tagName !== 'BUTTON') {
                jump();
            }
        }
        
        function checkCollision(pipe) {
            const birdBox = new THREE.Box3().setFromObject(bird);
            const topPipeBox = new THREE.Box3().setFromObject(pipe.top);
            const bottomPipeBox = new THREE.Box3().setFromObject(pipe.bottom);
            
            // Уменьшаем хитбокс птицы для более честной коллизии
            birdBox.expandByScalar(-0.1);
            
            return birdBox.intersectsBox(topPipeBox) || birdBox.intersectsBox(bottomPipeBox);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.projectionMatrix.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (gameActive) {
                // Физика птицы (точно как в Flappy Bird)
                birdVelocity -= gravity;
                bird.position.y += birdVelocity;
                
                // Вращение птицы в зависимости от скорости
                bird.rotation.z = Math.max(-0.5, Math.min(1.0, -birdVelocity * 0.15));
                
                // Проверка столкновения с землей
                if (bird.position.y < -4.5) {
                    bird.position.y = -4.5;
                    gameOver();
                }
                
                // Проверка столкновения с потолком
                if (bird.position.y > 8) {
                    bird.position.y = 8;
                    birdVelocity = 0;
                }
                
                // Создание труб
                const currentTime = Date.now();
                if (currentTime - lastPipeTime > pipeSpawnInterval) {
                    createPipe();
                    lastPipeTime = currentTime;
                }
                
                // Обновление труб
                for (let i = pipes.length - 1; i >= 0; i--) {
                    const pipe = pipes[i];
                    
                    // Движение труб
                    pipe.top.position.x -= pipeSpeed;
                    pipe.bottom.position.x -= pipeSpeed;
                    
                    // Проверка прохождения трубы
                    if (!pipe.passed && pipe.top.position.x < bird.position.x) {
                        pipe.passed = true;
                        score++;
                        scoreDisplay.textContent = score;
                    }
                    
                    // Проверка коллизий
                    if (checkCollision(pipe)) {
                        gameOver();
                    }
                    
                    // Удаление труб за экраном
                    if (pipe.top.position.x < -10) {
                        scene.remove(pipe.top);
                        scene.remove(pipe.bottom);
                        pipes.splice(i, 1);
                    }
                }
                
                // Камера следует за птицей (вид сзади и чуть выше)
                camera.position.x = bird.position.x - 3;
                camera.position.y = bird.position.y + 1.5;
                camera.lookAt(bird.position.x + 2, bird.position.y, 0);
            } else {
                // Когда игра не активна, птица просто висит и машет крыльями
                bird.position.y = 0 + Math.sin(Date.now() * 0.003) * 0.2;
                bird.rotation.z = 0;
                camera.position.set(-3, 1.5, 0);
                camera.lookAt(0, 0, 0);
            }
            
            // Анимация крыльев
            if (gameActive) {
                const wings = bird.children.filter(child => 
                    child.geometry.type === 'BoxGeometry'
                );
                wings.forEach((wing, index) => {
                    wing.rotation.x = Math.sin(Date.now() * 0.02) * 0.3;
                });
            }
            
            renderer.render(scene, camera);
        }
        
        // Запуск игры
        init();
    </script>
</body>
</html>
