<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Bridge Defense: Strategy to FPS</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        .hud-panel { padding: 20px; color: white; text-shadow: 1px 1px 2px black; pointer-events: auto; }
        #top-bar { display: flex; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        #bottom-bar { text-align: center; padding-bottom: 30px; }
        
        /* Strategy Controls */
        #strategy-controls { display: flex; gap: 10px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; backdrop-filter: blur(5px); }
        .unit-btn { background: #444; border: 2px solid #666; color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .unit-btn:hover { background: #666; transform: scale(1.05); }
        .unit-btn.selected { border-color: #0f0; background: #252; }
        .unit-btn.disabled { opacity: 0.5; cursor: not-allowed; }

        /* Action Buttons */
        #action-btn { background: #d32f2f; border: 2px solid #ff5252; font-size: 1.2em; padding: 15px 40px; border-radius: 50px; cursor: pointer; box-shadow: 0 0 15px #d32f2f; animation: pulse 2s infinite; }
        #action-btn:hover { background: #b71c1c; }
        @keyframes pulse { 0% { box-shadow: 0 0 10px #d32f2f; } 50% { box-shadow: 0 0 25px #ff5252; } 100% { box-shadow: 0 0 10px #d32f2f; } }

        /* FPS HUD */
        #fps-hud { display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; transform: translate(-50%, -50%); pointer-events: none; }
        /* Коллиматорный прицел - красная точка в круге */
        #crosshair::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #ff0000 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px #ff0000;
        }
        #crosshair::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 36px;
            height: 36px;
            border: 2px solid rgba(255, 0, 0, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        
        .stat-box { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; border-left: 4px solid #fff; }
        .health-bar { width: 200px; height: 20px; background: #333; border: 2px solid #fff; position: relative; }
        .health-fill { width: 100%; height: 100%; background: #0f0; transition: width 0.3s; }

        #game-over { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; z-index: 100; }
        h1 { font-size: 4em; margin: 0; color: #ff3333; text-transform: uppercase; letter-spacing: 5px; }
        button.restart { margin-top: 20px; padding: 15px 30px; font-size: 1.5em; cursor: pointer; background: #fff; border: none; }
    </style>
    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<div id="ui-layer">
    <div id="top-bar" class="hud-panel">
        <div class="stat-box">
            <div>ЗДОРОВЬЕ МОСТА</div>
            <div class="health-bar"><div id="bridge-health" class="health-fill"></div></div>
        </div>
        <div class="stat-box" style="text-align: right;">
            <div id="wave-info">ВОЛНА: 1</div>
            <div id="score-info">УБИТО: 0</div>
            <div id="money-info">БАКСЫ: $1000</div>
        </div>
    </div>

    <div id="strategy-ui" class="hud-panel" style="align-self: center;">
        <div id="strategy-controls">
            <button class="unit-btn" onclick="selectUnit('turret')">Пулемет ($200)</button>
            <button class="unit-btn" onclick="selectUnit('sniper')">Снайпер ($400)</button>
            <button class="unit-btn" onclick="selectUnit('tank')">Танк ($800)</button>
        </div>
        <div style="text-align: center; margin-top: 10px;">
            <button id="action-btn" onclick="startGame()">ЗАПУСТИТЬ ОБОРОНУ</button>
        </div>
        <p style="text-align: center; font-size: 0.9em; opacity: 0.8;">ЛКМ: Построить | ПКМ: Отмена | Колесо: Зум</p>
    </div>

    <div id="fps-hud" class="hud-panel" style="width: 100%; height: 100%;">
        <div id="crosshair"></div>
        <div style="position: absolute; bottom: 20px; left: 20px; font-size: 1.5em; color: #0f0;">PATRON: <span id="ammo">30</span>/∞</div>
        <div style="position: absolute; bottom: 20px; right: 20px; font-size: 1.5em; color: #fff;">HP: <span id="player-hp">100</span></div>
        <div style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: yellow; font-weight: bold;" id="msg-area"></div>
    </div>
</div>

<div id="game-over">
    <h1 id="go-title">GAME OVER</h1>
    <p id="go-reason">Зомби прорвались!</p>
    <button class="restart" onclick="location.reload()">ИГРАТЬ СНОВА</button>
</div>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// --- Глобальные переменные ---
let scene, camera, renderer, controls;
let clock = new THREE.Clock();
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let bridgeMesh;
let units = [];
let zombies = [];
let bullets = [];
let particles = [];
let lastTime = 0;

// Состояние игры
const STATE = { STRATEGY: 0, FPS: 1, GAMEOVER: 2, WAVE_BREAK: 3 };
let gameState = STATE.STRATEGY;
let selectedUnitType = null;
let money = 1000;
let bridgeHealth = 100;
let score = 0;
let wave = 1;
let zombiesToSpawn = 0;
let spawnTimer = 0;
let waveInProgress = false;
let breakTimer = 0;
const BREAK_DURATION = 5; // Секунды между волнами

// Настройки юнитов
const UNIT_COSTS = { 'turret': 200, 'sniper': 400, 'tank': 800 };
const UNIT_STATS = {
    'turret': { hp: 100, range: 15, damage: 10, rate: 0.2, color: 0x4488ff, scale: 1 },
    'sniper': { hp: 50, range: 40, damage: 100, rate: 1.5, color: 0x00ff00, scale: 0.8 },
    'tank': { hp: 500, range: 12, damage: 50, rate: 0.8, color: 0x225522, scale: 1.5 }
};

// Игрок
const player = { hp: 100, speed: 10, canShoot: true, lastShot: 0, weapon: null, isAiming: false, baseFov: 60 };
const keys = {};

// Типы зомби
const ZOMBIE_TYPES = {
    'normal': { hp: 30, speed: 3, damage: 0.5, color: 0x3a5f3a, scale: 1, name: 'Обычный' },
    'fast': { hp: 20, speed: 7, damage: 0.3, color: 0x2d6b2d, scale: 0.8, name: 'Бегун' },
    'tank': { hp: 100, speed: 1.5, damage: 1.0, color: 0x1a3a1a, scale: 1.5, name: 'Танк' },
    'attacker': { hp: 50, speed: 4, damage: 1.5, color: 0x6b2d2d, scale: 1.1, name: 'Атакующий' }
};

// DOM элементы
const uiStrategy = document.getElementById('strategy-ui');
const uiFps = document.getElementById('fps-hud');
const elMoney = document.getElementById('money-info');
const elBridgeHealth = document.getElementById('bridge-health');
const elAmmo = document.getElementById('ammo');
const elPlayerHp = document.getElementById('player-hp');
const elMsg = document.getElementById('msg-area');

init();
animate();

function init() {
    // Сцена
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Sky blue day
    scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

    // Камера (Стратегия)
    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 30, 40);
    camera.lookAt(0, 0, 0);

    // Рендерер
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Свет - яркий дневной
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
    dirLight.position.set(20, 50, 20);
    dirLight.castShadow = true;
    dirLight.shadow.camera.left = -50;
    dirLight.shadow.camera.right = 50;
    dirLight.shadow.camera.top = 50;
    dirLight.shadow.camera.bottom = -50;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    scene.add(dirLight);

    // Additional fill lights
    const fillLight = new THREE.DirectionalLight(0xffeedd, 0.5);
    fillLight.position.set(-10, 20, -10);
    scene.add(fillLight);

    // Окружение (Вода)
    const waterGeo = new THREE.PlaneGeometry(200, 200);
    const waterMat = new THREE.MeshStandardMaterial({ color: 0x0066cc, roughness: 0.3, metalness: 0.5 });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.rotation.x = -Math.PI / 2;
    water.position.y = -2;
    scene.add(water);

    // Мост
    createBridge();

    // Управление стратегией (простое следование за мышью для камеры)
    document.addEventListener('mousemove', onDocumentMouseMove, false);
    document.addEventListener('mousedown', onDocumentMouseDown, false);
    document.addEventListener('keydown', onKeyDown, false);
    document.addEventListener('keyup', onKeyUp, false);
    window.addEventListener('resize', onWindowResize, false);

    updateUI();
}

function createBridge() {
    // Дорога - более красивая текстура
    const geo = new THREE.BoxGeometry(10, 2, 60);
    const mat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.7 });
    bridgeMesh = new THREE.Mesh(geo, mat);
    bridgeMesh.position.y = 0;
    bridgeMesh.receiveShadow = true;
    scene.add(bridgeMesh);

    // Перила
    const railGeo = new THREE.BoxGeometry(0.8, 1.5, 60);
    const railMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, metalness: 0.3 });
    
    const railLeft = new THREE.Mesh(railGeo, railMat);
    railLeft.position.set(-4.5, 0.75, 0);
    railLeft.castShadow = true;
    scene.add(railLeft);

    const railRight = new THREE.Mesh(railGeo, railMat);
    railRight.position.set(4.5, 0.75, 0);
    railRight.castShadow = true;
    scene.add(railRight);

    // Столбы перил
    for(let x of [-4.5, 4.5]) {
        for(let z = -28; z <= 28; z+=8) {
            const postGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.5, 8);
            const post = new THREE.Mesh(postGeo, railMat);
            post.position.set(x, 0.75, z);
            post.castShadow = true;
            scene.add(post);
        }
    }

    // Опоры моста
    for(let z = -25; z <= 25; z+=25) {
        const supGeo = new THREE.CylinderGeometry(2, 2, 12, 16);
        const supMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.9 });
        const sup = new THREE.Mesh(supGeo, supMat);
        sup.position.set(0, -6, z);
        sup.castShadow = true;
        scene.add(sup);
    }
    
    // Декор - фонари на мосту
    const lampPostMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const lampLightMat = new THREE.MeshBasicMaterial({ color: 0xffffaa });
    for(let z of [-20, 0, 20]) {
        const poleGeo = new THREE.CylinderGeometry(0.2, 0.2, 4, 8);
        const pole = new THREE.Mesh(poleGeo, lampPostMat);
        pole.position.set(-3.5, 2, z);
        scene.add(pole);
        
        const lampGeo = new THREE.SphereGeometry(0.4, 8, 8);
        const lamp = new THREE.Mesh(lampGeo, lampLightMat);
        lamp.position.set(0, 1.5, 0);
        pole.add(lamp);
        
        // Свет от фонаря
        const lampLight = new THREE.PointLight(0xffffaa, 0.5, 10);
        lampLight.position.set(0, 1.5, 0);
        pole.add(lampLight);
    }
}

// --- Логика Стратегии ---

window.selectUnit = function(type) {
    if (gameState !== STATE.STRATEGY) return;
    
    // Сброс выделения
    document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('selected'));
    
    if (selectedUnitType === type) {
        selectedUnitType = null; // Отмена выбора
    } else {
        selectedUnitType = type;
        event.target.classList.add('selected');
    }
};

function onDocumentMouseMove(event) {
    if (gameState !== STATE.STRATEGY) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    // Движение камеры стратегического режима (плавно)
    const targetX = mouse.x * 20;
    const targetZ = 40 + mouse.y * 10;
    camera.position.x += (targetX - camera.position.x) * 0.05;
    camera.position.z += (targetZ - camera.position.z) * 0.05;
    camera.lookAt(0, 0, 0);
}

function onDocumentMouseDown(event) {
    if (gameState !== STATE.STRATEGY) return;
    if (event.button !== 0) return; // Только ЛКМ

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(bridgeMesh);

    if (intersects.length > 0) {
        const point = intersects[0].point;
        
        // Проверка места (чтобы не ставить друг на друга)
        const tooClose = units.some(u => u.mesh.position.distanceTo(point) < 3);
        
        if (!tooClose && selectedUnitType) {
            const cost = UNIT_COSTS[selectedUnitType];
            if (money >= cost) {
                placeUnit(selectedUnitType, point);
                money -= cost;
                updateUI();
                selectedUnitType = null;
                document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('selected'));
            } else {
                showMessage("Недостаточно денег!", "red");
            }
        }
    }
}

function placeUnit(type, position) {
    const stats = UNIT_STATS[type];
    
    // Группа меша
    const group = new THREE.Group();
    group.position.copy(position);
    group.position.y = 1.5; // На поверхности моста

    // Визуализация (упрощенная)
    let mesh;
    if (type === 'tank') {
        const body = new THREE.Mesh(new THREE.BoxGeometry(3, 1.5, 4), new THREE.MeshStandardMaterial({ color: stats.color }));
        const turret = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 2), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        turret.position.y = 1;
        turret.rotation.x = Math.PI/2;
        body.add(turret);
        body.castShadow = true;
        mesh = body;
    } else {
        const base = new THREE.Mesh(new THREE.CylinderGeometry(1, 1.2, 1, 8), new THREE.MeshStandardMaterial({ color: 0x555555 }));
        const head = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1.5), new THREE.MeshStandardMaterial({ color: stats.color }));
        head.position.y = 1;
        head.add(base);
        head.castShadow = true;
        mesh = head;
    }

    group.add(mesh);
    scene.add(group);

    units.push({
        type: type,
        mesh: group,
        ...stats,
        lastShot: 0,
        hp: stats.hp
    });
}

window.startGame = function() {
    if (units.length === 0) {
        showMessage("Поставьте хотя бы одну турель!", "orange");
        return;
    }
    gameState = STATE.FPS;
    uiStrategy.style.display = 'none';
    uiFps.style.display = 'block';
    
    // Setup FPS Controls
    controls = new PointerLockControls(camera, document.body);
    
    controls.addEventListener('lock', () => {
        console.log("Pointer locked - ready to play");
    });
    
    controls.addEventListener('unlock', () => {
        console.log("Pointer unlocked");
        // Можно добавить паузу или меню
    });
    
    document.body.addEventListener('click', () => {
        if(gameState === STATE.FPS && !controls.isLocked) {
            controls.lock();
        }
    });
    
    controls.lock();
    
    // Reset camera for FPS
    camera.position.set(0, 2, 25); // Start at one end of the bridge
    camera.rotation.set(0, 0, 0);
    
    // Add camera to scene so weapon attached to it will be visible
    scene.add(camera);
    
    // Create player weapon
    createPlayerWeapon();
    
    startWave();
};

function startWave() {
    waveInProgress = true;
    zombiesToSpawn = 20 + (wave * 10); // Уменьшено для баланса
    showMessage(`ВОЛНА ${wave} НАЧАЛАСЬ!`, "#ff0");
}

function endWave() {
    waveInProgress = false;
    gameState = STATE.WAVE_BREAK;
    breakTimer = BREAK_DURATION;
    showMessage(`ВОЛНА ${wave} ОТБИТА! Следующая через ${BREAK_DURATION}с...`, "#0f0");
    
    // Бонус за волну
    const bonus = wave * 100;
    money += bonus;
    showMessage(`БОНУС: $${bonus}`, "#ff0");
    updateUI();
}

function startNextWave() {
    wave++;
    gameState = STATE.FPS;
    startWave();
}

function createPlayerWeapon() {
    // Создаем модель оружия (автомат)
    const weaponGroup = new THREE.Group();
    
    // Основной корпус оружия
    const bodyGeo = new THREE.BoxGeometry(0.15, 0.2, 0.6);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    weaponGroup.add(body);
    
    // Ствол
    const barrelGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.5, 8);
    const barrelMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.2 });
    const barrel = new THREE.Mesh(barrelGeo, barrelMat);
    barrel.rotation.x = Math.PI / 2;
    barrel.position.set(0, 0.05, -0.4);
    weaponGroup.add(barrel);
    
    // Рукоятка
    const gripGeo = new THREE.BoxGeometry(0.12, 0.25, 0.15);
    const gripMat = new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.7 });
    const grip = new THREE.Mesh(gripGeo, gripMat);
    grip.position.set(0, -0.15, 0.2);
    grip.rotation.x = 0.3;
    weaponGroup.add(grip);
    
    // Приклад
    const stockGeo = new THREE.BoxGeometry(0.1, 0.15, 0.4);
    const stock = new THREE.Mesh(stockGeo, gripMat);
    stock.position.set(0, -0.05, 0.4);
    weaponGroup.add(stock);
    
    // Магазин
    const magGeo = new THREE.BoxGeometry(0.12, 0.3, 0.15);
    const magMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5 });
    const mag = new THREE.Mesh(magGeo, magMat);
    mag.position.set(0, -0.2, 0.05);
    mag.rotation.x = -0.2;
    weaponGroup.add(mag);
    
    // Прицел (коллиматор) - красный круг с точкой
    const sightRingGeo = new THREE.TorusGeometry(0.03, 0.005, 8, 16);
    const sightRingMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const sightRing = new THREE.Mesh(sightRingGeo, sightRingMat);
    sightRing.position.set(0, 0.12, -0.15);
    sightRing.rotation.x = Math.PI / 2;
    weaponGroup.add(sightRing);
    
    // Красная точка в центре прицела
    const sightDotGeo = new THREE.SphereGeometry(0.01, 8, 8);
    const sightDotMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const sightDot = new THREE.Mesh(sightDotGeo, sightDotMat);
    sightDot.position.set(0, 0.12, -0.15);
    weaponGroup.add(sightDot);
    
    // Позиционируем оружие перед камерой
    weaponGroup.position.set(0.3, -0.25, -0.5);
    weaponGroup.rotation.y = -0.1;
    
    // Добавляем оружие к камере
    camera.add(weaponGroup);
    player.weapon = weaponGroup;
}

// --- Логика Шутера и Игры ---

function onKeyDown(event) { keys[event.code] = true; }
function onKeyUp(event) { keys[event.code] = false; }

// Отслеживание нажатия мыши для стрельбы и прицеливания
document.addEventListener('mousedown', (event) => {
    if (event.button === 0) keys['Mouse0'] = true;
    if (event.button === 2) { // ПКМ - прицеливание
        keys['Mouse2'] = true;
        player.isAiming = true;
        // Уменьшаем FOV для эффекта зума
        camera.fov = 30;
        camera.updateProjectionMatrix();
        // Сдвигаем оружие в центр для ADS
        if(player.weapon) {
            player.weapon.position.set(0, -0.15, -0.4);
        }
    }
});
document.addEventListener('mouseup', (event) => {
    if (event.button === 0) keys['Mouse0'] = false;
    if (event.button === 2) { // Отпускаем ПКМ - выход из прицеливания
        keys['Mouse2'] = false;
        player.isAiming = false;
        // Возвращаем FOV
        camera.fov = player.baseFov;
        camera.updateProjectionMatrix();
        // Возвращаем оружие в исходное положение
        if(player.weapon) {
            player.weapon.position.set(0.3, -0.25, -0.5);
        }
    }
});

// Блокируем контекстное меню от ПКМ
document.addEventListener('contextmenu', (event) => {
    event.preventDefault();
});

function spawnZombie() {
    if (zombiesToSpawn <= 0) return;

    const zPos = new THREE.Vector3((Math.random() - 0.5) * 8, 0, 30); // Spawn far end
    
    // Выбор типа зомби в зависимости от волны и случайности
    let zombieType = 'normal';
    const rand = Math.random();
    
    // Чем выше волна, тем больше разнообразие
    if (wave >= 2 && rand < 0.2) {
        zombieType = 'fast';
    } else if (wave >= 3 && rand < 0.15) {
        zombieType = 'tank';
    } else if (wave >= 4 && rand < 0.2) {
        zombieType = 'attacker';
    }
    
    const typeData = ZOMBIE_TYPES[zombieType];
    
    // Zombie Mesh - более реалистичный
    const group = new THREE.Group();
    group.position.copy(zPos);
    group.scale.set(typeData.scale, typeData.scale, typeData.scale);
    
    // Разные цвета для разных типов зомби
    const bodyMat = new THREE.MeshStandardMaterial({ color: typeData.color });
    const headMat = new THREE.MeshStandardMaterial({ color: typeData.color });
    const pantsMat = new THREE.MeshStandardMaterial({ color: 0x2d2d4a });

    // Тело
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.0, 0.6), bodyMat);
    body.position.y = 1.4;
    body.castShadow = true;
    
    // Голова с глазами
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.55, 0.5), headMat);
    head.position.y = 2.2;
    head.castShadow = true;
    
    // Глаза (красные светящиеся) - у атакующих желтые
    const eyeColor = zombieType === 'attacker' ? 0xffff00 : 0xff0000;
    const eyeMat = new THREE.MeshBasicMaterial({ color: eyeColor });
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), eyeMat);
    eyeL.position.set(-0.15, 2.25, 0.25);
    const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), eyeMat);
    eyeR.position.set(0.15, 2.25, 0.25);
    group.add(eyeL, eyeR);
    
    // Руки (вытянутые вперед как у зомби) - у атакующих подняты выше
    const armL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1.0, 0.25), headMat);
    armL.position.set(-0.7, 1.3, zombieType === 'attacker' ? 0.6 : 0.4);
    armL.rotation.x = zombieType === 'attacker' ? -1.5 : -1.2;
    armL.castShadow = true;
    
    const armR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1.0, 0.25), headMat);
    armR.position.set(0.7, 1.3, zombieType === 'attacker' ? 0.6 : 0.4);
    armR.rotation.x = zombieType === 'attacker' ? -1.5 : -1.2;
    armR.castShadow = true;
    
    // Ноги
    const legL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.0, 0.3), pantsMat);
    legL.position.set(-0.25, 0.5, 0);
    legL.castShadow = true;
    
    const legR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.0, 0.3), pantsMat);
    legR.position.set(0.25, 0.5, 0);
    legR.castShadow = true;

    group.add(body, head, armL, armR, legL, legR);
    scene.add(group);

    zombies.push({
        mesh: group,
        hp: typeData.hp + (wave * 5),
        speed: typeData.speed + (wave * 0.2),
        damage: typeData.damage,
        animOffset: Math.random() * 100,
        type: zombieType
    });

    zombiesToSpawn--;
}

function createBullet(startPos, targetPos, damage, isPlayer = false) {
    const direction = new THREE.Vector3().subVectors(targetPos, startPos).normalize();
    
    // Visual bullet - уменьшенный размер для игрока
    const radius = isPlayer ? 0.05 : 0.2;
    const geo = new THREE.SphereGeometry(radius);
    const mat = new THREE.MeshBasicMaterial({ color: isPlayer ? 0xffff00 : 0xff0000 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(startPos);
    
    // Add muzzle flash - вспышка у дула
    if(isPlayer) {
        // Создаем вспышку света
        const flashGeo = new THREE.SphereGeometry(0.15, 8, 8);
        const flashMat = new THREE.MeshBasicMaterial({ 
            color: 0xffffaa, 
            transparent: true, 
            opacity: 0.9 
        });
        const flash = new THREE.Mesh(flashGeo, flashMat);
        flash.position.copy(startPos);
        scene.add(flash);
        
        // Добавляем свет от выстрела
        const light = new THREE.PointLight(0xffff00, 2, 8);
        light.position.copy(startPos);
        scene.add(light);
        
        // Быстрое затухание вспышки
        setTimeout(() => {
            scene.remove(flash);
            scene.remove(light);
            flashGeo.dispose();
            flashMat.dispose();
        }, 60);
    }

    scene.add(mesh);
    bullets.push({
        mesh: mesh,
        velocity: direction.multiplyScalar(40), // Speed
        damage: damage,
        life: 2.0,
        isPlayer: isPlayer
    });
}

function createExplosion(pos, color) {
    for(let i=0; i<8; i++) {
        const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
        const mat = new THREE.MeshBasicMaterial({ color: color });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(pos);
        
        const vel = new THREE.Vector3(
            (Math.random() - 0.5) * 10,
            (Math.random() - 0.5) * 10,
            (Math.random() - 0.5) * 10
        );
        
        scene.add(mesh);
        particles.push({ mesh, velocity: vel, life: 1.0 });
    }
}

function updatePhysics(dt) {
    const time = Date.now() * 0.001;

    // Обработка перерыва между волнами
    if (gameState === STATE.WAVE_BREAK) {
        breakTimer -= dt;
        if (breakTimer <= 0) {
            startNextWave();
        } else {
            showMessage(`СЛЕДУЮЩАЯ ВОЛНА ЧЕРЕЗ ${Math.ceil(breakTimer)}с...`, "#ff0");
        }
        return;
    }

    // 1. Spawning
    if (gameState === STATE.FPS && zombiesToSpawn > 0) {
        spawnTimer += dt;
        if (spawnTimer > 0.5) { // Spawn every 0.5 sec - faster horde
            spawnZombie();
            spawnTimer = 0;
        }
    }

    // 2. Player Movement (FPS)
    if (gameState === STATE.FPS && controls.isLocked) {
        const speed = player.speed * dt;
        
        // FPS Movement using PointerLockControls
        if (keys['KeyW']) controls.moveForward(speed);
        if (keys['KeyS']) controls.moveForward(-speed);
        if (keys['KeyA']) controls.moveRight(-speed);
        if (keys['KeyD']) controls.moveRight(speed);
        
        // Boundary check (stay on bridge roughly)
        const pos = controls.getObject().position;
        pos.x = Math.max(-4, Math.min(4, pos.x));
        pos.z = Math.max(-28, Math.min(28, pos.z));
        pos.y = 2; // Keep player at fixed height
        
        // Player Shooting
        if (keys['Mouse0']) {
            const now = Date.now();
            const fireRate = player.isAiming ? 120 : 150; // Быстрее стрельба в прицеле
            if (now - player.lastShot > fireRate) { // Fire rate
                // Calculate muzzle position (end of barrel)
                const muzzlePos = new THREE.Vector3();
                const weaponWorldPos = new THREE.Vector3();
                
                // Get world position of weapon
                player.weapon.getWorldPosition(weaponWorldPos);
                
                // Calculate muzzle position based on weapon orientation
                const forward = new THREE.Vector3(0, 0, -1);
                forward.applyQuaternion(player.weapon.getWorldQuaternion(new THREE.Quaternion()));
                muzzlePos.copy(weaponWorldPos).add(forward.multiplyScalar(0.5));
                
                // Raycast from center screen
                const shootRay = new THREE.Raycaster();
                shootRay.setFromCamera(new THREE.Vector2(0,0), camera);
                
                // Find closest zombie
                let hit = null;
                let minDist = 100;
                
                // Simple logic: shoot what's in crosshair or closest ahead
                const intersects = shootRay.intersectObjects(scene.children, true);
                for(let i of intersects) {
                    // Check if part of a zombie
                    let obj = i.object;
                    while(obj.parent && !zombies.find(z => z.mesh === obj)) {
                        obj = obj.parent;
                    }
                    const zombieObj = zombies.find(z => z.mesh === obj);
                    
                    if (zombieObj && i.distance < minDist) {
                        hit = { point: i.point, zombie: zombieObj };
                        minDist = i.distance;
                        break;
                    }
                }

                if (hit) {
                    const damage = player.isAiming ? 35 : 25; // Больше урона в прицеле
                    createBullet(muzzlePos, hit.point, damage, true);
                    hit.zombie.hp -= damage;
                    if(hit.zombie.hp <= 0) killZombie(hit.zombie);
                } else {
                    // Shoot into distance if nothing hit
                    const target = camera.position.clone().add(shootRay.ray.direction.multiplyScalar(50));
                    createBullet(muzzlePos, target, 0, true);
                }
                
                // Weapon recoil animation - меньше отдача в прицеле
                const recoilAmount = player.isAiming ? 0.05 : 0.1;
                player.weapon.position.z += recoilAmount;
                setTimeout(() => {
                    if(player.weapon) {
                        player.weapon.position.z = player.isAiming ? -0.4 : -0.5;
                    }
                }, 80);
                
                player.lastShot = now;
                elAmmo.innerText = Math.max(0, parseInt(elAmmo.innerText) - 1);
                if(parseInt(elAmmo.innerText) === 0) setTimeout(() => { elAmmo.innerText = 30; showMessage("Перезарядка", "yellow"); }, 1000);
            }
        }
    }

    // 3. Units Logic (Auto aim)
    units.forEach(unit => {
        unit.lastShot += dt;
        if (unit.lastShot >= unit.rate) {
            // Find target
            let target = null;
            let minDst = unit.range;
            
            zombies.forEach(z => {
                const d = unit.mesh.position.distanceTo(z.mesh.position);
                if (d < minDst) {
                    minDst = d;
                    target = z;
                }
            });

            if (target) {
                unit.lastShot = 0;
                // Rotate turret
                unit.mesh.lookAt(target.mesh.position.x, unit.mesh.position.y, target.mesh.position.z);
                // Shoot
                const muzzlePos = unit.mesh.position.clone().add(new THREE.Vector3(0, 1, 0).applyMatrix4(unit.mesh.matrixWorld));
                createBullet(muzzlePos, target.mesh.position, unit.damage, false);
                target.hp -= unit.damage;
                if(target.hp <= 0) killZombie(target);
            }
        }
    });

    // 4. Zombies Logic (Move & Attack)
    for (let i = zombies.length - 1; i >= 0; i--) {
        const z = zombies[i];
        const dz = -z.speed * dt; // Move towards -Z
        
        // Анимация зомби - покачивание и движение рук/ног
        z.mesh.position.y = Math.abs(Math.sin(time * 8 + z.animOffset)) * 0.15;
        z.mesh.position.z += dz;
        
        // Вращение к игроку
        if (gameState === STATE.FPS) {
            z.mesh.lookAt(camera.position.x, z.mesh.position.y, camera.position.z);
        }
        
        // Rotate arms (анимация рук - индексы могут отличаться из-за добавления глаз)
        const armLIndex = 2; // После body(0), head(1), eyeL(2), eyeR(3) -> armL(4), armR(5), legL(6), legR(7)
        const armRIndex = 4;
        const legLIndex = 6;
        const legRIndex = 7;
        
        if (z.mesh.children[armLIndex]) {
            z.mesh.children[armLIndex].rotation.x = -1.2 + Math.sin(time * 10 + z.animOffset) * 0.4;
            z.mesh.children[armLIndex].rotation.z = Math.sin(time * 8 + z.animOffset) * 0.2;
        }
        if (z.mesh.children[armRIndex]) {
            z.mesh.children[armRIndex].rotation.x = -1.2 + Math.cos(time * 10 + z.animOffset) * 0.4;
            z.mesh.children[armRIndex].rotation.z = Math.cos(time * 8 + z.animOffset) * 0.2;
        }
        // Анимация ног
        if (z.mesh.children[legLIndex]) {
            z.mesh.children[legLIndex].rotation.x = Math.sin(time * 12 + z.animOffset) * 0.5;
        }
        if (z.mesh.children[legRIndex]) {
            z.mesh.children[legRIndex].rotation.x = Math.cos(time * 12 + z.animOffset) * 0.5;
        }

        // Collision with Player - атакующие зомби наносят больше урона
        if (gameState === STATE.FPS && z.mesh.position.distanceTo(camera.position) < 1.5) {
            player.hp -= z.damage; // Damage per frame close contact
            elPlayerHp.innerText = Math.floor(player.hp);
            if (player.hp <= 0) endGame(false);
        }

        // Reached End (Bridge Health)
        if (z.mesh.position.z < -25) {
            bridgeHealth -= 10;
            updateUI();
            createExplosion(z.mesh.position, 0xff0000);
            scene.remove(z.mesh);
            zombies.splice(i, 1);
            if (bridgeHealth <= 0) endGame(false);
        }
    }

    // 5. Bullets Logic
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.mesh.position.add(b.velocity.clone().multiplyScalar(dt));
        b.life -= dt;
        if (b.life <= 0) {
            scene.remove(b.mesh);
            bullets.splice(i, 1);
        }
    }

    // 6. Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.mesh.position.add(p.velocity.clone().multiplyScalar(dt));
        p.mesh.rotation.x += dt;
        p.life -= dt;
        p.mesh.scale.multiplyScalar(0.9);
        if (p.life <= 0) {
            scene.remove(p.mesh);
            particles.splice(i, 1);
        }
    }

    // Win Condition Check - конец волны
    if (gameState === STATE.FPS && zombiesToSpawn === 0 && zombies.length === 0) {
        endWave();
    }
}

function killZombie(zombie) {
    createExplosion(zombie.mesh.position, 0x2e8b57);
    scene.remove(zombie.mesh);
    zombies = zombies.filter(z => z !== zombie);
    score++;
    money += 15;
    updateUI();
}

function updateUI() {
    elMoney.innerText = `$${money}`;
    elBridgeHealth.style.width = `${Math.max(0, bridgeHealth)}%`;
    elBridgeHealth.style.background = bridgeHealth > 50 ? '#0f0' : (bridgeHealth > 20 ? '#ff0' : '#f00');
    document.getElementById('score-info').innerText = `УБИТО: ${score}`;
    document.getElementById('wave-info').innerText = `ВОЛНА: ${wave}`;
}

function showMessage(text, color) {
    elMsg.innerText = text;
    elMsg.style.color = color;
    elMsg.style.opacity = 1;
    setTimeout(() => { elMsg.style.opacity = 0; }, 2000);
}

function endGame(win) {
    gameState = STATE.GAMEOVER;
    controls.unlock();
    const goScreen = document.getElementById('game-over');
    const title = document.getElementById('go-title');
    const reason = document.getElementById('go-reason');
    
    goScreen.style.display = 'flex';
    if (win) {
        title.innerText = "ПОБЕДА!";
        title.style.color = "#0f0";
        reason.innerText = `Вы отбили волну ${wave}! Счет: ${score}`;
    } else {
        title.innerText = "ПОРАЖЕНИЕ";
        title.style.color = "#f00";
        reason.innerText = bridgeHealth <= 0 ? "Мост разрушен!" : "Вы погибли!";
    }
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    updatePhysics(dt);
    renderer.render(scene, camera);
}

// Expose functions to window for HTML onclick
window.selectUnit = selectUnit;
window.startGame = startGame;

</script>
</body>
</html>
