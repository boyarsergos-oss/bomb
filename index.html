<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Изометрическая Сцена</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
        }
        #info h3 {
            margin-bottom: 10px;
        }
        #info p {
            margin: 5px 0;
            font-size: 14px;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>Управление</h3>
        <p>W / Стрелка вверх - Вперёд</p>
        <p>S / Стрелка вниз - Назад</p>
        <p>A / Стрелка влево - Влево</p>
        <p>D / Стрелка вправо - Вправо</p>
        <p>ЛКМ / Пробел - Стрелять краской</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Инициализация сцены
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        // Камера с изометрической проекцией (ортографическая)
        const aspect = window.innerWidth / window.innerHeight;
        const d = 20;
        const camera = new THREE.OrthographicCamera(
            -d * aspect, d * aspect, d, -d, 1, 1000
        );
        
        // Изометрический угол
        camera.position.set(20, 20, 20);
        camera.lookAt(scene.position);

        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        // Земля (плоскость) с динамической текстурой для краски
        const groundSize = 250;
        const groundResolution = 512; // Разрешение текстуры для рисования
        const groundCanvas = document.createElement('canvas');
        groundCanvas.width = groundResolution;
        groundCanvas.height = groundResolution;
        const groundCtx = groundCanvas.getContext('2d');
        
        // Заполняем начальным цветом (зелёный - трава)
        groundCtx.fillStyle = '#3a7d3a';
        groundCtx.fillRect(0, 0, groundResolution, groundResolution);
        
        const groundTexture = new THREE.CanvasTexture(groundCanvas);
        groundTexture.needsUpdate = true;
        
        const groundGeometry = new THREE.PlaneGeometry(groundSize, groundSize);
        const groundMaterial = new THREE.MeshLambertMaterial({ 
            map: groundTexture,
            color: 0xffffff
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Сетка на земле
        const gridHelper = new THREE.GridHelper(250, 10, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Создаём персонажа (группа объектов)
        const player = new THREE.Group();

        // Тело
        const bodyGeometry = new THREE.BoxGeometry(1, 1.5, 0.6);
        const bodyMaterial = new THREE.MeshLambertMaterial({ color: 0xff6b6b });
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        body.position.y = 0.75;
        body.castShadow = true;
        player.add(body);

        // Голова
        const headGeometry = new THREE.BoxGeometry(0.7, 0.7, 0.7);
        const headMaterial = new THREE.MeshLambertMaterial({ color: 0xffccaa });
        const head = new THREE.Mesh(headGeometry, headMaterial);
        head.position.y = 1.85;
        head.castShadow = true;
        player.add(head);

        // Ноги
        const legGeometry = new THREE.BoxGeometry(0.3, 0.7, 0.3);
        const legMaterial = new THREE.MeshLambertMaterial({ color: 0x4a4a4a });
        
        const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
        leftLeg.position.set(-0.25, 0.35, 0);
        leftLeg.castShadow = true;
        player.add(leftLeg);

        const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
        rightLeg.position.set(0.25, 0.35, 0);
        rightLeg.castShadow = true;
        player.add(rightLeg);

        scene.add(player);

        // Добавим несколько декоративных объектов
        function createTree(x, z) {
            const treeGroup = new THREE.Group();
            
            // Ствол
            const trunkGeometry = new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8);
            const trunkMaterial = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = 0.75;
            trunk.castShadow = true;
            treeGroup.add(trunk);

            // Крона
            const leavesGeometry = new THREE.ConeGeometry(1, 2, 8);
            const leavesMaterial = new THREE.MeshLambertMaterial({ color: 0x228b22 });
            const leaves = new THREE.Mesh(leavesGeometry, leavesMaterial);
            leaves.position.y = 2.5;
            leaves.castShadow = true;
            treeGroup.add(leaves);

            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);
        }

        // Создаём несколько деревьев
        createTree(-8, -8);
        createTree(8, -6);
        createTree(-6, 8);
        createTree(7, 7);
        createTree(-10, 5);
        createTree(10, -10);

        // Добавим камни
        function createRock(x, z) {
            const rockGeometry = new THREE.DodecahedronGeometry(0.5, 0);
            const rockMaterial = new THREE.MeshLambertMaterial({ color: 0x808080 });
            const rock = new THREE.Mesh(rockGeometry, rockMaterial);
            rock.position.set(x, 0.3, z);
            rock.scale.set(1 + Math.random() * 0.5, 0.8 + Math.random() * 0.4, 1 + Math.random() * 0.5);
            rock.castShadow = true;
            scene.add(rock);
        }

        createRock(-5, -3);
        createRock(6, 4);
        createRock(-3, 6);
        createRock(4, -8);

        // Функция для проверки расстояния между двумя точками
        function getDistance(x1, z1, x2, z2) {
            const dx = x1 - x2;
            const dz = z1 - z2;
            return Math.sqrt(dx * dx + dz * dz);
        }

        // Функция создания стеклянного резервуара
        function createGlassTank(x, z, tankType) {
            const tankGroup = new THREE.Group();
            
            // Параметры для разных типов резервуаров
            let tankGeometry, tankColor, tankHeight;
            
            if (tankType === 0) {
                // Тип 1: Цилиндрический прозрачный резервуар
                tankGeometry = new THREE.CylinderGeometry(1.5, 1.5, 3, 16, 1, true);
                tankColor = 0xadd8e6; // Светло-голубой оттенок стекла
                tankHeight = 3;
            } else if (tankType === 1) {
                // Тип 2: Кубический прозрачный резервуар
                tankGeometry = new THREE.BoxGeometry(2.5, 3.5, 2.5);
                tankColor = 0xe0ffff; // Светло-бирюзовый оттенок стекла
                tankHeight = 3.5;
            } else {
                // Тип 3: Конусообразный прозрачный резервуар
                tankGeometry = new THREE.CylinderGeometry(1, 2, 4, 8, 1, true);
                tankColor = 0xf0ffff; // Очень светлый голубой оттенок стекла
                tankHeight = 4;
            }
            
            // Создаём стеклянный материал с прозрачностью
            const glassMaterial = new THREE.MeshPhongMaterial({
                color: tankColor,
                transparent: true,
                opacity: 0.3,
                side: THREE.DoubleSide,
                depthWrite: false,
                polygonOffset: true,
                polygonOffsetFactor: -1,
                polygonOffsetUnits: -1
            });
            
            const tank = new THREE.Mesh(tankGeometry, glassMaterial);
            tank.position.y = tankHeight / 2;
            tank.castShadow = true;
            tankGroup.add(tank);
            
            // Добавляем верхнюю и нижнюю крышки для реалистичности
            const capGeometry = tankType === 0 ? new THREE.CircleGeometry(1.5, 16) :
                               tankType === 1 ? new THREE.PlaneGeometry(2.5, 2.5) :
                               new THREE.CircleGeometry(2, 8);
            const capMaterial = new THREE.MeshPhongMaterial({
                color: tankColor,
                transparent: true,
                opacity: 0.4,
                side: THREE.DoubleSide,
                polygonOffset: true,
                polygonOffsetFactor: -1,
                polygonOffsetUnits: -1
            });
            
            // Нижняя крышка
            const bottomCap = new THREE.Mesh(capGeometry, capMaterial);
            bottomCap.rotation.x = -Math.PI / 2;
            bottomCap.position.y = 0.05;
            tankGroup.add(bottomCap);
            
            // Верхняя крышка (кольцо для открытых резервуаров)
            const rimGeometry = tankType === 0 ? new THREE.RingGeometry(1.4, 1.5, 16) :
                                tankType === 1 ? new THREE.RingGeometry(1.2, 1.3, 4) :
                                new THREE.RingGeometry(1.8, 2, 8);
            const rimMaterial = new THREE.MeshPhongMaterial({
                color: 0xcccccc,
                transparent: true,
                opacity: 0.6
            });
            const rim = new THREE.Mesh(rimGeometry, rimMaterial);
            rim.rotation.x = -Math.PI / 2;
            rim.position.y = tankHeight - 0.05;
            tankGroup.add(rim);
            
            tankGroup.position.set(x, 0, z);
            scene.add(tankGroup);
            
            return { group: tankGroup, x: x, z: z, radius: tankType === 1 ? 1.8 : 2 };
        }

        // Создаём три разных стеклянных резервуара в случайных местах
        const tanks = [];
        const minDistance = 25; // Минимальное расстояние между резервуарами
        const groundHalfSize = groundSize / 2 - 5; // Отступ от краёв карты
        
        for (let i = 0; i < 3; i++) {
            let validPosition = false;
            let x, z;
            let attempts = 0;
            const maxAttempts = 50;
            
            // Ищем подходящую позицию, которая не слишком близко к другим резервуарам
            while (!validPosition && attempts < maxAttempts) {
                x = (Math.random() - 0.5) * 2 * groundHalfSize;
                z = (Math.random() - 0.5) * 2 * groundHalfSize;
                
                validPosition = true;
                
                // Проверяем расстояние до всех уже размещённых резервуаров
                for (const tank of tanks) {
                    if (getDistance(x, z, tank.x, tank.z) < minDistance) {
                        validPosition = false;
                        break;
                    }
                }
                
                attempts++;
            }
            
            if (validPosition) {
                const tank = createGlassTank(x, z, i);
                tanks.push(tank);
            }
        }

        // Функция проверки коллизии игрока с резервуарами
        function checkTankCollision(newX, newZ) {
            for (const tank of tanks) {
                const tankX = tank.group.position.x;
                const tankZ = tank.group.position.z;
                
                if (tank.group.children[0].geometry.type === 'BoxGeometry') {
                    // Кубический резервуар - проверка как прямоугольник
                    const halfSize = 1.25; // половина от 2.5
                    const playerRadius = 0.5;
                    
                    // Находим ближайшую точку на прямоугольнике к игроку
                    const closestX = Math.max(tankX - halfSize, Math.min(newX, tankX + halfSize));
                    const closestZ = Math.max(tankZ - halfSize, Math.min(newZ, tankZ + halfSize));
                    
                    const dx = newX - closestX;
                    const dz = newZ - closestZ;
                    const distance = Math.sqrt(dx * dx + dz * dz);
                    
                    if (distance < playerRadius) {
                        return true; // Столкновение
                    }
                } else {
                    // Цилиндрический или конусообразный резервуар - проверка как круг
                    const distance = getDistance(newX, newZ, tankX, tankZ);
                    const collisionRadius = tank.radius - 0.5; // радиус резервуара минус радиус игрока
                    
                    if (distance < collisionRadius) {
                        return true; // Столкновение
                    }
                }
            }
            return false;
        }

        // Переменные для мыши
        const mouse = new THREE.Vector2();
        let targetPoint = new THREE.Vector3(0, 0, 0);
        const paintColor = 0xb22222; // Тёмно-красный цвет краски (кирпичный)
        
        // Текущее направление персонажа (по умолчанию смотрит вниз-вправо по экрану)
        let playerDirection = new THREE.Vector3(1, 0, -1).normalize();
        
        // Данные для заполнения резервуаров
        const tankFillData = []; // { tank, fillLevel, isFilling, fillStartTime, fillDuration }
        
        // Инициализация данных заполнения для каждого резервуара
        tanks.forEach((tank, index) => {
            tankFillData.push({
                tank: tank,
                fillLevel: 0, // 0 to 1
                isFilling: false,
                fillStartTime: 0,
                fillDuration: 5000, // 5 секунд в миллисекундах
                liquidMesh: null // Меш для жидкости внутри резервуара
            });
            
            // Создаём меш жидкости для каждого резервуара
            createTankLiquid(tank, index);
        });
        
        // Функция создания жидкости внутри резервуара
        function createTankLiquid(tank, index) {
            const tankGroup = tank.group;
            const tankType = index;
            
            let liquidGeometry, liquidMaterial;
            const liquidColor = paintColor;
            
            if (tankType === 0) {
                // Цилиндрический резервуар - жидкость цилиндр чуть меньше резервуара
                liquidGeometry = new THREE.CylinderGeometry(1.45, 1.45, 2.9, 16);
            } else if (tankType === 1) {
                // Кубический резервуар - жидкость полный куб
                liquidGeometry = new THREE.BoxGeometry(2.4, 3.4, 2.4);
            } else {
                // Конусообразный резервуар - жидкость конус
                liquidGeometry = new THREE.CylinderGeometry(1.9, 0.9, 3.9, 8);
            }
            
            liquidMaterial = new THREE.MeshLambertMaterial({
                color: liquidColor,
                transparent: true,
                opacity: 0.9
            });
            
            const liquidMesh = new THREE.Mesh(liquidGeometry, liquidMaterial);
            // Позиционируем так, чтобы при scale.y = 0 жидкость была на дне
            liquidMesh.position.y = 0.05; // Начинаем с самого дна
            liquidMesh.scale.y = 0; // Начинаем с нуля
            liquidMesh.visible = true;
            
            tankGroup.add(liquidMesh);
            tankFillData[index].liquidMesh = liquidMesh;
        }
        
        // Функция проверки попадания в резервуар
        function checkTankHit(rayOrigin, shootDirection) {
            const raycaster = new THREE.Raycaster();
            raycaster.set(rayOrigin, shootDirection);
            
            for (let i = 0; i < tanks.length; i++) {
                const tank = tanks[i];
                const tankGroup = tank.group;
                const tankType = i;
                
                // Получаем позицию и размеры резервуара
                const tankX = tankGroup.position.x;
                const tankZ = tankGroup.position.z;
                let tankHeight, tankRadius;
                
                if (tankType === 0) {
                    // Цилиндрический
                    tankHeight = 3;
                    tankRadius = 1.5;
                } else if (tankType === 1) {
                    // Кубический
                    tankHeight = 3.5;
                    tankRadius = 1.8; // диагональ половины куба
                } else {
                    // Конусообразный
                    tankHeight = 4;
                    tankRadius = 2; // максимальный радиус у основания
                }
                
                // Проверяем пересечение с резервуаром
                const intersects = raycaster.intersectObjects(tankGroup.children, true);
                
                if (intersects.length > 0 && intersects[0].distance < 30) {
                    const hitPoint = intersects[0].point;
                    
                    // Проверяем, что попали именно в ёмкость (не слишком высоко и в пределах радиуса)
                    const dx = hitPoint.x - tankX;
                    const dz = hitPoint.z - tankZ;
                    const horizontalDistance = Math.sqrt(dx * dx + dz * dz);
                    const hitHeight = hitPoint.y;
                    
                    // Попадание считается valid если:
                    // 1. Горизонтальное расстояние до центра меньше радиуса резервуара
                    // 2. Высота попадания в пределах резервуара (от 0.2 до tankHeight - 0.2)
                    if (horizontalDistance < tankRadius * 0.9 && 
                        hitHeight > 0.2 && hitHeight < tankHeight - 0.1) {
                        // Попали в резервуар!
                        return { hit: true, tankIndex: i, point: hitPoint };
                    }
                }
            }
            
            return { hit: false, tankIndex: -1, point: null };
        }
        
        // Функция начала заполнения резервуара
        function startTankFilling(tankIndex) {
            const fillData = tankFillData[tankIndex];
            
            if (!fillData.isFilling && fillData.fillLevel < 1) {
                fillData.isFilling = true;
                fillData.fillStartTime = Date.now();
                
                // Показываем жидкость
                if (fillData.liquidMesh) {
                    fillData.liquidMesh.visible = true;
                }
            }
        }
        
        // Функция обновления заполнения резервуаров
        function updateTankFilling() {
            const currentTime = Date.now();
            
            tankFillData.forEach((fillData, index) => {
                if (fillData.isFilling && fillData.fillLevel < 1) {
                    const elapsed = currentTime - fillData.fillStartTime;
                    const progress = Math.min(elapsed / fillData.fillDuration, 1);
                    
                    // Плавное заполнение с easing
                    const easedProgress = 1 - Math.pow(1 - progress, 2); // ease-out quadratic
                    
                    fillData.fillLevel = easedProgress;
                    
                    // Обновляем позицию и масштаб жидкости
                    updateLiquidMesh(fillData, index);
                    
                    if (progress >= 1) {
                        fillData.isFilling = false;
                        fillData.fillLevel = 1;
                    }
                }
            });
        }
        
        // Функция обновления меши жидкости
        function updateLiquidMesh(fillData, tankIndex) {
            const liquidMesh = fillData.liquidMesh;
            if (!liquidMesh) return;
            
            const tank = tanks[tankIndex];
            const tankGroup = tank.group;
            const tankType = tankIndex;
            
            let maxHeight, meshHeight;
            if (tankType === 0) {
                maxHeight = 2.9; // Высота цилиндрического резервуара
                meshHeight = 2.9;
            } else if (tankType === 1) {
                maxHeight = 3.4; // Высота кубического резервуара
                meshHeight = 3.4;
            } else {
                maxHeight = 3.9; // Высота конусообразного резервуара
                meshHeight = 3.9;
            }
            
            // Вычисляем текущую высоту жидкости
            const currentHeight = maxHeight * fillData.fillLevel;
            
            // Обновляем позицию Y - база на дне + половина текущей высоты
            // При scale.y = fillLevel, центр меши должен быть на currentHeight/2 + дно
            liquidMesh.position.y = currentHeight / 2 + 0.05;
            
            // Обновляем масштаб по Y для изменения высоты заполнения
            liquidMesh.scale.y = Math.max(0.01, fillData.fillLevel);
            
            // Обновляем материал для корректного отображения
            liquidMesh.material.needsUpdate = true;
        }

        // Обработка движения мыши для определения направления стрельбы
        document.addEventListener('mousemove', (event) => {
            // Нормализованные координаты мыши (-1 до +1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Создаем луч из камеры через позицию мыши
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            // Находим пересечение с землей
            const intersects = raycaster.intersectObject(ground);
            
            if (intersects.length > 0) {
                targetPoint.copy(intersects[0].point);
            }
        });

        // Функция рисования краски на земле
        function paintOnGround(position, radius = 0.5) {
            // Преобразуем 3D координаты в 2D координаты текстуры
            const u = (position.x + groundSize / 2) / groundSize * groundResolution;
            const v = (position.z + groundSize / 2) / groundSize * groundResolution;
            
            // Рисуем круг на canvas
            groundCtx.beginPath();
            groundCtx.arc(u, v, radius / groundSize * groundResolution, 0, Math.PI * 2);
            groundCtx.fillStyle = '#b22222'; // Тёмно-красный цвет краски (кирпичный)
            groundCtx.fill();
            
            // Обновляем текстуру
            groundTexture.needsUpdate = true;
        }
        
        // Функция выстрела краской
        function shootPaint() {
            // Точка начала луча - позиция игрока + смещение вверх (откуда стреляет)
            const rayOrigin = player.position.clone();
            rayOrigin.y = 1.2; // Высота "руки" или оружия

            // Направление выстрела - к точке, куда указывает курсор мыши
            const shootDirection = targetPoint.clone().sub(rayOrigin).normalize();

            // Проверяем попадание в резервуар
            const hitResult = checkTankHit(rayOrigin, shootDirection);
            
            if (hitResult.hit) {
                // Попали в резервуар - начинаем заполнение
                startTankFilling(hitResult.tankIndex);
            }

            // Добавляем эффект частиц при выстреле (шланг) - теперь создаём поток постоянно
            createHoseStream(rayOrigin, shootDirection);
        }
        
        // Эффект "шланга" - поток жидкости
        const hoseParticles = [];
        const splashParticles = []; // Частицы для эффекта разбрызгивания
        
        // Функция создания потока жидкости из шланга
        function createHoseStream(origin, direction) {
            const particleCount = 4; // Уменьшено количество частиц за кадр при стрельбе
            const particleGeometry = new THREE.SphereGeometry(0.08, 8, 8);
            
            for (let i = 0; i < particleCount; i++) {
                const particleMaterial = new THREE.MeshBasicMaterial({ 
                    color: paintColor,
                    transparent: true,
                    opacity: 0.9
                });
                const particle = new THREE.Mesh(particleGeometry, particleMaterial);
                
                // Все частицы начинают движение от игрока с небольшим разбросом
                const spreadOffset = (Math.random() - 0.5) * 0.3;
                particle.position.copy(origin);
                particle.position.x += spreadOffset;
                particle.position.z += spreadOffset;
                
                // Направление с небольшим разбросом для более естественного потока
                const spreadAngle = (Math.random() - 0.5) * 0.15;
                const spreadDirection = direction.clone();
                spreadDirection.applyAxisAngle(new THREE.Vector3(0, 1, 0), spreadAngle);
                particle.userData.velocity = spreadDirection;
                
                // Скорость потока - высокая для быстрой доставки к цели
                particle.userData.speed = 1.2 + Math.random() * 0.3;
                particle.userData.life = 1.0;
                particle.userData.onGround = false;
                
                scene.add(particle);
                hoseParticles.push(particle);
            }
        }
        
        // Функция создания брызг при ударе о землю
        function createSplash(position, normal) {
            const splashCount = 3; // Количество брызг на одно попадание (уменьшено)
            const splashGeometry = new THREE.SphereGeometry(0.04, 6, 6);
            
            for (let i = 0; i < splashCount; i++) {
                const particleMaterial = new THREE.MeshBasicMaterial({ 
                    color: paintColor,
                    transparent: true,
                    opacity: 0.85
                });
                const particle = new THREE.Mesh(splashGeometry, particleMaterial);
                
                particle.position.copy(position);
                particle.position.y += 0.1;
                
                // Случайное направление разбрызгивания вверх и в стороны (уменьшен радиус)
                const angle = Math.random() * Math.PI * 2;
                const horizontalSpeed = 0.05 + Math.random() * 0.1; // Уменьшена горизонтальная скорость
                const verticalSpeed = 0.1 + Math.random() * 0.15; // Уменьшена вертикальная скорость
                
                particle.userData.velocity = new THREE.Vector3(
                    Math.cos(angle) * horizontalSpeed,
                    verticalSpeed,
                    Math.sin(angle) * horizontalSpeed
                );
                
                particle.userData.speed = 1.0;
                particle.userData.life = 0.6 + Math.random() * 0.3;
                particle.userData.onGround = false;
                particle.userData.isSplash = true;
                
                scene.add(particle);
                splashParticles.push(particle);
            }
        }
        
        // Обновление частиц шланга
        function updateHoseParticles() {
            for (let i = hoseParticles.length - 1; i >= 0; i--) {
                const particle = hoseParticles[i];
                
                if (!particle.userData.onGround) {
                    // Движение частицы в полёте
                    particle.position.add(
                        particle.userData.velocity.clone().multiplyScalar(particle.userData.speed)
                    );
                    
                    // Гравитация (более сильная для эффекта жидкости)
                    particle.userData.velocity.y -= 0.025;
                    
                    // Проверка столкновения с землёй
                    if (particle.position.y <= 0.1) {
                        particle.position.y = 0.1;
                        particle.userData.onGround = true;
                        particle.userData.spreadTime = 0;
                        
                        // Рисуем краску на земле в точке попадания
                        paintOnGround(particle.position.clone(), 0.4);
                        
                        // Создаём эффект брызг при ударе о землю
                        createSplash(particle.position.clone(), new THREE.Vector3(0, 1, 0));
                        
                        // Расплющиваем частицу на земле
                        particle.scale.set(1.5, 0.3, 1.5);
                    }
                } else {
                    // Частица на земле - растекается и исчезает
                    particle.userData.spreadTime += 0.05;
                    particle.userData.life -= 0.04;
                    
                    // Растекание по поверхности
                    const spreadScale = 1.5 + particle.userData.spreadTime * 2;
                    particle.scale.set(spreadScale, 0.2, spreadScale);
                }
                
                // Уменьшение прозрачности
                particle.material.opacity = particle.userData.life * 0.9;
                
                if (particle.userData.life <= 0) {
                    scene.remove(particle);
                    particle.geometry.dispose();
                    particle.material.dispose();
                    hoseParticles.splice(i, 1);
                    continue;
                }
            }
        }
        
        // Обновление частиц разбрызгивания
        function updateSplashParticles() {
            for (let i = splashParticles.length - 1; i >= 0; i--) {
                const particle = splashParticles[i];
                
                // Движение частицы
                particle.position.add(
                    particle.userData.velocity.clone().multiplyScalar(particle.userData.speed)
                );
                
                // Гравитация
                particle.userData.velocity.y -= 0.03;
                
                // Проверка столкновения с землёй
                if (particle.position.y <= 0.05) {
                    particle.position.y = 0.05;
                    particle.userData.onGround = true;
                    particle.userData.velocity.set(0, 0, 0); // Останавливаем движение
                    
                    // Рисуем краску на земле от брызг (только один раз при касании)
                    if (!particle.userData.painted) {
                        paintOnGround(particle.position.clone(), 0.2);
                        particle.userData.painted = true;
                    }
                    
                    // Расплющиваем частицу брызг
                    particle.scale.set(0.8, 0.2, 0.8);
                }
                
                // Уменьшение жизни
                particle.userData.life -= 0.025;
                
                // Уменьшение прозрачности
                particle.material.opacity = particle.userData.life * 0.85;
                
                if (particle.userData.life <= 0) {
                    scene.remove(particle);
                    particle.geometry.dispose();
                    particle.material.dispose();
                    splashParticles.splice(i, 1);
                    continue;
                }
            }
        }

        // Управление
        const keys = {
            w: false,
            a: false,
            s: false,
            d: false,
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };

        let isShooting = false;
        let shootCooldown = 0;
        const shootDelay = 2; // Задержка между выстрелами (чем меньше, тем быстрее)

        document.addEventListener('keydown', (event) => {
            // Обработка движения - используем code для надёжности
            const key = event.code.replace('Key', '').toLowerCase();
            if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                keys[key] = true;
            }
            if (event.code === 'ArrowUp') keys.ArrowUp = true;
            if (event.code === 'ArrowDown') keys.ArrowDown = true;
            if (event.code === 'ArrowLeft') keys.ArrowLeft = true;
            if (event.code === 'ArrowRight') keys.ArrowRight = true;
            
            // Обработка начала стрельбы (Пробел)
            if (event.code === 'Space') {
                isShooting = true;
            }
        });

        document.addEventListener('keyup', (event) => {
            // Обработка движения - используем code для надёжности
            const key = event.code.replace('Key', '').toLowerCase();
            if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                keys[key] = false;
            }
            if (event.code === 'ArrowUp') keys.ArrowUp = false;
            if (event.code === 'ArrowDown') keys.ArrowDown = false;
            if (event.code === 'ArrowLeft') keys.ArrowLeft = false;
            if (event.code === 'ArrowRight') keys.ArrowRight = false;
            
            // Остановка стрельбы при отпускании пробела
            if (event.code === 'Space') {
                isShooting = false;
            }
        });

        // Стрельба по клику мыши (начало)
        document.addEventListener('mousedown', (event) => {
            if (event.button === 0) { // Левая кнопка мыши
                isShooting = true;
            }
        });

        // Остановка стрельбы при отпускании кнопки мыши
        document.addEventListener('mouseup', (event) => {
            if (event.button === 0) { // Левая кнопка мыши
                isShooting = false;
            }
        });

        // Переменные для движения
        let walkCycle = 0;

        // Обработка изменения размера окна
        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Анимация
        function animate() {
            requestAnimationFrame(animate);

            let isMoving = false;
            const moveSpeed = 0.15;

            // Движение персонажа в изометрической проекции
            // В изометрии: 
            // - Вверх по экрану = комбинация -X и -Z
            // - Вниз по экрану = комбинация +X и +Z
            // - Влево по экрану = комбинация -X и +Z
            // - Вправо по экрану = комбинация +X и -Z
            
            let newX = player.position.x;
            let newZ = player.position.z;
            
            if (keys.w || keys.ArrowUp) {
                // Визуально вверх по экрану
                newX -= moveSpeed * Math.cos(Math.PI / 4);
                newZ -= moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(-1, 0, -1).normalize();
            }
            if (keys.s || keys.ArrowDown) {
                // Визуально вниз по экрану
                newX += moveSpeed * Math.cos(Math.PI / 4);
                newZ += moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(1, 0, 1).normalize();
            }
            if (keys.a || keys.ArrowLeft) {
                // Визуально влево по экрану
                newX -= moveSpeed * Math.cos(Math.PI / 4);
                newZ += moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(-1, 0, 1).normalize();
            }
            if (keys.d || keys.ArrowRight) {
                // Визуально вправо по экрану
                newX += moveSpeed * Math.cos(Math.PI / 4);
                newZ -= moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(1, 0, -1).normalize();
            }
            
            // Проверка коллизии с резервуарами перед применением движения
            if (!checkTankCollision(newX, newZ)) {
                player.position.x = newX;
                player.position.z = newZ;
            }

            // Ограничение движения границами земли
            const boundary = groundSize / 2 - 1;
            player.position.x = Math.max(-boundary, Math.min(boundary, player.position.x));
            player.position.z = Math.max(-boundary, Math.min(boundary, player.position.z));

            // Поворот персонажа за мышкой (всегда, независимо от движения)
            // Вычисляем направление от игрока к точке под мышкой
            const directionToMouse = new THREE.Vector3()
                .subVectors(targetPoint, player.position)
                .normalize();
            
            // Обновляем направление персонажа (только по горизонтали)
            playerDirection.set(directionToMouse.x, 0, directionToMouse.z).normalize();
            
            // Поворачиваем персонажа в направлении мыши
            if (directionToMouse.length() > 0.01) {
                const targetRotation = Math.atan2(directionToMouse.x, directionToMouse.z);
                player.rotation.y = targetRotation;
            }

            // Анимация ходьбы
            if (isMoving) {
                walkCycle += 0.2;
                leftLeg.rotation.x = Math.sin(walkCycle) * 0.5;
                rightLeg.rotation.x = Math.sin(walkCycle + Math.PI) * 0.5;
                
                // Небольшое покачивание тела
                body.position.y = 0.75 + Math.sin(walkCycle * 2) * 0.05;
                head.position.y = 1.85 + Math.sin(walkCycle * 2) * 0.05;
            } else {
                // Возврат ног в исходное положение
                leftLeg.rotation.x = THREE.MathUtils.lerp(leftLeg.rotation.x, 0, 0.1);
                rightLeg.rotation.x = THREE.MathUtils.lerp(rightLeg.rotation.x, 0, 0.1);
                body.position.y = THREE.MathUtils.lerp(body.position.y, 0.75, 0.1);
                head.position.y = THREE.MathUtils.lerp(head.position.y, 1.85, 0.1);
            }

            // Камера следует за игроком
            camera.position.x = player.position.x + 20;
            camera.position.z = player.position.z + 20;
            camera.position.y = 20;
            camera.lookAt(player.position);

            // Обновление частиц шланга
            updateHoseParticles();
            
            // Обновление частиц разбрызгивания
            updateSplashParticles();
            
            // Обновление заполнения резервуаров
            updateTankFilling();

            // Обработка непрерывной стрельбы - струя следует за курсором
            if (isShooting) {
                if (shootCooldown <= 0) {
                    shootPaint();
                    shootCooldown = shootDelay;
                } else {
                    shootCooldown--;
                }
                // Создаём поток частиц каждый кадр пока нажата кнопка
                const rayOrigin = player.position.clone();
                rayOrigin.y = 1.2;
                const shootDirection = targetPoint.clone().sub(rayOrigin).normalize();
                createHoseStream(rayOrigin, shootDirection);
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
