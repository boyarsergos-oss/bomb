<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Выбор Пути</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            z-index: 100;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #message {
            font-size: 24px;
            font-weight: bold;
            padding: 10px 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            display: none;
        }
        
        #restartBtn {
            margin-top: 10px;
            padding: 10px 30px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 16px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="message"></div>
        <button id="restartBtn" onclick="restartGame()">Играть снова</button>
    </div>
    <div id="instructions">Нажми на путь, чтобы выбрать!</div>
    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Основные переменные
        let scene, camera, renderer;
        let player, platform, leftPath, rightPath;
        let gameOver = false;
        let selectedPath = null;
        
        // Инициализация сцены
        function init() {
            // Создание сцены
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 100);
            
            // Камера
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);
            camera.lookAt(0, 0, 0);
            
            // Переменные для анимации
            let bounceTime = 0;
            
            // Рендерер
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            
            // Освещение
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            // Создание платформы
            createPlatform();
            
            // Создание игрока
            createPlayer();
            
            // Создание путей
            createPaths();
            
            // Обработчик кликов
            window.addEventListener('click', onMouseClick);
            window.addEventListener('resize', onWindowResize);
            
            // Анимация
            animate();
        }
        
        function createPlatform() {
            const geometry = new THREE.BoxGeometry(8, 1, 4);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x8B4513,
                roughness: 0.8
            });
            platform = new THREE.Mesh(geometry, material);
            platform.position.y = -0.5;
            platform.receiveShadow = true;
            scene.add(platform);
        }
        
        function createPlayer() {
            const geometry = new THREE.SphereGeometry(0.5, 32, 32);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x00ff00,
                emissive: 0x003300
            });
            player = new THREE.Mesh(geometry, material);
            player.position.set(0, 1, 0);
            player.castShadow = true;
            scene.add(player);
            
            // Добавим глаза игроку
            const eyeGeometry = new THREE.SphereGeometry(0.1, 16, 16);
            const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
            
            const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            leftEye.position.set(-0.15, 0.1, 0.4);
            player.add(leftEye);
            
            const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            rightEye.position.set(0.15, 0.1, 0.4);
            player.add(rightEye);
        }
        
        function createPaths() {
            // Левый путь (смерть)
            const leftGeometry = new THREE.BoxGeometry(3, 0.5, 15);
            const leftMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xff4444,
                roughness: 0.6
            });
            leftPath = new THREE.Mesh(leftGeometry, leftMaterial);
            leftPath.position.set(-4, -0.25, -9.5);
            leftPath.receiveShadow = true;
            leftPath.castShadow = true;
            leftPath.userData = { type: 'death', name: 'left' };
            scene.add(leftPath);
            
            // Правый путь (победа)
            const rightGeometry = new THREE.BoxGeometry(3, 0.5, 15);
            const rightMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x44ff44,
                roughness: 0.6
            });
            rightPath = new THREE.Mesh(rightGeometry, rightMaterial);
            rightPath.position.set(4, -0.25, -9.5);
            rightPath.receiveShadow = true;
            rightPath.castShadow = true;
            rightPath.userData = { type: 'win', name: 'right' };
            scene.add(rightPath);
            
            // Добавим знаки опасности и победы в конце путей
            createPathEndMarkers();
        }
        
        function createPathEndMarkers() {
            // Знак смерти (череп)
            const skullGeometry = new THREE.BoxGeometry(1, 1, 1);
            const skullMaterial = new THREE.MeshStandardMaterial({ color: 0x330000 });
            const skull = new THREE.Mesh(skullGeometry, skullMaterial);
            skull.position.set(-4, 1, -17);
            scene.add(skull);
            
            // Знак победы (звезда)
            const starShape = new THREE.Shape();
            const outerRadius = 0.5;
            const innerRadius = 0.25;
            for (let i = 0; i < 10; i++) {
                const radius = i % 2 === 0 ? outerRadius : innerRadius;
                const angle = (i * Math.PI) / 5;
                if (i === 0) {
                    starShape.moveTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
                } else {
                    starShape.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
            }
            const starGeometry = new THREE.ShapeGeometry(starShape);
            const starMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xffd700,
                side: THREE.DoubleSide
            });
            const star = new THREE.Mesh(starGeometry, starMaterial);
            star.position.set(4, 1, -17);
            star.rotation.x = Math.PI / 2;
            scene.add(star);
        }
        
        function onMouseClick(event) {
            if (gameOver) return;
            
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects([leftPath, rightPath]);
            
            if (intersects.length > 0) {
                const selected = intersects[0].object;
                makeChoice(selected.userData.type);
            }
        }
        
        function makeChoice(type) {
            gameOver = true;
            selectedPath = type;
            
            const messageEl = document.getElementById('message');
            const restartBtn = document.getElementById('restartBtn');
            const instructions = document.getElementById('instructions');
            
            instructions.style.display = 'none';
            
            if (type === 'win') {
                messageEl.textContent = '🎉 ПОБЕДА! Ты выбрал правильный путь!';
                messageEl.style.background = 'rgba(0, 128, 0, 0.8)';
                celebrateWin();
            } else {
                messageEl.textContent = '💀 СМЕРТЬ! Неверный выбор...';
                messageEl.style.background = 'rgba(128, 0, 0, 0.8)';
                showDeath();
            }
            
            messageEl.style.display = 'block';
            restartBtn.style.display = 'block';
        }
        
        function celebrateWin() {
            // Анимация победы - игрок прыгает и светится
            let jumpHeight = 0;
            const winInterval = setInterval(() => {
                jumpHeight += 0.15;
                player.position.y = 1 + Math.abs(Math.sin(jumpHeight)) * 2;
                player.material.emissive.setHex(0x00ff00);
                if (jumpHeight > 3) {
                    clearInterval(winInterval);
                }
            }, 100);
            
            // Движение к правильному пути
            const moveInterval = setInterval(() => {
                player.position.z -= 0.2;
                player.position.x += 0.05;
                if (player.position.z < -15) {
                    clearInterval(moveInterval);
                }
            }, 50);
        }
        
        function showDeath() {
            // Анимация смерти - игрок падает
            const deathInterval = setInterval(() => {
                player.position.y -= 0.15;
                player.material.color.setHex(0xff0000);
                if (player.position.y < -2) {
                    clearInterval(deathInterval);
                }
            }, 100);
            
            // Движение к неправильному пути
            const moveInterval = setInterval(() => {
                player.position.z -= 0.15;
                player.position.x -= 0.03;
                if (player.position.z < -10) {
                    clearInterval(moveInterval);
                }
            }, 50);
        }
        
        function restartGame() {
            gameOver = false;
            selectedPath = null;
            
            // Сброс позиции игрока
            player.position.set(0, 1, 0);
            player.material.color.setHex(0x00ff00);
            player.material.emissive.setHex(0x003300);
            
            // Скрытие UI
            document.getElementById('message').style.display = 'none';
            document.getElementById('restartBtn').style.display = 'none';
            document.getElementById('instructions').style.display = 'block';
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (!gameOver) {
                // Анимация подпрыгивания игрока на месте
                bounceTime += 0.05;
                player.position.y = 1 + Math.sin(bounceTime) * 0.2;
                
                // Игрок не вращается
            }
            
            renderer.render(scene, camera);
        }
        
        // Запуск игры
        init();
    </script>
</body>
</html>
