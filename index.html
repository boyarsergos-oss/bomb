<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flappy Bird - Third Person</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
        }
        
        #score {
            font-size: 48px;
            font-weight: bold;
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 200;
        }
        
        #gameOver h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        #restartBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        #restartBtn:hover {
            transform: scale(1.1);
        }
        
        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 200;
        }
        
        #startBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        
        #startBtn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">0</div>
    </div>
    
    <div id="instructions">
        Press SPACE or Click to Flap<br>
        Avoid the pipes!
    </div>
    
    <div id="startScreen">
        <h1>🐦 3D Flappy Bird</h1>
        <p>Third Person Perspective</p>
        <button id="startBtn">Start Game</button>
    </div>
    
    <div id="gameOver">
        <h2>Game Over!</h2>
        <p id="finalScore">Score: 0</p>
        <button id="restartBtn">Play Again</button>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game variables
        let scene, camera, renderer;
        let bird, birdVelocity;
        let pipes = [];
        let score = 0;
        let gameRunning = false;
        let gameOver = false;
        const gravity = 0.015;
        const jumpStrength = 0.25;
        const pipeSpeed = 0.08;
        const pipeSpawnInterval = 1500;
        let lastPipeTime = 0;
        
        // Initialize the game
        function init() {
            // Create scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 50, 200);
            
            // Create camera (third person perspective - behind the bird)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(-15, 5, 20);
            camera.lookAt(0, 0, 0);
            
            // Create renderer
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('gameCanvas'),
                antialias: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            
            // Add lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(50, 50, 50);
            directionalLight.castShadow = true;
            directionalLight.shadow.camera.left = -50;
            directionalLight.shadow.camera.right = 50;
            directionalLight.shadow.camera.top = 50;
            directionalLight.shadow.camera.bottom = -50;
            scene.add(directionalLight);
            
            // Create bird (third person view - we see the back of the bird)
            createBird();
            
            // Create ground
            createGround();
            
            // Create skybox effect with clouds
            createClouds();
            
            // Event listeners
            document.addEventListener('keydown', handleKeyPress);
            document.addEventListener('click', handleClick);
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('restartBtn').addEventListener('click', restartGame);
            window.addEventListener('resize', handleResize);
            
            // Start animation loop
            animate();
        }
        
        function createBird() {
            bird = new THREE.Group();
            
            // Bird body (sphere)
            const bodyGeometry = new THREE.SphereGeometry(1, 32, 32);
            const bodyMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xFFD700,
                shininess: 100
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.castShadow = true;
            bird.add(body);
            
            // Bird eyes (smaller spheres on the front)
            const eyeGeometry = new THREE.SphereGeometry(0.2, 16, 16);
            const eyeMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });
            
            const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            leftEye.position.set(0.7, 0.3, 0.5);
            bird.add(leftEye);
            
            const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            rightEye.position.set(0.7, 0.3, -0.5);
            bird.add(rightEye);
            
            // Bird beak (cone)
            const beakGeometry = new THREE.ConeGeometry(0.3, 0.8, 16);
            const beakMaterial = new THREE.MeshPhongMaterial({ color: 0xFF6347 });
            const beak = new THREE.Mesh(beakGeometry, beakMaterial);
            beak.rotation.x = Math.PI / 2;
            beak.position.set(1.2, 0, 0);
            beak.castShadow = true;
            bird.add(beak);
            
            // Bird wings (flattened spheres)
            const wingGeometry = new THREE.SphereGeometry(0.6, 16, 16);
            const wingMaterial = new THREE.MeshPhongMaterial({ color: 0xFFA500 });
            
            const leftWing = new THREE.Mesh(wingGeometry, wingMaterial);
            leftWing.scale.set(1, 0.3, 1.5);
            leftWing.position.set(-0.3, 0, 0.8);
            leftWing.castShadow = true;
            bird.add(leftWing);
            
            const rightWing = new THREE.Mesh(wingGeometry, wingMaterial);
            rightWing.scale.set(1, 0.3, 1.5);
            rightWing.position.set(-0.3, 0, -0.8);
            rightWing.castShadow = true;
            bird.add(rightWing);
            
            bird.position.set(0, 0, 0);
            birdVelocity = 0;
            scene.add(bird);
        }
        
        function createGround() {
            const groundGeometry = new THREE.PlaneGeometry(200, 200);
            const groundMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x228B22,
                side: THREE.DoubleSide
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -10;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Add some grass details
            for (let i = 0; i < 100; i++) {
                const grassGeometry = new THREE.ConeGeometry(0.2, 1, 8);
                const grassMaterial = new THREE.MeshPhongMaterial({ color: 0x32CD32 });
                const grass = new THREE.Mesh(grassGeometry, grassMaterial);
                grass.position.set(
                    (Math.random() - 0.5) * 180,
                    -9.5,
                    (Math.random() - 0.5) * 180
                );
                grass.castShadow = true;
                scene.add(grass);
            }
        }
        
        function createClouds() {
            for (let i = 0; i < 20; i++) {
                const cloudGroup = new THREE.Group();
                
                const cloudGeometry = new THREE.SphereGeometry(2 + Math.random() * 3, 16, 16);
                const cloudMaterial = new THREE.MeshPhongMaterial({ 
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.8
                });
                
                const numPuffs = 3 + Math.floor(Math.random() * 3);
                for (let j = 0; j < numPuffs; j++) {
                    const puff = new THREE.Mesh(cloudGeometry, cloudMaterial);
                    puff.position.set(
                        (Math.random() - 0.5) * 6,
                        (Math.random() - 0.5) * 2,
                        (Math.random() - 0.5) * 4
                    );
                    cloudGroup.add(puff);
                }
                
                cloudGroup.position.set(
                    (Math.random() - 0.5) * 150,
                    20 + Math.random() * 30,
                    (Math.random() - 0.5) * 50
                );
                
                scene.add(cloudGroup);
            }
        }
        
        function createPipe(xPosition) {
            const pipeGap = 6;
            const pipeWidth = 3;
            const pipeDepth = 3;
            const minPipeLength = 5;
            const maxPipeLength = 12;
            const groundLevel = -10;
            const ceilingLevel = 10;
            
            // Случайная позиция разрыва между трубами
            const gapY = (minPipeLength + Math.random() * (maxPipeLength - minPipeLength)) + groundLevel + pipeGap / 2;
            
            // Pipe material
            const pipeMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x2E8B57,
                shininess: 50
            });
            
            // Верхняя труба (свисает сверху)
            const topPipeHeight = ceilingLevel - (gapY + pipeGap / 2);
            const topPipeGeometry = new THREE.BoxGeometry(pipeDepth, topPipeHeight, pipeWidth);
            const topPipe = new THREE.Mesh(topPipeGeometry, pipeMaterial);
            topPipe.position.set(xPosition, ceilingLevel - topPipeHeight / 2, 0);
            topPipe.castShadow = true;
            topPipe.receiveShadow = true;
            scene.add(topPipe);
            
            // Нижняя труба (растет снизу)
            const bottomPipeHeight = gapY - groundLevel;
            const bottomPipeGeometry = new THREE.BoxGeometry(pipeDepth, bottomPipeHeight, pipeWidth);
            const bottomPipe = new THREE.Mesh(bottomPipeGeometry, pipeMaterial);
            bottomPipe.position.set(xPosition, groundLevel + bottomPipeHeight / 2, 0);
            bottomPipe.castShadow = true;
            bottomPipe.receiveShadow = true;
            scene.add(bottomPipe);
            
            // Pipe cap (decorative ring) для верхней трубы
            const topCapGeometry = new THREE.CylinderGeometry(pipeWidth/2 + 0.3, pipeWidth/2 + 0.3, 0.5, 16);
            const capMaterial = new THREE.MeshPhongMaterial({ color: 0x3CB371 });
            
            const topCap = new THREE.Mesh(topCapGeometry, capMaterial);
            topCap.position.set(xPosition, ceilingLevel - topPipeHeight + 0.25, 0);
            topCap.castShadow = true;
            scene.add(topCap);
            
            // Pipe cap для нижней трубы
            const bottomCap = new THREE.Mesh(topCapGeometry, capMaterial);
            bottomCap.position.set(xPosition, groundLevel + bottomPipeHeight - 0.25, 0);
            bottomCap.castShadow = true;
            scene.add(bottomCap);
            
            pipes.push({
                top: topPipe,
                bottom: bottomPipe,
                topCap: topCap,
                bottomCap: bottomCap,
                passed: false
            });
        }
        
        function handleKeyPress(event) {
            if (event.code === 'Space' && gameRunning && !gameOver) {
                jump();
            }
        }
        
        function handleClick() {
            if (gameRunning && !gameOver) {
                jump();
            }
        }
        
        function jump() {
            birdVelocity = jumpStrength;
            
            // Animate wings
            const wings = bird.children.filter(child => 
                child.geometry && child.geometry.type === 'SphereGeometry' && 
                child.scale.z === 1.5
            );
            
            wings.forEach(wing => {
                wing.rotation.x = -0.5;
                setTimeout(() => {
                    wing.rotation.x = 0;
                }, 200);
            });
        }
        
        function updateBird() {
            birdVelocity -= gravity;
            bird.position.y += birdVelocity;
            
            // Птичка летит вперёд по оси X
            bird.position.x += pipeSpeed;
            
            // Rotate bird based on velocity
            bird.rotation.z = Math.min(Math.max(birdVelocity * 2, -0.5), 0.5);
            
            // Ground collision
            if (bird.position.y < -9) {
                endGame();
            }
            
            // Ceiling collision
            if (bird.position.y > 25) {
                bird.position.y = 25;
                birdVelocity = 0;
            }
        }
        
        function updatePipes() {
            const currentTime = Date.now();
            
            // Spawn new pipes - спавним трубу на позиции X птицы + расстояние впереди
            if (currentTime - lastPipeTime > pipeSpawnInterval) {
                const spawnX = bird.position.x + 50;
                createPipe(spawnX);
                lastPipeTime = currentTime;
            }
            
            // Check pipes (трубы стоят на месте, не двигаем их)
            for (let i = pipes.length - 1; i >= 0; i--) {
                const pipe = pipes[i];
                
                // Check if bird passed the pipe
                if (!pipe.passed && pipe.top.position.x < bird.position.x) {
                    pipe.passed = true;
                    score++;
                    document.getElementById('score').textContent = score;
                }
                
                // Collision detection - используем уменьшенный хитбокс для птицы
                const birdSize = 0.8; // Уменьшаем размер хитбокса
                const birdBox = new THREE.Box3(
                    new THREE.Vector3(bird.position.x - birdSize, bird.position.y - birdSize, bird.position.z - birdSize),
                    new THREE.Vector3(bird.position.x + birdSize, bird.position.y + birdSize, bird.position.z + birdSize)
                );
                const topPipeBox = new THREE.Box3().setFromObject(pipe.top);
                const bottomPipeBox = new THREE.Box3().setFromObject(pipe.bottom);
                
                if (birdBox.intersectsBox(topPipeBox) || birdBox.intersectsBox(bottomPipeBox)) {
                    endGame();
                }
                
                // Remove off-screen pipes (удаляем трубы, которые остались далеко позади птицы)
                if (pipe.top.position.x < bird.position.x - 30) {
                    scene.remove(pipe.top);
                    scene.remove(pipe.bottom);
                    scene.remove(pipe.topCap);
                    scene.remove(pipe.bottomCap);
                    pipes.splice(i, 1);
                }
            }
        }
        
        function updateCamera() {
            // Smooth camera follow - directly behind the bird
            const targetX = bird.position.x - 15;
            const targetY = bird.position.y + 5;
            const targetZ = bird.position.z;
            
            camera.position.x += (targetX - camera.position.x) * 0.1;
            camera.position.y += (targetY - camera.position.y) * 0.1;
            camera.position.z += (targetZ - camera.position.z) * 0.1;
            camera.lookAt(bird.position.x + 10, bird.position.y, bird.position.z);
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            gameOver = false;
            score = 0;
            document.getElementById('score').textContent = score;
            
            // Reset bird
            bird.position.set(0, 0, 0);
            birdVelocity = 0;
            bird.rotation.set(0, 0, 0);
            
            // Clear existing pipes
            pipes.forEach(pipe => {
                scene.remove(pipe.top);
                scene.remove(pipe.bottom);
                scene.remove(pipe.topCap);
                scene.remove(pipe.bottomCap);
            });
            pipes = [];
            
            lastPipeTime = Date.now();
        }
        
        function endGame() {
            gameRunning = false;
            gameOver = true;
            document.getElementById('finalScore').textContent = 'Score: ' + score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }
        
        function handleResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (gameRunning && !gameOver) {
                updateBird();
                updatePipes();
                updateCamera();
            } else if (!gameRunning && !gameOver) {
                // Idle animation before game starts
                bird.position.y = Math.sin(Date.now() * 0.002) * 2;
                updateCamera();
            }
            
            renderer.render(scene, camera);
        }
        
        // Initialize the game when page loads
        window.onload = init;
    </script>
</body>
</html>
