<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Style Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Lilita One', cursive, Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 15px;
            z-index: 100;
            border: 4px solid #fff;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        #info h3 {
            margin-bottom: 10px;
            font-size: 24px;
            text-shadow: 3px 3px 0 #000;
            color: #ffd700;
        }
        #info p {
            margin: 8px 0;
            font-size: 16px;
            text-shadow: 2px 2px 0 #000;
        }
        canvas {
            display: block;
        }
        #shoot-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            border: 5px solid white;
            border-radius: 50%;
            color: white;
            font-family: 'Lilita One', cursive;
            font-size: 18px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        #shoot-btn:active {
            transform: scale(0.9);
        }
        #joystick-area {
            position: absolute;
            bottom: 50px;
            left: 50px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            border: 4px solid white;
            z-index: 100;
        }
        #joystick {
            position: absolute;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            border-radius: 50%;
            border: 3px solid white;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>⚔️ УПРАВЛЕНИЕ ⚔️</h3>
        <p>🕹️ WASD / Стрелки - Движение</p>
        <p>💥 ЛКМ / Пробел - АТАКА!</p>
    </div>
    
    <div id="joystick-area">
        <div id="joystick"></div>
    </div>
    
    <button id="shoot-btn">💥</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Инициализация сцены - Brawl Stars стиль!
        const scene = new THREE.Scene();
        // Яркое небо в стиле Brawl Stars
        scene.background = new THREE.Color(0x5dade2);
        // Добавим немного тумана для глубины
        scene.fog = new THREE.Fog(0x5dade2, 50, 150);

        // Камера с изометрической проекцией (ортографическая)
        const aspect = window.innerWidth / window.innerHeight;
        const d = 20;
        const camera = new THREE.OrthographicCamera(
            -d * aspect, d * aspect, d, -d, 1, 1000
        );
        
        // Изометрический угол
        camera.position.set(20, 20, 20);
        camera.lookAt(scene.position);

        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Освещение - яркое и сочное как в Brawl Stars
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffeb3b, 0.9);
        directionalLight.position.set(15, 25, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.near = 0.5;
        directionalLight.shadow.camera.far = 100;
        directionalLight.shadow.camera.left = -30;
        directionalLight.shadow.camera.right = 30;
        directionalLight.shadow.camera.top = 30;
        directionalLight.shadow.camera.bottom = -30;
        scene.add(directionalLight);
        
        // Дополнительный свет для контраста
        const fillLight = new THREE.DirectionalLight(0xffa500, 0.3);
        fillLight.position.set(-10, 10, -10);
        scene.add(fillLight);

        // Земля (плоскость) с динамической текстурой для краски
        const groundSize = 250;
        const groundResolution = 512; // Разрешение текстуры для рисования
        const groundCanvas = document.createElement('canvas');
        groundCanvas.width = groundResolution;
        groundCanvas.height = groundResolution;
        const groundCtx = groundCanvas.getContext('2d');
        
        // Заполняем начальным цветом (ярко-зелёный - трава в стиле Brawl Stars)
        groundCtx.fillStyle = '#4ade80';
        groundCtx.fillRect(0, 0, groundResolution, groundResolution);
        
        // Добавим узор травы
        for (let i = 0; i < 200; i++) {
            const x = Math.random() * groundResolution;
            const y = Math.random() * groundResolution;
            const size = 2 + Math.random() * 4;
            groundCtx.fillStyle = Math.random() > 0.5 ? '#22c55e' : '#16a34a';
            groundCtx.beginPath();
            groundCtx.arc(x, y, size, 0, Math.PI * 2);
            groundCtx.fill();
        }
        
        const groundTexture = new THREE.CanvasTexture(groundCanvas);
        groundTexture.needsUpdate = true;
        
        const groundGeometry = new THREE.PlaneGeometry(groundSize, groundSize);
        const groundMaterial = new THREE.MeshLambertMaterial({ 
            map: groundTexture,
            color: 0xffffff
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Убираем сетку - в Brawl Stars её нет
        // const gridHelper = new THREE.GridHelper(250, 10, 0x000000, 0x000000);
        // gridHelper.material.opacity = 0.2;
        // gridHelper.material.transparent = true;
        // scene.add(gridHelper);

        // Создаём персонажа в стиле Brawl Stars (более мультяшный)
        const player = new THREE.Group();

        // Тело - более округлое и яркое
        const bodyGeometry = new THREE.CylinderGeometry(0.4, 0.5, 1.2, 16);
        const bodyMaterial = new THREE.MeshLambertMaterial({ color: 0xff4757 });
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        body.position.y = 0.6;
        body.castShadow = true;
        player.add(body);

        // Голова - круглая как в Brawl Stars
        const headGeometry = new THREE.SphereGeometry(0.5, 16, 16);
        const headMaterial = new THREE.MeshLambertMaterial({ color: 0xffeaa7 });
        const head = new THREE.Mesh(headGeometry, headMaterial);
        head.position.y = 1.5;
        head.castShadow = true;
        player.add(head);

        // Глаза
        const eyeGeometry = new THREE.SphereGeometry(0.08, 8, 8);
        const eyeMaterial = new THREE.MeshLambertMaterial({ color: 0x000000 });
        
        const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        leftEye.position.set(-0.15, 1.55, 0.4);
        player.add(leftEye);
        
        const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        rightEye.position.set(0.15, 1.55, 0.4);
        player.add(rightEye);

        // Ноги - короткие и толстые
        const legGeometry = new THREE.CylinderGeometry(0.15, 0.2, 0.6, 8);
        const legMaterial = new THREE.MeshLambertMaterial({ color: 0x2d3436 });
        
        const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
        leftLeg.position.set(-0.2, 0.3, 0);
        leftLeg.castShadow = true;
        player.add(leftLeg);

        const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
        rightLeg.position.set(0.2, 0.3, 0);
        rightLeg.castShadow = true;
        player.add(rightLeg);

        // Руки
        const armGeometry = new THREE.CylinderGeometry(0.1, 0.15, 0.8, 8);
        const armMaterial = new THREE.MeshLambertMaterial({ color: 0xff4757 });
        
        const leftArm = new THREE.Mesh(armGeometry, armMaterial);
        leftArm.position.set(-0.6, 1.0, 0);
        leftArm.rotation.z = 0.3;
        leftArm.castShadow = true;
        player.add(leftArm);
        
        const rightArm = new THREE.Mesh(armGeometry, armMaterial);
        rightArm.position.set(0.6, 1.0, 0);
        rightArm.rotation.z = -0.3;
        rightArm.castShadow = true;
        player.add(rightArm);

        scene.add(player);

        // Добавим декоративные объекты в стиле Brawl Stars
        function createTree(x, z) {
            const treeGroup = new THREE.Group();
            
            // Ствол - более мультяшный
            const trunkGeometry = new THREE.CylinderGeometry(0.25, 0.35, 1.2, 8);
            const trunkMaterial = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = 0.6;
            trunk.castShadow = true;
            treeGroup.add(trunk);

            // Крона - пышная и круглая
            const leavesGeometry = new THREE.SphereGeometry(1.2, 16, 16);
            const leavesMaterial = new THREE.MeshLambertMaterial({ color: 0x2ecc71 });
            const leaves = new THREE.Mesh(leavesGeometry, leavesMaterial);
            leaves.position.y = 1.8;
            leaves.castShadow = true;
            treeGroup.add(leaves);
            
            // Добавим ещё один слой листвы
            const leaves2Geometry = new THREE.SphereGeometry(0.9, 16, 16);
            const leaves2Material = new THREE.MeshLambertMaterial({ color: 0x27ae60 });
            const leaves2 = new THREE.Mesh(leaves2Geometry, leaves2Material);
            leaves2.position.y = 2.4;
            leaves2.castShadow = true;
            treeGroup.add(leaves2);

            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);
        }

        // Создаём несколько деревьев
        createTree(-8, -8);
        createTree(8, -6);
        createTree(-6, 8);
        createTree(7, 7);
        createTree(-10, 5);
        createTree(10, -10);
        createTree(-12, -5);
        createTree(12, 8);

        // Добавим камни в стиле Brawl Stars
        function createRock(x, z) {
            const rockGeometry = new THREE.DodecahedronGeometry(0.6, 0);
            const rockMaterial = new THREE.MeshLambertMaterial({ color: 0x95a5a6 });
            const rock = new THREE.Mesh(rockGeometry, rockMaterial);
            rock.position.set(x, 0.35, z);
            rock.scale.set(1 + Math.random() * 0.3, 0.7 + Math.random() * 0.3, 1 + Math.random() * 0.3);
            rock.rotation.set(Math.random() * 0.5, Math.random() * Math.PI, Math.random() * 0.5);
            rock.castShadow = true;
            scene.add(rock);
        }

        createRock(-5, -3);
        createRock(6, 4);
        createRock(-3, 6);
        createRock(4, -8);
        createRock(-8, 0);
        createRock(9, -3);

        // Добавим кусты
        function createBush(x, z) {
            const bushGroup = new THREE.Group();
            
            const bushGeometry = new THREE.SphereGeometry(0.5, 8, 8);
            const bushMaterial = new THREE.MeshLambertMaterial({ color: 0x22c55e });
            
            for (let i = 0; i < 3; i++) {
                const bush = new THREE.Mesh(bushGeometry, bushMaterial);
                bush.position.set(
                    (Math.random() - 0.5) * 0.6,
                    0.3 + Math.random() * 0.2,
                    (Math.random() - 0.5) * 0.6
                );
                bush.scale.set(1, 0.7, 1);
                bush.castShadow = true;
                bushGroup.add(bush);
            }
            
            bushGroup.position.set(x, 0, z);
            scene.add(bushGroup);
        }

        createBush(-4, 2);
        createBush(3, -5);
        createBush(-7, -7);
        createBush(5, 9);

        // Переменные для мыши
        const mouse = new THREE.Vector2();
        let targetPoint = new THREE.Vector3(0, 0, 0);
        const paintColor = 0x00d2ff; // Ярко-голубой цвет краски в стиле Brawl Stars
        
        // Текущее направление персонажа (по умолчанию смотрит вниз-вправо по экрану)
        let playerDirection = new THREE.Vector3(1, 0, -1).normalize();

        // Джойстик управление
        const joystickArea = document.getElementById('joystick-area');
        const joystick = document.getElementById('joystick');
        let joystickActive = false;
        let joystickCenter = { x: 0, y: 0 };
        let joystickPosition = { x: 0, y: 0 };
        const maxJoystickDistance = 35;

        joystickArea.addEventListener('touchstart', handleJoystickStart, { passive: false });
        joystickArea.addEventListener('touchmove', handleJoystickMove, { passive: false });
        joystickArea.addEventListener('touchend', handleJoystickEnd, { passive: false });
        joystickArea.addEventListener('mousedown', handleJoystickStart);
        document.addEventListener('mousemove', handleJoystickMove);
        document.addEventListener('mouseup', handleJoystickEnd);

        function handleJoystickStart(e) {
            if (e.type === 'touchstart') {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = joystickArea.getBoundingClientRect();
                joystickCenter = {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2
                };
                updateJoystick(touch.clientX, touch.clientY);
                joystickActive = true;
            } else if (e.target === joystick || e.target === joystickArea) {
                const rect = joystickArea.getBoundingClientRect();
                joystickCenter = {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2
                };
                updateJoystick(e.clientX, e.clientY);
                joystickActive = true;
            }
        }

        function handleJoystickMove(e) {
            if (!joystickActive) return;
            if (e.type === 'touchmove') e.preventDefault();
            
            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
            updateJoystick(clientX, clientY);
        }

        function handleJoystickEnd() {
            joystickActive = false;
            joystickPosition = { x: 0, y: 0 };
            joystick.style.transform = `translate(-50%, -50%)`;
        }

        function updateJoystick(clientX, clientY) {
            let dx = clientX - joystickCenter.x;
            let dy = clientY - joystickCenter.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance > maxJoystickDistance) {
                const ratio = maxJoystickDistance / distance;
                dx *= ratio;
                dy *= ratio;
            }
            
            joystickPosition = { x: dx, y: dy };
            joystick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            
            // Преобразуем позицию джойстика в движение
            keys.w = dy < -10;
            keys.s = dy > 10;
            keys.a = dx < -10;
            keys.d = dx > 10;
        }

        // Кнопка стрельбы
        const shootBtn = document.getElementById('shoot-btn');
        shootBtn.addEventListener('click', () => {
            isShooting = true;
            setTimeout(() => { isShooting = false; }, 100);
        });
        shootBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isShooting = true;
        });
        shootBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            isShooting = false;
        });

        // Функция обновления позиции курсора мыши на земле
        function updateMousePosition(clientX, clientY) {
            // Нормализованные координаты мыши (-1 до +1)
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            
            // Создаем луч из камеры через позицию мыши
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            // Находим пересечение с землей
            const intersects = raycaster.intersectObject(ground);
            
            if (intersects.length > 0) {
                targetPoint.copy(intersects[0].point);
            } else {
                // Если курсор за пределами карты, проецируем луч на плоскость y=0
                // Получаем направление луча
                const rayDirection = raycaster.ray.direction.clone();
                
                // Если луч направлен вниз (к земле), вычисляем пересечение с плоскостью y=0
                if (rayDirection.y < 0) {
                    const rayOrigin = raycaster.ray.origin.clone();
                    // Вычисляем параметр t для пересечения с плоскостью y=0
                    // rayOrigin.y + t * rayDirection.y = 0
                    // t = -rayOrigin.y / rayDirection.y
                    const t = -rayOrigin.y / rayDirection.y;
                    
                    // Вычисляем точку пересечения
                    targetPoint.copy(rayOrigin).add(rayDirection.multiplyScalar(t));
                }
                // Если луч направлен вверх (y > 0), оставляем targetPoint без изменений
                // или можно установить его в бесконечности в направлении луча
            }
        }

        // Обработка движения мыши для определения направления стрельбы
        document.addEventListener('mousemove', (event) => {
            lastMouseX = event.clientX;
            lastMouseY = event.clientY;
            updateMousePosition(lastMouseX, lastMouseY);
        });
        
        // Инициализируем позицию мыши при загрузке (чтобы работало даже без движения мыши)
        // Устанавливаем начальную позицию мыши в центр экрана
        let lastMouseX = window.innerWidth / 2;
        let lastMouseY = window.innerHeight / 2;
        updateMousePosition(lastMouseX, lastMouseY);

        // Функция рисования краски на земле
        function paintOnGround(position, radius = 0.5) {
            // Преобразуем 3D координаты в 2D координаты текстуры
            const u = (position.x + groundSize / 2) / groundSize * groundResolution;
            const v = (position.z + groundSize / 2) / groundSize * groundResolution;
            
            // Рисуем круг на canvas - ярко-голубой цвет как в Brawl Stars
            groundCtx.beginPath();
            groundCtx.arc(u, v, radius / groundSize * groundResolution, 0, Math.PI * 2);
            groundCtx.fillStyle = '#00d2ff';
            groundCtx.fill();
            
            // Добавим свечение
            groundCtx.beginPath();
            groundCtx.arc(u, v, radius / groundSize * groundResolution * 1.5, 0, Math.PI * 2);
            groundCtx.fillStyle = 'rgba(0, 210, 255, 0.3)';
            groundCtx.fill();
            
            // Обновляем текстуру
            groundTexture.needsUpdate = true;
        }
        
        // Функция выстрела краской
        function shootPaint() {
            // Точка начала луча - позиция игрока + смещение вверх (откуда стреляет)
            const rayOrigin = player.position.clone();
            rayOrigin.y = 1.2; // Высота "руки" или оружия

            // Направление выстрела - к точке, куда указывает курсор мыши
            const shootDirection = targetPoint.clone().sub(rayOrigin).normalize();

            // Добавляем эффект частиц при выстреле (шланг) - теперь создаём поток постоянно
            createHoseStream(rayOrigin, shootDirection);
        }
        
        // Эффект "шланга" - поток жидкости
        const hoseParticles = [];
        const splashParticles = []; // Частицы для эффекта разбрызгивания
        
        // Функция создания потока жидкости из шланга
        function createHoseStream(origin, direction) {
            const particleCount = 4; // Уменьшено количество частиц за кадр при стрельбе
            const particleGeometry = new THREE.SphereGeometry(0.08, 8, 8);
            
            for (let i = 0; i < particleCount; i++) {
                const particleMaterial = new THREE.MeshBasicMaterial({ 
                    color: paintColor,
                    transparent: true,
                    opacity: 0.9
                });
                const particle = new THREE.Mesh(particleGeometry, particleMaterial);
                
                // Все частицы начинают движение от игрока с небольшим разбросом
                const spreadOffset = (Math.random() - 0.5) * 0.3;
                particle.position.copy(origin);
                particle.position.x += spreadOffset;
                particle.position.z += spreadOffset;
                
                // Направление с небольшим разбросом для более естественного потока
                const spreadAngle = (Math.random() - 0.5) * 0.15;
                const spreadDirection = direction.clone();
                spreadDirection.applyAxisAngle(new THREE.Vector3(0, 1, 0), spreadAngle);
                particle.userData.velocity = spreadDirection;
                
                // Скорость потока - высокая для быстрой доставки к цели
                particle.userData.speed = 1.2 + Math.random() * 0.3;
                particle.userData.life = 1.0;
                particle.userData.onGround = false;
                
                scene.add(particle);
                hoseParticles.push(particle);
            }
        }
        
        // Функция создания брызг при ударе о землю
        function createSplash(position, normal) {
            const splashCount = 3; // Количество брызг на одно попадание (уменьшено)
            const splashGeometry = new THREE.SphereGeometry(0.04, 6, 6);
            
            for (let i = 0; i < splashCount; i++) {
                const particleMaterial = new THREE.MeshBasicMaterial({ 
                    color: paintColor,
                    transparent: true,
                    opacity: 0.85
                });
                const particle = new THREE.Mesh(splashGeometry, particleMaterial);
                
                particle.position.copy(position);
                particle.position.y += 0.1;
                
                // Случайное направление разбрызгивания вверх и в стороны (уменьшен радиус)
                const angle = Math.random() * Math.PI * 2;
                const horizontalSpeed = 0.05 + Math.random() * 0.1; // Уменьшена горизонтальная скорость
                const verticalSpeed = 0.1 + Math.random() * 0.15; // Уменьшена вертикальная скорость
                
                particle.userData.velocity = new THREE.Vector3(
                    Math.cos(angle) * horizontalSpeed,
                    verticalSpeed,
                    Math.sin(angle) * horizontalSpeed
                );
                
                particle.userData.speed = 1.0;
                particle.userData.life = 0.6 + Math.random() * 0.3;
                particle.userData.onGround = false;
                particle.userData.isSplash = true;
                
                scene.add(particle);
                splashParticles.push(particle);
            }
        }
        
        // Обновление частиц шланга
        function updateHoseParticles() {
            for (let i = hoseParticles.length - 1; i >= 0; i--) {
                const particle = hoseParticles[i];
                
                if (!particle.userData.onGround) {
                    // Движение частицы в полёте
                    particle.position.add(
                        particle.userData.velocity.clone().multiplyScalar(particle.userData.speed)
                    );
                    
                    // Гравитация (более сильная для эффекта жидкости)
                    particle.userData.velocity.y -= 0.025;
                    
                    // Проверка столкновения с землёй
                    if (particle.position.y <= 0.1) {
                        particle.position.y = 0.1;
                        particle.userData.onGround = true;
                        particle.userData.spreadTime = 0;
                        
                        // Рисуем краску на земле в точке попадания
                        paintOnGround(particle.position.clone(), 0.4);
                        
                        // Создаём эффект брызг при ударе о землю
                        createSplash(particle.position.clone(), new THREE.Vector3(0, 1, 0));
                        
                        // Расплющиваем частицу на земле
                        particle.scale.set(1.5, 0.3, 1.5);
                    }
                } else {
                    // Частица на земле - растекается и исчезает
                    particle.userData.spreadTime += 0.05;
                    particle.userData.life -= 0.04;
                    
                    // Растекание по поверхности
                    const spreadScale = 1.5 + particle.userData.spreadTime * 2;
                    particle.scale.set(spreadScale, 0.2, spreadScale);
                }
                
                // Уменьшение прозрачности
                particle.material.opacity = particle.userData.life * 0.9;
                
                if (particle.userData.life <= 0) {
                    scene.remove(particle);
                    particle.geometry.dispose();
                    particle.material.dispose();
                    hoseParticles.splice(i, 1);
                    continue;
                }
            }
        }
        
        // Обновление частиц разбрызгивания
        function updateSplashParticles() {
            for (let i = splashParticles.length - 1; i >= 0; i--) {
                const particle = splashParticles[i];
                
                // Движение частицы
                particle.position.add(
                    particle.userData.velocity.clone().multiplyScalar(particle.userData.speed)
                );
                
                // Гравитация
                particle.userData.velocity.y -= 0.03;
                
                // Проверка столкновения с землёй
                if (particle.position.y <= 0.05) {
                    particle.position.y = 0.05;
                    particle.userData.onGround = true;
                    particle.userData.velocity.set(0, 0, 0); // Останавливаем движение
                    
                    // Рисуем краску на земле от брызг (только один раз при касании)
                    if (!particle.userData.painted) {
                        paintOnGround(particle.position.clone(), 0.2);
                        particle.userData.painted = true;
                    }
                    
                    // Расплющиваем частицу брызг
                    particle.scale.set(0.8, 0.2, 0.8);
                }
                
                // Уменьшение жизни
                particle.userData.life -= 0.025;
                
                // Уменьшение прозрачности
                particle.material.opacity = particle.userData.life * 0.85;
                
                if (particle.userData.life <= 0) {
                    scene.remove(particle);
                    particle.geometry.dispose();
                    particle.material.dispose();
                    splashParticles.splice(i, 1);
                    continue;
                }
            }
        }

        // Управление
        const keys = {
            w: false,
            a: false,
            s: false,
            d: false,
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };

        let isShooting = false;
        let shootCooldown = 0;
        const shootDelay = 2; // Задержка между выстрелами (чем меньше, тем быстрее)

        document.addEventListener('keydown', (event) => {
            // Обработка движения - используем code для надёжности
            const key = event.code.replace('Key', '').toLowerCase();
            if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                keys[key] = true;
            }
            if (event.code === 'ArrowUp') keys.ArrowUp = true;
            if (event.code === 'ArrowDown') keys.ArrowDown = true;
            if (event.code === 'ArrowLeft') keys.ArrowLeft = true;
            if (event.code === 'ArrowRight') keys.ArrowRight = true;
            
            // Обработка начала стрельбы (Пробел)
            if (event.code === 'Space') {
                isShooting = true;
            }
        });

        document.addEventListener('keyup', (event) => {
            // Обработка движения - используем code для надёжности
            const key = event.code.replace('Key', '').toLowerCase();
            if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                keys[key] = false;
            }
            if (event.code === 'ArrowUp') keys.ArrowUp = false;
            if (event.code === 'ArrowDown') keys.ArrowDown = false;
            if (event.code === 'ArrowLeft') keys.ArrowLeft = false;
            if (event.code === 'ArrowRight') keys.ArrowRight = false;
            
            // Остановка стрельбы при отпускании пробела
            if (event.code === 'Space') {
                isShooting = false;
            }
        });

        // Стрельба по клику мыши (начало)
        document.addEventListener('mousedown', (event) => {
            if (event.button === 0) { // Левая кнопка мыши
                isShooting = true;
            }
        });

        // Остановка стрельбы при отпускании кнопки мыши
        document.addEventListener('mouseup', (event) => {
            if (event.button === 0) { // Левая кнопка мыши
                isShooting = false;
            }
        });

        // Переменные для движения
        let walkCycle = 0;

        // Обработка изменения размера окна
        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Анимация
        function animate() {
            requestAnimationFrame(animate);

            let isMoving = false;
            const moveSpeed = 0.15;
            
            // Обновляем позицию курсора мыши каждый кадр (чтобы направление работало даже без движения мыши)
            updateMousePosition(lastMouseX, lastMouseY);

            // Движение персонажа в изометрической проекции
            // В изометрии: 
            // - Вверх по экрану = комбинация -X и -Z
            // - Вниз по экрану = комбинация +X и +Z
            // - Влево по экрану = комбинация -X и +Z
            // - Вправо по экрану = комбинация +X и -Z
            
            if (keys.w || keys.ArrowUp) {
                // Визуально вверх по экрану
                player.position.x -= moveSpeed * Math.cos(Math.PI / 4);
                player.position.z -= moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(-1, 0, -1).normalize();
            }
            if (keys.s || keys.ArrowDown) {
                // Визуально вниз по экрану
                player.position.x += moveSpeed * Math.cos(Math.PI / 4);
                player.position.z += moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(1, 0, 1).normalize();
            }
            if (keys.a || keys.ArrowLeft) {
                // Визуально влево по экрану
                player.position.x -= moveSpeed * Math.cos(Math.PI / 4);
                player.position.z += moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(-1, 0, 1).normalize();
            }
            if (keys.d || keys.ArrowRight) {
                // Визуально вправо по экрану
                player.position.x += moveSpeed * Math.cos(Math.PI / 4);
                player.position.z -= moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(1, 0, -1).normalize();
            }

            // Ограничение движения границами земли
            const boundary = groundSize / 2 - 1;
            player.position.x = Math.max(-boundary, Math.min(boundary, player.position.x));
            player.position.z = Math.max(-boundary, Math.min(boundary, player.position.z));

            // Поворот персонажа за мышкой (всегда, независимо от движения)
            // Вычисляем направление от игрока к точке под мышкой
            const directionToMouse = new THREE.Vector3()
                .subVectors(targetPoint, player.position)
                .normalize();
            
            // Обновляем направление персонажа (только по горизонтали)
            playerDirection.set(directionToMouse.x, 0, directionToMouse.z).normalize();
            
            // Поворачиваем персонажа в направлении мыши
            if (directionToMouse.length() > 0.01) {
                const targetRotation = Math.atan2(directionToMouse.x, directionToMouse.z);
                player.rotation.y = targetRotation;
            }

            // Анимация ходьбы
            if (isMoving) {
                walkCycle += 0.2;
                leftLeg.rotation.x = Math.sin(walkCycle) * 0.5;
                rightLeg.rotation.x = Math.sin(walkCycle + Math.PI) * 0.5;
                
                // Небольшое покачивание тела
                body.position.y = 0.6 + Math.sin(walkCycle * 2) * 0.03;
                head.position.y = 1.5 + Math.sin(walkCycle * 2) * 0.03;
                
                // Покачивание рук при ходьбе
                leftArm.rotation.x = Math.sin(walkCycle) * 0.3;
                rightArm.rotation.x = Math.sin(walkCycle + Math.PI) * 0.3;
            } else {
                // Возврат ног в исходное положение
                leftLeg.rotation.x = THREE.MathUtils.lerp(leftLeg.rotation.x, 0, 0.1);
                rightLeg.rotation.x = THREE.MathUtils.lerp(rightLeg.rotation.x, 0, 0.1);
                body.position.y = THREE.MathUtils.lerp(body.position.y, 0.6, 0.1);
                head.position.y = THREE.MathUtils.lerp(head.position.y, 1.5, 0.1);
                leftArm.rotation.x = THREE.MathUtils.lerp(leftArm.rotation.x, 0, 0.1);
                rightArm.rotation.x = THREE.MathUtils.lerp(rightArm.rotation.x, 0, 0.1);
            }

            // Камера следует за игроком
            camera.position.x = player.position.x + 20;
            camera.position.z = player.position.z + 20;
            camera.position.y = 20;
            camera.lookAt(player.position);

            // Обновление частиц шланга
            updateHoseParticles();
            
            // Обновление частиц разбрызгивания
            updateSplashParticles();

            // Обработка непрерывной стрельбы - струя следует за курсором
            if (isShooting) {
                if (shootCooldown <= 0) {
                    shootPaint();
                    shootCooldown = shootDelay;
                } else {
                    shootCooldown--;
                }
                // Создаём поток частиц каждый кадр пока нажата кнопка
                const rayOrigin = player.position.clone();
                rayOrigin.y = 1.2;
                const shootDirection = targetPoint.clone().sub(rayOrigin).normalize();
                createHoseStream(rayOrigin, shootDirection);
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
