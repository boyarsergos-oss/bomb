<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Изометрическая Сцена</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
        }
        #info h3 {
            margin-bottom: 10px;
        }
        #info p {
            margin: 5px 0;
            font-size: 14px;
        }
        #scoreboard {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            text-align: right;
        }
        #scoreboard h3 {
            margin-bottom: 10px;
        }
        .score-item {
            margin: 5px 0;
            font-size: 16px;
        }
        #timer {
            font-size: 24px;
            font-weight: bold;
            color: #ffff00;
        }
        #fps-counter {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #00ff00;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            z-index: 100;
            font-family: monospace;
            font-size: 16px;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>Управление</h3>
        <p>W / Стрелка вверх - Вперёд</p>
        <p>S / Стрелка вниз - Назад</p>
        <p>A / Стрелка влево - Влево</p>
        <p>D / Стрелка вправо - Вправо</p>
        <p>ЛКМ / Пробел - Стрелять краской</p>
    </div>
    
    <div id="scoreboard">
        <h3>Счёт</h3>
        <div class="score-item" style="color: #ff6b6b;">Игрок: <span id="player-score">0</span>%</div>
        <div class="score-item" style="color: #4a9eff;">Соперник: <span id="ai-score">0</span>%</div>
        <div id="timer">2:00</div>
    </div>
    
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Инициализация сцены
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        // Камера с изометрической проекцией (ортографическая)
        const aspect = window.innerWidth / window.innerHeight;
        const d = 20;
        const camera = new THREE.OrthographicCamera(
            -d * aspect, d * aspect, d, -d, 1, 1000
        );
        
        // Изометрический угол
        camera.position.set(20, 20, 20);
        camera.lookAt(scene.position);

        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        // Земля (плоскость) с динамической текстурой для краски
        const groundSize = 50;
        const groundResolution = 512; // Разрешение текстуры для рисования
        const groundCanvas = document.createElement('canvas');
        groundCanvas.width = groundResolution;
        groundCanvas.height = groundResolution;
        const groundCtx = groundCanvas.getContext('2d');
        
        // Заполняем начальным цветом (зелёный - трава)
        groundCtx.fillStyle = '#3a7d3a';
        groundCtx.fillRect(0, 0, groundResolution, groundResolution);
        
        const groundTexture = new THREE.CanvasTexture(groundCanvas);
        groundTexture.needsUpdate = true;
        
        const groundGeometry = new THREE.PlaneGeometry(groundSize, groundSize);
        const groundMaterial = new THREE.MeshLambertMaterial({ 
            map: groundTexture,
            color: 0xffffff
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Сетка на земле
        const gridHelper = new THREE.GridHelper(50, 10, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Создаём персонажа (группа объектов)
        const player = new THREE.Group();

        // Тело
        const bodyGeometry = new THREE.BoxGeometry(1, 1.5, 0.6);
        const bodyMaterial = new THREE.MeshLambertMaterial({ color: 0xff6b6b });
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        body.position.y = 0.75;
        body.castShadow = true;
        player.add(body);

        // Голова
        const headGeometry = new THREE.BoxGeometry(0.7, 0.7, 0.7);
        const headMaterial = new THREE.MeshLambertMaterial({ color: 0xffccaa });
        const head = new THREE.Mesh(headGeometry, headMaterial);
        head.position.y = 1.85;
        head.castShadow = true;
        player.add(head);

        // Ноги
        const legGeometry = new THREE.BoxGeometry(0.3, 0.7, 0.3);
        const legMaterial = new THREE.MeshLambertMaterial({ color: 0x4a4a4a });
        
        const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
        leftLeg.position.set(-0.25, 0.35, 0);
        leftLeg.castShadow = true;
        player.add(leftLeg);

        const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
        rightLeg.position.set(0.25, 0.35, 0);
        rightLeg.castShadow = true;
        player.add(rightLeg);

        scene.add(player);

        // Добавим несколько декоративных объектов
        function createTree(x, z) {
            const treeGroup = new THREE.Group();
            
            // Ствол
            const trunkGeometry = new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8);
            const trunkMaterial = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = 0.75;
            trunk.castShadow = true;
            treeGroup.add(trunk);

            // Крона
            const leavesGeometry = new THREE.ConeGeometry(1, 2, 8);
            const leavesMaterial = new THREE.MeshLambertMaterial({ color: 0x228b22 });
            const leaves = new THREE.Mesh(leavesGeometry, leavesMaterial);
            leaves.position.y = 2.5;
            leaves.castShadow = true;
            treeGroup.add(leaves);

            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);
        }

        // Создаём несколько деревьев
        createTree(-8, -8);
        createTree(8, -6);
        createTree(-6, 8);
        createTree(7, 7);
        createTree(-10, 5);
        createTree(10, -10);

        // Добавим камни
        function createRock(x, z) {
            const rockGeometry = new THREE.DodecahedronGeometry(0.5, 0);
            const rockMaterial = new THREE.MeshLambertMaterial({ color: 0x808080 });
            const rock = new THREE.Mesh(rockGeometry, rockMaterial);
            rock.position.set(x, 0.3, z);
            rock.scale.set(1 + Math.random() * 0.5, 0.8 + Math.random() * 0.4, 1 + Math.random() * 0.5);
            rock.castShadow = true;
            scene.add(rock);
        }

        createRock(-5, -3);
        createRock(6, 4);
        createRock(-3, 6);
        createRock(4, -8);

        // === ИГРОВЫЕ ПЕРЕМЕННЫЕ ===
        const playerPaintColor = 0xff1493; // Розовый цвет игрока
        const aiPaintColor = 0x4a9eff;     // Синий цвет соперника (AI)
        let gameTime = 120; // 2 минуты в секундах
        let gameActive = true;
        
        // FPS счётчик
        let frameCount = 0;
        let lastFpsUpdate = performance.now();
        let fps = 0;
        
        // Переменные для мыши
        const mouse = new THREE.Vector2();
        let targetPoint = new THREE.Vector3(0, 0, 0);
        
        // Текущее направление персонажа (по умолчанию смотрит вниз-вправо по экрану)
        let playerDirection = new THREE.Vector3(1, 0, -1).normalize();

        // === СОПЕРНИК (AI) ===
        const ai = new THREE.Group();
        
        // Тело AI (синий цвет)
        const aiBodyGeometry = new THREE.BoxGeometry(1, 1.5, 0.6);
        const aiBodyMaterial = new THREE.MeshLambertMaterial({ color: 0x4a9eff });
        const aiBody = new THREE.Mesh(aiBodyGeometry, aiBodyMaterial);
        aiBody.position.y = 0.75;
        aiBody.castShadow = true;
        ai.add(aiBody);

        // Голова AI
        const aiHeadGeometry = new THREE.BoxGeometry(0.7, 0.7, 0.7);
        const aiHeadMaterial = new THREE.MeshLambertMaterial({ color: 0xffccaa });
        const aiHead = new THREE.Mesh(aiHeadGeometry, aiHeadMaterial);
        aiHead.position.y = 1.85;
        aiHead.castShadow = true;
        ai.add(aiHead);

        // Ноги AI
        const aiLegGeometry = new THREE.BoxGeometry(0.3, 0.7, 0.3);
        const aiLegMaterial = new THREE.MeshLambertMaterial({ color: 0x2a2a2a });
        
        const aiLeftLeg = new THREE.Mesh(aiLegGeometry, aiLegMaterial);
        aiLeftLeg.position.set(-0.25, 0.35, 0);
        aiLeftLeg.castShadow = true;
        ai.add(aiLeftLeg);

        const aiRightLeg = new THREE.Mesh(aiLegGeometry, aiLegMaterial);
        aiRightLeg.position.set(0.25, 0.35, 0);
        aiRightLeg.castShadow = true;
        ai.add(aiRightLeg);
        
        // Начальная позиция AI (противоположная от игрока)
        ai.position.set(-15, 0, -15);
        scene.add(ai);
        
        // Переменные AI
        let aiWalkCycle = 0;
        let aiTargetPosition = new THREE.Vector3(15, 0, 15);
        let aiShootCooldown = 0;
        let aiThinkTimer = 0;
        let aiState = 'patrol'; // patrol, chase, paint
        let aiMoveSpeed = 0.12;

        // Обработка движения мыши для определения направления стрельбы
        document.addEventListener('mousemove', (event) => {
            // Нормализованные координаты мыши (-1 до +1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Создаем луч из камеры через позицию мыши
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            // Находим пересечение с землей
            const intersects = raycaster.intersectObject(ground);
            
            if (intersects.length > 0) {
                targetPoint.copy(intersects[0].point);
            }
        });

        // Функция рисования краски на земле (с поддержкой цвета)
        function paintOnGround(position, radius = 0.5, color = '#ff1493') {
            // Преобразуем 3D координаты в 2D координаты текстуры
            const u = (position.x + groundSize / 2) / groundSize * groundResolution;
            const v = (position.z + groundSize / 2) / groundSize * groundResolution;
            
            // Рисуем круг на canvas
            groundCtx.beginPath();
            groundCtx.arc(u, v, radius / groundSize * groundResolution, 0, Math.PI * 2);
            groundCtx.fillStyle = color;
            groundCtx.fill();
            
            // Обновляем текстуру
            groundTexture.needsUpdate = true;
        }
        
        // Функция для AI - рисование синей краской
        function aiPaintOnGround(position, radius = 0.5) {
            paintOnGround(position, radius, '#4a9eff');
        }
        
        // === ЛОГИКА AI СОПЕРНИКА ===
        function updateAI() {
            if (!gameActive) return;
            
            aiThinkTimer++;
            
            // Каждые 30 кадров (~0.5 сек) AI принимает решение
            if (aiThinkTimer >= 30) {
                aiThinkTimer = 0;
                
                // Находим случайную точку для покраски или ближайшую к игроку
                const distToPlayer = ai.position.distanceTo(player.position);
                
                // Если игрок близко - преследуем и красим рядом с ним
                if (distToPlayer < 15 && Math.random() > 0.3) {
                    aiState = 'chase';
                    // Точка рядом с игроком
                    const offset = new THREE.Vector3(
                        (Math.random() - 0.5) * 8,
                        0,
                        (Math.random() - 0.5) * 8
                    );
                    aiTargetPosition.copy(player.position).add(offset);
                } else {
                    // Иначе ищем свободную зону для покраски
                    aiState = 'paint';
                    aiTargetPosition.set(
                        (Math.random() - 0.5) * 40,
                        0,
                        (Math.random() - 0.5) * 40
                    );
                }
                
                // Ограничиваем целевую позицию границами карты
                aiTargetPosition.x = Math.max(-24, Math.min(24, aiTargetPosition.x));
                aiTargetPosition.z = Math.max(-24, Math.min(24, aiTargetPosition.z));
            }
            
            // Движение к цели
            const directionToTarget = new THREE.Vector3()
                .subVectors(aiTargetPosition, ai.position)
                .normalize();
            
            // Поворот AI в направлении движения
            if (directionToTarget.length() > 0.01) {
                const targetRotation = Math.atan2(directionToTarget.x, directionToTarget.z);
                ai.rotation.y = targetRotation;
            }
            
            // Движение
            const distToTarget = ai.position.distanceTo(aiTargetPosition);
            let isAiMoving = false;
            
            if (distToTarget > 2) {
                ai.position.add(directionToTarget.multiplyScalar(aiMoveSpeed));
                isAiMoving = true;
                
                // Анимация ходьбы
                aiWalkCycle += 0.2;
                aiLeftLeg.rotation.x = Math.sin(aiWalkCycle) * 0.5;
                aiRightLeg.rotation.x = Math.sin(aiWalkCycle + Math.PI) * 0.5;
                aiBody.position.y = 0.75 + Math.sin(aiWalkCycle * 2) * 0.05;
                aiHead.position.y = 1.85 + Math.sin(aiWalkCycle * 2) * 0.05;
            } else {
                // Достиг цели - красим территорию
                if (aiShootCooldown <= 0) {
                    aiShootPaint();
                    aiShootCooldown = 8;
                }
                aiShootCooldown--;
                
                // Возврат ног в исходное положение
                aiLeftLeg.rotation.x = THREE.MathUtils.lerp(aiLeftLeg.rotation.x, 0, 0.1);
                aiRightLeg.rotation.x = THREE.MathUtils.lerp(aiRightLeg.rotation.x, 0, 0.1);
                aiBody.position.y = THREE.MathUtils.lerp(aiBody.position.y, 0.75, 0.1);
                aiHead.position.y = THREE.MathUtils.lerp(aiHead.position.y, 1.85, 0.1);
            }
            
            // Ограничение движения границами земли
            ai.position.x = Math.max(-24, Math.min(24, ai.position.x));
            ai.position.z = Math.max(-24, Math.min(24, ai.position.z));
        }
        
        // Выстрел краской AI
        function aiShootPaint() {
            const rayOrigin = ai.position.clone();
            rayOrigin.y = 1.2;
            
            // AI стреляет в случайную точку перед собой
            const shootDirection = new THREE.Vector3(
                Math.sin(ai.rotation.y),
                0,
                Math.cos(ai.rotation.y)
            ).normalize();
            
            // Добавляем небольшой разброс
            shootDirection.x += (Math.random() - 0.5) * 0.5;
            shootDirection.z += (Math.random() - 0.5) * 0.5;
            
            createAiHoseStream(rayOrigin, shootDirection);
        }
        
        // Поток краски AI
        const aiHoseParticles = [];
        
        function createAiHoseStream(origin, direction) {
            const particleCount = 3;
            const particleGeometry = new THREE.SphereGeometry(0.08, 8, 8);
            
            for (let i = 0; i < particleCount; i++) {
                const particleMaterial = new THREE.MeshBasicMaterial({ 
                    color: aiPaintColor,
                    transparent: true,
                    opacity: 0.9
                });
                const particle = new THREE.Mesh(particleGeometry, particleMaterial);
                
                const spreadOffset = (Math.random() - 0.5) * 0.3;
                particle.position.copy(origin);
                particle.position.x += spreadOffset;
                particle.position.z += spreadOffset;
                
                const spreadAngle = (Math.random() - 0.5) * 0.15;
                const spreadDirection = direction.clone();
                spreadDirection.applyAxisAngle(new THREE.Vector3(0, 1, 0), spreadAngle);
                particle.userData.velocity = spreadDirection;
                particle.userData.speed = 1.2 + Math.random() * 0.3;
                particle.userData.life = 1.0;
                particle.userData.onGround = false;
                
                scene.add(particle);
                aiHoseParticles.push(particle);
            }
        }
        
        // Обновление частиц AI
        function updateAiHoseParticles() {
            for (let i = aiHoseParticles.length - 1; i >= 0; i--) {
                const particle = aiHoseParticles[i];
                
                if (!particle.userData.onGround) {
                    particle.position.add(
                        particle.userData.velocity.clone().multiplyScalar(particle.userData.speed)
                    );
                    
                    particle.userData.velocity.y -= 0.025;
                    
                    if (particle.position.y <= 0.1) {
                        particle.position.y = 0.1;
                        particle.userData.onGround = true;
                        particle.userData.spreadTime = 0;
                        
                        // AI красит землю своим цветом
                        aiPaintOnGround(particle.position.clone(), 0.4);
                        
                        particle.scale.set(1.5, 0.3, 1.5);
                    }
                } else {
                    particle.userData.spreadTime += 0.05;
                    particle.userData.life -= 0.04;
                    
                    const spreadScale = 1.5 + particle.userData.spreadTime * 2;
                    particle.scale.set(spreadScale, 0.2, spreadScale);
                }
                
                particle.material.opacity = particle.userData.life * 0.9;
                
                if (particle.userData.life <= 0) {
                    scene.remove(particle);
                    particle.geometry.dispose();
                    particle.material.dispose();
                    aiHoseParticles.splice(i, 1);
                }
            }
        }
        
        // Подсчёт процентов закрашенной территории
        function calculateScores() {
            const imageData = groundCtx.getImageData(0, 0, groundResolution, groundResolution);
            const data = imageData.data;
            
            let playerPixels = 0;
            let aiPixels = 0;
            let totalColored = 0;
            
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                // Проверка на розовый цвет игрока (#ff1493)
                if (r > 200 && g < 50 && b > 100) {
                    playerPixels++;
                    totalColored++;
                }
                // Проверка на синий цвет AI (#4a9eff)
                else if (r < 100 && g > 120 && b > 200) {
                    aiPixels++;
                    totalColored++;
                }
            }
            
            const totalPixels = groundResolution * groundResolution;
            const playerPercent = ((playerPixels / totalPixels) * 100).toFixed(1);
            const aiPercent = ((aiPixels / totalPixels) * 100).toFixed(1);
            
            document.getElementById('player-score').textContent = playerPercent;
            document.getElementById('ai-score').textContent = aiPercent;
            
            return { player: parseFloat(playerPercent), ai: parseFloat(aiPercent) };
        }
        
        // Функция выстрела краской
        function shootPaint() {
            // Точка начала луча - позиция игрока + смещение вверх (откуда стреляет)
            const rayOrigin = player.position.clone();
            rayOrigin.y = 1.2; // Высота "руки" или оружия

            // Направление выстрела - к точке, куда указывает курсор мыши
            const shootDirection = targetPoint.clone().sub(rayOrigin).normalize();

            // Добавляем эффект частиц при выстреле (шланг) - теперь создаём поток постоянно
            createHoseStream(rayOrigin, shootDirection);
        }
        
        // Эффект "шланга" - поток жидкости
        const hoseParticles = [];
        const splashParticles = []; // Частицы для эффекта разбрызгивания
        
        // Функция создания потока жидкости из шланга
        function createHoseStream(origin, direction) {
            const particleCount = 4; // Уменьшено количество частиц за кадр при стрельбе
            const particleGeometry = new THREE.SphereGeometry(0.08, 8, 8);
            
            for (let i = 0; i < particleCount; i++) {
                const particleMaterial = new THREE.MeshBasicMaterial({ 
                    color: playerPaintColor,
                    transparent: true,
                    opacity: 0.9
                });
                const particle = new THREE.Mesh(particleGeometry, particleMaterial);
                
                // Все частицы начинают движение от игрока с небольшим разбросом
                const spreadOffset = (Math.random() - 0.5) * 0.3;
                particle.position.copy(origin);
                particle.position.x += spreadOffset;
                particle.position.z += spreadOffset;
                
                // Направление с небольшим разбросом для более естественного потока
                const spreadAngle = (Math.random() - 0.5) * 0.15;
                const spreadDirection = direction.clone();
                spreadDirection.applyAxisAngle(new THREE.Vector3(0, 1, 0), spreadAngle);
                particle.userData.velocity = spreadDirection;
                
                // Скорость потока - высокая для быстрой доставки к цели
                particle.userData.speed = 1.2 + Math.random() * 0.3;
                particle.userData.life = 1.0;
                particle.userData.onGround = false;
                
                scene.add(particle);
                hoseParticles.push(particle);
            }
        }
        
        // Функция создания брызг при ударе о землю
        function createSplash(position, normal) {
            const splashCount = 3; // Количество брызг на одно попадание (уменьшено)
            const splashGeometry = new THREE.SphereGeometry(0.04, 6, 6);
            
            for (let i = 0; i < splashCount; i++) {
                const particleMaterial = new THREE.MeshBasicMaterial({ 
                    color: playerPaintColor,
                    transparent: true,
                    opacity: 0.85
                });
                const particle = new THREE.Mesh(splashGeometry, particleMaterial);
                
                particle.position.copy(position);
                particle.position.y += 0.1;
                
                // Случайное направление разбрызгивания вверх и в стороны (уменьшен радиус)
                const angle = Math.random() * Math.PI * 2;
                const horizontalSpeed = 0.05 + Math.random() * 0.1; // Уменьшена горизонтальная скорость
                const verticalSpeed = 0.1 + Math.random() * 0.15; // Уменьшена вертикальная скорость
                
                particle.userData.velocity = new THREE.Vector3(
                    Math.cos(angle) * horizontalSpeed,
                    verticalSpeed,
                    Math.sin(angle) * horizontalSpeed
                );
                
                particle.userData.speed = 1.0;
                particle.userData.life = 0.6 + Math.random() * 0.3;
                particle.userData.onGround = false;
                particle.userData.isSplash = true;
                
                scene.add(particle);
                splashParticles.push(particle);
            }
        }
        
        // Обновление частиц шланга
        function updateHoseParticles() {
            for (let i = hoseParticles.length - 1; i >= 0; i--) {
                const particle = hoseParticles[i];
                
                if (!particle.userData.onGround) {
                    // Движение частицы в полёте
                    particle.position.add(
                        particle.userData.velocity.clone().multiplyScalar(particle.userData.speed)
                    );
                    
                    // Гравитация (более сильная для эффекта жидкости)
                    particle.userData.velocity.y -= 0.025;
                    
                    // Проверка столкновения с землёй
                    if (particle.position.y <= 0.1) {
                        particle.position.y = 0.1;
                        particle.userData.onGround = true;
                        particle.userData.spreadTime = 0;
                        
                        // Рисуем краску на земле в точке попадания
                        paintOnGround(particle.position.clone(), 0.4);
                        
                        // Создаём эффект брызг при ударе о землю
                        createSplash(particle.position.clone(), new THREE.Vector3(0, 1, 0));
                        
                        // Расплющиваем частицу на земле
                        particle.scale.set(1.5, 0.3, 1.5);
                    }
                } else {
                    // Частица на земле - растекается и исчезает
                    particle.userData.spreadTime += 0.05;
                    particle.userData.life -= 0.04;
                    
                    // Растекание по поверхности
                    const spreadScale = 1.5 + particle.userData.spreadTime * 2;
                    particle.scale.set(spreadScale, 0.2, spreadScale);
                }
                
                // Уменьшение прозрачности
                particle.material.opacity = particle.userData.life * 0.9;
                
                if (particle.userData.life <= 0) {
                    scene.remove(particle);
                    particle.geometry.dispose();
                    particle.material.dispose();
                    hoseParticles.splice(i, 1);
                    continue;
                }
            }
        }
        
        // Обновление частиц разбрызгивания
        function updateSplashParticles() {
            for (let i = splashParticles.length - 1; i >= 0; i--) {
                const particle = splashParticles[i];
                
                // Движение частицы
                particle.position.add(
                    particle.userData.velocity.clone().multiplyScalar(particle.userData.speed)
                );
                
                // Гравитация
                particle.userData.velocity.y -= 0.03;
                
                // Проверка столкновения с землёй
                if (particle.position.y <= 0.05) {
                    particle.position.y = 0.05;
                    particle.userData.onGround = true;
                    particle.userData.velocity.set(0, 0, 0); // Останавливаем движение
                    
                    // Рисуем краску на земле от брызг (только один раз при касании)
                    if (!particle.userData.painted) {
                        paintOnGround(particle.position.clone(), 0.2);
                        particle.userData.painted = true;
                    }
                    
                    // Расплющиваем частицу брызг
                    particle.scale.set(0.8, 0.2, 0.8);
                }
                
                // Уменьшение жизни
                particle.userData.life -= 0.025;
                
                // Уменьшение прозрачности
                particle.material.opacity = particle.userData.life * 0.85;
                
                if (particle.userData.life <= 0) {
                    scene.remove(particle);
                    particle.geometry.dispose();
                    particle.material.dispose();
                    splashParticles.splice(i, 1);
                    continue;
                }
            }
        }

        // Управление
        const keys = {
            w: false,
            a: false,
            s: false,
            d: false,
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };

        let isShooting = false;
        let shootCooldown = 0;
        const shootDelay = 2; // Задержка между выстрелами (чем меньше, тем быстрее)

        document.addEventListener('keydown', (event) => {
            // Обработка движения
            if (keys.hasOwnProperty(event.key)) {
                keys[event.key] = true;
            }
            // Обработка начала стрельбы (Пробел)
            if (event.code === 'Space') {
                isShooting = true;
            }
        });

        document.addEventListener('keyup', (event) => {
            // Обработка движения
            if (keys.hasOwnProperty(event.key)) {
                keys[event.key] = false;
            }
            // Остановка стрельбы при отпускании пробела
            if (event.code === 'Space') {
                isShooting = false;
            }
        });

        // Стрельба по клику мыши (начало)
        document.addEventListener('mousedown', (event) => {
            if (event.button === 0) { // Левая кнопка мыши
                isShooting = true;
            }
        });

        // Остановка стрельбы при отпускании кнопки мыши
        document.addEventListener('mouseup', (event) => {
            if (event.button === 0) { // Левая кнопка мыши
                isShooting = false;
            }
        });

        // Переменные для движения
        let walkCycle = 0;

        // Обработка изменения размера окна
        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Анимация
        function animate() {
            requestAnimationFrame(animate);

            let isMoving = false;
            const moveSpeed = 0.15;

            // Движение персонажа в изометрической проекции
            // В изометрии: 
            // - Вверх по экрану = комбинация -X и -Z
            // - Вниз по экрану = комбинация +X и +Z
            // - Влево по экрану = комбинация -X и +Z
            // - Вправо по экрану = комбинация +X и -Z
            
            if (keys.w || keys.ArrowUp) {
                // Визуально вверх по экрану
                player.position.x -= moveSpeed * Math.cos(Math.PI / 4);
                player.position.z -= moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(-1, 0, -1).normalize();
            }
            if (keys.s || keys.ArrowDown) {
                // Визуально вниз по экрану
                player.position.x += moveSpeed * Math.cos(Math.PI / 4);
                player.position.z += moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(1, 0, 1).normalize();
            }
            if (keys.a || keys.ArrowLeft) {
                // Визуально влево по экрану
                player.position.x -= moveSpeed * Math.cos(Math.PI / 4);
                player.position.z += moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(-1, 0, 1).normalize();
            }
            if (keys.d || keys.ArrowRight) {
                // Визуально вправо по экрану
                player.position.x += moveSpeed * Math.cos(Math.PI / 4);
                player.position.z -= moveSpeed * Math.sin(Math.PI / 4);
                isMoving = true;
                // Обновляем направление персонажа
                playerDirection.set(1, 0, -1).normalize();
            }

            // Ограничение движения границами земли
            player.position.x = Math.max(-24, Math.min(24, player.position.x));
            player.position.z = Math.max(-24, Math.min(24, player.position.z));

            // Поворот персонажа за мышкой (всегда, независимо от движения)
            // Вычисляем направление от игрока к точке под мышкой
            const directionToMouse = new THREE.Vector3()
                .subVectors(targetPoint, player.position)
                .normalize();
            
            // Обновляем направление персонажа (только по горизонтали)
            playerDirection.set(directionToMouse.x, 0, directionToMouse.z).normalize();
            
            // Поворачиваем персонажа в направлении мыши
            if (directionToMouse.length() > 0.01) {
                const targetRotation = Math.atan2(directionToMouse.x, directionToMouse.z);
                player.rotation.y = targetRotation;
            }

            // Анимация ходьбы
            if (isMoving) {
                walkCycle += 0.2;
                leftLeg.rotation.x = Math.sin(walkCycle) * 0.5;
                rightLeg.rotation.x = Math.sin(walkCycle + Math.PI) * 0.5;
                
                // Небольшое покачивание тела
                body.position.y = 0.75 + Math.sin(walkCycle * 2) * 0.05;
                head.position.y = 1.85 + Math.sin(walkCycle * 2) * 0.05;
            } else {
                // Возврат ног в исходное положение
                leftLeg.rotation.x = THREE.MathUtils.lerp(leftLeg.rotation.x, 0, 0.1);
                rightLeg.rotation.x = THREE.MathUtils.lerp(rightLeg.rotation.x, 0, 0.1);
                body.position.y = THREE.MathUtils.lerp(body.position.y, 0.75, 0.1);
                head.position.y = THREE.MathUtils.lerp(head.position.y, 1.85, 0.1);
            }

            // Камера следует за игроком
            camera.position.x = player.position.x + 20;
            camera.position.z = player.position.z + 20;
            camera.position.y = 20;
            camera.lookAt(player.position);

            // === ОБНОВЛЕНИЕ AI ===
            updateAI();
            
            // Обновление частиц AI
            updateAiHoseParticles();

            // === ПОДСЧЁТ ОЧКОВ И ТАЙМЕР ===
            // Подсчёт очков каждые 30 кадров
            if (frameCount % 30 === 0) {
                calculateScores();
            }
            
            // Обновление таймера
            const currentTime = performance.now();
            if (currentTime - lastFpsUpdate >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFpsUpdate = currentTime;
                
                // Обновление FPS счётчика
                document.getElementById('fps-value').textContent = fps;
                
                // Обновление игрового таймера (каждую секунду)
                if (gameActive && gameTime > 0) {
                    gameTime--;
                    
                    // Форматирование времени
                    const minutes = Math.floor(gameTime / 60);
                    const seconds = gameTime % 60;
                    document.getElementById('timer').textContent = 
                        `${minutes}:${seconds.toString().padStart(2, '0')}`;
                    
                    // Конец игры
                    if (gameTime <= 0) {
                        gameActive = false;
                        const scores = calculateScores();
                        let resultText = '';
                        if (scores.player > scores.ai) {
                            resultText = '🎉 ПОБЕДА! 🎉';
                        } else if (scores.ai > scores.player) {
                            resultText = '😔 ПОРАЖЕНИЕ 😔';
                        } else {
                            resultText = '🤝 НИЧЬЯ 🤝';
                        }
                        document.getElementById('timer').textContent = resultText;
                    }
                }
            }
            frameCount++;

            // Обновление частиц шланга
            updateHoseParticles();
            
            // Обновление частиц разбрызгивания
            updateSplashParticles();

            // Обработка непрерывной стрельбы - струя следует за курсором
            if (isShooting) {
                if (shootCooldown <= 0) {
                    shootPaint();
                    shootCooldown = shootDelay;
                } else {
                    shootCooldown--;
                }
                // Создаём поток частиц каждый кадр пока нажата кнопка
                const rayOrigin = player.position.clone();
                rayOrigin.y = 1.2;
                const shootDirection = targetPoint.clone().sub(rayOrigin).normalize();
                createHoseStream(rayOrigin, shootDirection);
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
