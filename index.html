<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Платформер: Выбор пути</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 4px #000;
            user-select: none;
        }
        #level-indicator { font-size: 24px; font-weight: bold; }
        #message { font-size: 18px; margin-top: 10px; color: #ffeb3b; }
        #restart-btn {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 20px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            pointer-events: auto;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            font-weight: bold;
        }
        #restart-btn:hover { background: #45a049; }
    </style>
</head>
<body>

<div id="ui">
    <div id="level-indicator">Уровень: 1</div>
    <div id="message">Найди безопасную платформу!</div>
</div>
<button id="restart-btn" onclick="resetGame()">Попробовать снова</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- НАСТРОЙКИ ---
    const PLAYER_SPEED = 0.15;
    const JUMP_FORCE = 0.28;
    const GRAVITY = 0.015;
    const PLATFORM_WIDTH = 3.5;
    const PLATFORM_DEPTH = 4;
    const GAP_SIZE = 2.5; 
    
    let scene, camera, renderer;
    let player;
    let platforms = [];
    
    // Физика
    let velocity = new THREE.Vector3(0, 0, 0);
    let isGrounded = false;
    let canJump = false;
    
    // Состояние игры
    let currentLevel = 1;
    const MAX_LEVELS = 5;
    let gameActive = true;
    let keys = {};

    const restartBtn = document.getElementById('restart-btn');
    const levelText = document.getElementById('level-indicator');
    const msgText = document.getElementById('message');

    function init() {
        // Сцена
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 15, 40);

        // Камера
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 6, 12);
        camera.lookAt(0, 0, 0);

        // Рендерер
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Свет
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        scene.add(dirLight);

        // Игрок
        const playerGeo = new THREE.BoxGeometry(1, 1, 1);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0xff9800 });
        player = new THREE.Mesh(playerGeo, playerMat);
        player.castShadow = true;
        player.receiveShadow = true;
        scene.add(player);

        // Управление
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        window.addEventListener('resize', onWindowResize, false);

        startLevel(1);
        animate();
    }

    function createPlatform(x, z, type) {
        const geometry = new THREE.BoxGeometry(PLATFORM_WIDTH, 1, PLATFORM_DEPTH);
        // Все платформы серые, чтобы игрок не знал заранее
        const material = new THREE.MeshStandardMaterial({ color: 0xaaaaaa }); 
        const mesh = new THREE.Mesh(geometry, material);
        
        mesh.position.set(x, 0, z);
        mesh.receiveShadow = true;
        mesh.castShadow = true;
        
        // Данные платформы
        mesh.userData = {
            type: type, // 'safe' или 'trap'
            active: true
        };

        scene.add(mesh);
        platforms.push(mesh);
        return mesh;
    }

    function startLevel(level) {
        currentLevel = level;
        levelText.innerText = `Уровень: ${currentLevel}`;
        msgText.innerText = "Осторожно! Одна платформа пропадет.";
        msgText.style.color = "#ffeb3b";
        gameActive = true;
        restartBtn.style.display = 'none';

        // Очистка
        platforms.forEach(p => scene.remove(p));
        platforms = [];
        
        // Сброс игрока
        player.position.set(0, 2, -10);
        velocity.set(0, 0, 0);
        isGrounded = false;

        // 1. Стартовая платформа
        createPlatform(0, -10, 'safe');

        // 2. Две платформы выбора (случайный выбор безопасной)
        const isSafeLeft = Math.random() < 0.5;
        const xPosLeft = - (GAP_SIZE + PLATFORM_WIDTH) / 2;
        const xPosRight = (GAP_SIZE + PLATFORM_WIDTH) / 2;
        const zPosChoice = 0;

        if (isSafeLeft) {
            createPlatform(xPosLeft, zPosChoice, 'safe');
            createPlatform(xPosRight, zPosChoice, 'trap');
        } else {
            createPlatform(xPosLeft, zPosChoice, 'trap');
            createPlatform(xPosRight, zPosChoice, 'safe');
        }

        // 3. Финишная платформа
        createPlatform(0, 10, 'safe');
    }

    function resetGame() {
        startLevel(1);
    }

    function gameOver(win) {
        gameActive = false;
        restartBtn.style.display = 'block';
        if (win) {
            msgText.innerText = "ПОБЕДА! Ты мастер памяти!";
            msgText.style.color = "#4CAF50";
        } else {
            msgText.innerText = "Упс! Это была ловушка.";
            msgText.style.color = "#F44336";
        }
    }

    function updatePhysics() {
        if (!gameActive) return;

        // --- Движение ---
        let moveX = 0;
        let moveZ = 0;

        if (keys['KeyW'] || keys['ArrowUp']) moveZ = -1;
        if (keys['KeyS'] || keys['ArrowDown']) moveZ = 1;
        if (keys['KeyA'] || keys['ArrowLeft']) moveX = -1;
        if (keys['KeyD'] || keys['ArrowRight']) moveX = 1;

        // Нормализация диагонального движения
        if (moveX !== 0 || moveZ !== 0) {
            const length = Math.sqrt(moveX*moveX + moveZ*moveZ);
            moveX /= length;
            moveZ /= length;
        }

        player.position.x += moveX * PLAYER_SPEED;
        player.position.z += moveZ * PLAYER_SPEED;

        // --- Прыжок ---
        if ((keys['Space'] || keys['ArrowUp'] && moveZ === 0) && isGrounded && !keys['SpaceLocked']) {
            velocity.y = JUMP_FORCE;
            isGrounded = false;
            keys['SpaceLocked'] = true; // Чтобы не прыгать бесконечно при зажатой кнопке
        }
        if (!keys['Space']) keys['SpaceLocked'] = false;

        // --- Гравитация ---
        velocity.y -= GRAVITY;
        player.position.y += velocity.y;

        // --- Коллизии ---
        isGrounded = false;
        const playerBottom = player.position.y - 0.5; // Низ игрока
        const playerTop = player.position.y + 0.5;
        
        // Простая проверка: если падаем вниз и пересекаем уровень платформы
        for (let i = 0; i < platforms.length; i++) {
            const p = platforms[i];
            
            if (!p.userData.active) continue; // Пропускаем исчезнувшие

            const pTop = p.position.y + 0.5;
            const pHalfW = PLATFORM_WIDTH / 2;
            const pHalfD = PLATFORM_DEPTH / 2;

            // Проверка по горизонтали (находимся ли мы над платформой)
            const dx = Math.abs(player.position.x - p.position.x);
            const dz = Math.abs(player.position.z - p.position.z);

            if (dx <= pHalfW + 0.4 && dz <= pHalfD + 0.4) {
                // Проверка по вертикали
                // Если мы падали (velocity.y <= 0) и низ игрока чуть выше или внутри верха платформы
                if (velocity.y <= 0 && playerBottom >= pTop - 0.2 && playerBottom <= pTop + 0.5) {
                    
                    // Приземление
                    player.position.y = pTop + 0.5;
                    velocity.y = 0;
                    isGrounded = true;

                    // Обработка ловушки
                    if (p.userData.type === 'trap') {
                        triggerTrap(p);
                    }
                    break; // Нашли землю, выходим из цикла
                }
            }
        }

        // --- Смерть от падения ---
        if (player.position.y < -5) {
            gameOver(false);
        }

        // --- Победа (уровень) ---
        if (player.position.z > 8 && isGrounded) {
            if (currentLevel >= MAX_LEVELS) {
                gameOver(true);
            } else {
                startLevel(currentLevel + 1);
            }
        }
    }

    function triggerTrap(platformMesh) {
        platformMesh.userData.active = false;
        
        // Визуальный эффект: краснеет и исчезает
        platformMesh.material.color.setHex(0xff0000);
        
        // Удаляем меш из сцены и массива сразу, чтобы игрок начал падать в следующем кадре
        scene.remove(platformMesh);
        const idx = platforms.indexOf(platformMesh);
        if (idx > -1) platforms.splice(idx, 1);
        
        isGrounded = false; // Игрок больше не на земле
    }

    function updateCamera() {
        // Камера следует за игроком плавно
        const targetX = player.position.x * 0.5;
        const targetY = player.position.y + 6;
        const targetZ = player.position.z + 10;

        camera.position.x += (targetX - camera.position.x) * 0.1;
        camera.position.y += (targetY - camera.position.y) * 0.1;
        camera.position.z += (targetZ - camera.position.z) * 0.1;

        camera.lookAt(player.position);
    }

    function animate() {
        requestAnimationFrame(animate);
        updatePhysics();
        updateCamera();
        renderer.render(scene, camera);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
</script>
</body>
</html>
