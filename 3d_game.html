<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Игра - Побег из комнаты</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
        }
        h1 { margin: 0; font-size: 24px; color: #4CAF50; }
        p { margin: 5px 0; font-size: 16px; }
        .controls {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 10px;
        }
        #winMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(76, 175, 80, 0.95);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.5);
            z-index: 100;
        }
        #winMessage h2 { margin: 0 0 20px 0; font-size: 36px; }
        button {
            background: #fff;
            color: #4CAF50;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            background: #e8f5e9;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>🤖 Побег из комнаты</h1>
        <div class="controls">
            <p><strong>Управление:</strong></p>
            <p>W / Стрелка вверх - Вперёд</p>
            <p>S / Стрелка вниз - Назад</p>
            <p>A / Стрелка влево - Влево</p>
            <p>D / Стрелка вправо - Вправо</p>
            <p>Пробел - Прыжок</p>
        </div>
    </div>
    
    <div id="winMessage">
        <h2>🎉 Победа!</h2>
        <p>Вы успешно добрались до выхода!</p>
        <button onclick="resetGame()">Играть снова</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Сцена, камера, рендерер
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        // Создание комнаты
        const roomWidth = 30;
        const roomHeight = 10;
        const roomDepth = 30;
        
        // Пол (деревянный)
        const floorGeometry = new THREE.PlaneGeometry(roomWidth, roomDepth);
        const floorMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x8B4513,
            roughness: 0.8,
            metalness: 0.2
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // Потолок
        const ceilingGeometry = new THREE.PlaneGeometry(roomWidth, roomDepth);
        const ceilingMaterial = new THREE.MeshStandardMaterial({ color: 0xF5F5DC, side: THREE.DoubleSide });
        const ceiling = new THREE.Mesh(ceilingGeometry, ceilingMaterial);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = roomHeight;
        ceiling.receiveShadow = true;
        scene.add(ceiling);
        
        // Стены
        const wallMaterial = new THREE.MeshStandardMaterial({ color: 0xF5F5DC, roughness: 0.9 });
        
        const frontWall = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomHeight), wallMaterial);
        frontWall.position.set(0, roomHeight/2, -roomDepth/2);
        frontWall.receiveShadow = true;
        scene.add(frontWall);
        
        const backWall = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomHeight), wallMaterial);
        backWall.position.set(0, roomHeight/2, roomDepth/2);
        backWall.rotation.y = Math.PI;
        backWall.receiveShadow = true;
        scene.add(backWall);
        
        const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(roomDepth, roomHeight), wallMaterial);
        leftWall.position.set(-roomWidth/2, roomHeight/2, 0);
        leftWall.rotation.y = Math.PI / 2;
        leftWall.receiveShadow = true;
        scene.add(leftWall);
        
        const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(roomDepth, roomHeight), wallMaterial);
        rightWall.position.set(roomWidth/2, roomHeight/2, 0);
        rightWall.rotation.y = -Math.PI / 2;
        rightWall.receiveShadow = true;
        scene.add(rightWall);
        
        // Картины на стенах
        function createPicture(x, y, z, rotY, color) {
            const pictureGeometry = new THREE.PlaneGeometry(2, 1.5);
            const pictureMaterial = new THREE.MeshStandardMaterial({ color: color, side: THREE.DoubleSide });
            const picture = new THREE.Mesh(pictureGeometry, pictureMaterial);
            picture.position.set(x, y, z);
            picture.rotation.y = rotY;
            scene.add(picture);
            
            const frameGeometry = new THREE.BoxGeometry(2.2, 1.7, 0.1);
            const frameMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const frame = new THREE.Mesh(frameGeometry, frameMaterial);
            frame.position.copy(picture.position);
            frame.rotation.y = rotY;
            scene.add(frame);
        }
        
        createPicture(-10, 5, -roomDepth/2 + 0.1, 0, 0xFF6347);
        createPicture(0, 5, -roomDepth/2 + 0.1, 0, 0x4682B4);
        createPicture(10, 5, -roomDepth/2 + 0.1, 0, 0x32CD32);
        createPicture(-roomWidth/2 + 0.1, 5, -5, Math.PI/2, 0xFFD700);
        createPicture(-roomWidth/2 + 0.1, 5, 5, Math.PI/2, 0xDA70D6);
        createPicture(roomWidth/2 - 0.1, 5, -5, -Math.PI/2, 0x20B2AA);

        // Игрок - оригинальный робот
        const playerGroup = new THREE.Group();
        
        // Тело
        const bodyGeometry = new THREE.BoxGeometry(1, 1.2, 0.6);
        const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0x4169E1, metalness: 0.7, roughness: 0.3 });
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        body.position.y = 1.6;
        body.castShadow = true;
        playerGroup.add(body);
        
        // Голова
        const headGeometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const headMaterial = new THREE.MeshStandardMaterial({ color: 0xC0C0C0, metalness: 0.8, roughness: 0.2 });
        const head = new THREE.Mesh(headGeometry, headMaterial);
        head.position.y = 2.6;
        head.castShadow = true;
        playerGroup.add(head);
        
        // Глаза
        const eyeGeometry = new THREE.SphereGeometry(0.15, 16, 16);
        const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0x00FF00, emissive: 0x00FF00, emissiveIntensity: 0.5 });
        const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        leftEye.position.set(-0.2, 2.6, 0.45);
        playerGroup.add(leftEye);
        
        const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        rightEye.position.set(0.2, 2.6, 0.45);
        playerGroup.add(rightEye);
        
        // Антенна
        const antennaGeometry = new THREE.CylinderGeometry(0.05, 0.05, 0.6, 8);
        const antennaMaterial = new THREE.MeshStandardMaterial({ color: 0x808080 });
        const antenna = new THREE.Mesh(antennaGeometry, antennaMaterial);
        antenna.position.y = 3.1;
        playerGroup.add(antenna);
        
        const antennaTopGeometry = new THREE.SphereGeometry(0.15, 16, 16);
        const antennaTopMaterial = new THREE.MeshStandardMaterial({ color: 0xFF0000, emissive: 0xFF0000, emissiveIntensity: 0.3 });
        const antennaTop = new THREE.Mesh(antennaTopGeometry, antennaTopMaterial);
        antennaTop.position.y = 3.5;
        playerGroup.add(antennaTop);
        
        // Руки
        const armGeometry = new THREE.BoxGeometry(0.3, 0.8, 0.3);
        const armMaterial = new THREE.MeshStandardMaterial({ color: 0x4169E1, metalness: 0.7, roughness: 0.3 });
        
        const leftArm = new THREE.Mesh(armGeometry, armMaterial);
        leftArm.position.set(-0.7, 1.6, 0);
        leftArm.castShadow = true;
        playerGroup.add(leftArm);
        
        const rightArm = new THREE.Mesh(armGeometry, armMaterial);
        rightArm.position.set(0.7, 1.6, 0);
        rightArm.castShadow = true;
        playerGroup.add(rightArm);
        
        // Ноги
        const legGeometry = new THREE.BoxGeometry(0.35, 0.8, 0.35);
        const legMaterial = new THREE.MeshStandardMaterial({ color: 0x2F4F4F, metalness: 0.6, roughness: 0.4 });
        
        const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
        leftLeg.position.set(-0.25, 0.4, 0);
        leftLeg.castShadow = true;
        playerGroup.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
        rightLeg.position.set(0.25, 0.4, 0);
        rightLeg.castShadow = true;
        playerGroup.add(rightLeg);
        
        scene.add(playerGroup);
        playerGroup.position.set(0, 0, -10);
        
        // Выход
        const exitGeometry = new THREE.BoxGeometry(4, 0.1, 4);
        const exitMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x00FF00, 
            transparent: true, 
            opacity: 0.7,
            emissive: 0x00FF00,
            emissiveIntensity: 0.3
        });
        const exitZone = new THREE.Mesh(exitGeometry, exitMaterial);
        exitZone.position.set(0, 0.05, 12);
        scene.add(exitZone);
        
        // Флаг
        const flagPoleGeometry = new THREE.CylinderGeometry(0.1, 0.1, 3, 8);
        const flagPoleMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const flagPole = new THREE.Mesh(flagPoleGeometry, flagPoleMaterial);
        flagPole.position.set(0, 1.5, 12);
        scene.add(flagPole);
        
        const flagGeometry = new THREE.PlaneGeometry(1.5, 1);
        const flagMaterial = new THREE.MeshStandardMaterial({ color: 0xFFFF00, side: THREE.DoubleSide });
        const flag = new THREE.Mesh(flagGeometry, flagMaterial);
        flag.position.set(0.75, 2.5, 12);
        scene.add(flag);

        // Физика
        let velocityY = 0;
        let isJumping = false;
        const gravity = -0.015;
        const jumpForce = 0.35;
        const speed = 0.15;
        
        const keys = { w: false, a: false, s: false, d: false };
        
        document.addEventListener('keydown', (event) => {
            switch(event.code) {
                case 'KeyW': case 'ArrowUp': keys.w = true; break;
                case 'KeyS': case 'ArrowDown': keys.s = true; break;
                case 'KeyA': case 'ArrowLeft': keys.a = true; break;
                case 'KeyD': case 'ArrowRight': keys.d = true; break;
                case 'Space':
                    if (!isJumping) { velocityY = jumpForce; isJumping = true; }
                    break;
            }
        });
        
        document.addEventListener('keyup', (event) => {
            switch(event.code) {
                case 'KeyW': case 'ArrowUp': keys.w = false; break;
                case 'KeyS': case 'ArrowDown': keys.s = false; break;
                case 'KeyA': case 'ArrowLeft': keys.a = false; break;
                case 'KeyD': case 'ArrowRight': keys.d = false; break;
            }
        });
        
        let walkCycle = 0;
        
        function animatePlayer() {
            const isMoving = keys.w || keys.s || keys.a || keys.d;
            
            if (isMoving && !isJumping) {
                walkCycle += 0.2;
                leftArm.rotation.x = Math.sin(walkCycle) * 0.5;
                rightArm.rotation.x = Math.sin(walkCycle + Math.PI) * 0.5;
                leftLeg.rotation.x = Math.sin(walkCycle + Math.PI) * 0.4;
                rightLeg.rotation.x = Math.sin(walkCycle) * 0.4;
                playerGroup.position.y = Math.sin(walkCycle * 2) * 0.05;
            } else {
                leftArm.rotation.x = 0;
                rightArm.rotation.x = 0;
                leftLeg.rotation.x = 0;
                rightLeg.rotation.x = 0;
                playerGroup.position.y = 0;
            }
            
            antennaTop.material.emissiveIntensity = 0.3 + Math.sin(Date.now() * 0.005) * 0.2;
        }
        
        function updatePlayer() {
            if (keys.w) { playerGroup.translateZ(-speed); playerGroup.rotation.y = Math.PI; }
            if (keys.s) { playerGroup.translateZ(speed); playerGroup.rotation.y = 0; }
            if (keys.a) { playerGroup.translateX(-speed); playerGroup.rotation.y = -Math.PI / 2; }
            if (keys.d) { playerGroup.translateX(speed); playerGroup.rotation.y = Math.PI / 2; }
            
            playerGroup.position.y += velocityY;
            velocityY += gravity;
            
            if (playerGroup.position.y <= 0) {
                playerGroup.position.y = 0;
                velocityY = 0;
                isJumping = false;
            }
            
            const limitX = roomWidth / 2 - 1;
            const limitZ = roomDepth / 2 - 1;
            playerGroup.position.x = Math.max(-limitX, Math.min(limitX, playerGroup.position.x));
            playerGroup.position.z = Math.max(-limitZ, Math.min(limitZ, playerGroup.position.z));
            
            animatePlayer();
        }
        
        function updateCamera() {
            const cameraOffset = new THREE.Vector3(0, 8, 12);
            const targetPosition = playerGroup.position.clone().add(cameraOffset);
            camera.position.lerp(targetPosition, 0.1);
            camera.lookAt(playerGroup.position);
        }
        
        function checkWin() {
            const distanceToExit = playerGroup.position.distanceTo(new THREE.Vector3(0, 0, 12));
            if (distanceToExit < 2) {
                document.getElementById('winMessage').style.display = 'block';
                return true;
            }
            return false;
        }
        
        function resetGame() {
            playerGroup.position.set(0, 0, -10);
            velocityY = 0;
            isJumping = false;
            document.getElementById('winMessage').style.display = 'none';
        }
        
        function animate() {
            requestAnimationFrame(animate);
            if (!checkWin()) {
                updatePlayer();
                updateCamera();
            }
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        animate();
    </script>
</body>
</html>
