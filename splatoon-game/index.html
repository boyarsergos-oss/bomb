<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splatoon-style Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #000;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* UI Elements as part of the game scene */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #team-selection {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            pointer-events: auto;
            z-index: 100;
        }
        
        #team-selection h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 32px;
        }
        
        .team-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .team-btn {
            padding: 20px 40px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .team-btn:hover {
            transform: scale(1.1);
        }
        
        .team-red { background: linear-gradient(135deg, #ff4444, #cc0000); }
        .team-blue { background: linear-gradient(135deg, #4444ff, #0000cc); }
        .team-green { background: linear-gradient(135deg, #44ff44, #00cc00); }
        .team-yellow { background: linear-gradient(135deg, #ffff44, #cccc00); }
        
        #hud {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        #paint-indicator {
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        #paint-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6600, #ffcc00);
            width: 100%;
            transition: width 0.1s;
        }
        
        #score-display {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }
        
        #timer {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 30px;
            border-radius: 10px;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        
        #refuel-indicator {
            display: none;
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            pointer-events: auto;
            z-index: 100;
        }
        
        #game-over h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 36px;
        }
        
        #winner-text {
            color: #ffff00;
            font-size: 24px;
            margin-bottom: 30px;
        }
        
        #restart-btn {
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #44ff44, #00cc00);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        
        #restart-btn:hover {
            transform: scale(1.1);
        }
        
        #controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 12px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <div id="ui-layer">
            <!-- Team Selection Screen -->
            <div id="team-selection">
                <h1>Выберите команду</h1>
                <div class="team-buttons">
                    <button class="team-btn team-red" onclick="game.selectTeam('red')">🔴 Красные</button>
                    <button class="team-btn team-blue" onclick="game.selectTeam('blue')">🔵 Синие</button>
                    <button class="team-btn team-green" onclick="game.selectTeam('green')">🟢 Зелёные</button>
                    <button class="team-btn team-yellow" onclick="game.selectTeam('yellow')">🟡 Жёлтые</button>
                </div>
            </div>
            
            <!-- HUD -->
            <div id="hud">
                <div>Краска:</div>
                <div id="paint-indicator">
                    <div id="paint-fill"></div>
                </div>
            </div>
            
            <div id="score-display">
                <div>🔴 Красные: <span id="score-red">0</span>%</div>
                <div>🔵 Синие: <span id="score-blue">0</span>%</div>
                <div>🟢 Зелёные: <span id="score-green">0</span>%</div>
                <div>🟡 Жёлтые: <span id="score-yellow">0</span>%</div>
            </div>
            
            <div id="timer">05:00</div>
            
            <div id="refuel-indicator">⛽ Заправка...</div>
            
            <div id="controls-hint">
                WASD - Движение<br>
                Мышь - Прицеливание<br>
                ЛКМ - Стрельба<br>
                E - Заправка
            </div>
            
            <!-- Game Over Screen -->
            <div id="game-over">
                <h1>Матч окончен!</h1>
                <div id="winner-text"></div>
                <button id="restart-btn" onclick="location.reload()">Играть снова</button>
            </div>
        </div>
    </div>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
    </script>
    
    <script src="src/config.js"></script>
    <script src="src/utils.js"></script>
    <script src="src/PaintSystem.js"></script>
    <script src="src/Player.js"></script>
    <script src="src/Arena.js"></script>
    <script src="src/Game.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
