<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PHYSICS PUZZLE MASTER 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 100;
            text-shadow: 0 0 10px rgba(0,255,255,0.8);
        }
        #level { font-size: 32px; font-weight: bold; color: #0ff; }
        #moves { font-size: 20px; margin-top: 10px; color: #ff0; }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #0f0;
            text-shadow: 0 0 20px #0f0;
            display: none;
            z-index: 100;
            text-align: center;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #aaa;
            font-size: 14px;
            z-index: 100;
        }
        #restart {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: linear-gradient(45deg, #f00, #f90);
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            z-index: 100;
            box-shadow: 0 0 15px rgba(255,100,0,0.5);
        }
        #restart:hover { transform: scale(1.1); }
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: explode 1s ease-out forwards;
        }
        @keyframes explode {
            to { transform: translate(var(--tx), var(--ty)); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="level">УРОВЕНЬ 1</div>
        <div id="moves">Ходы: 0</div>
    </div>
    <button id="restart">🔄 ЗАНОВО</button>
    <div id="message">🎉 УРОВЕНЬ ПРОЙДЕН! 🎉</div>
    <div id="controls">ЛКМ - толчок | ПКМ - камера | Колесо - зум</div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.19.0/dist/cannon-es.min.js"></script>
    
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World();
        world.gravity.set(0, -20, 0);
        world.broadphase = new CANNON.SAPBroadphase(world);
        
        const groundMat = new CANNON.Material();
        const ballMat = new CANNON.Material();
        const wallMat = new CANNON.Material();
        
        const ballGroundContact = new CANNON.ContactMaterial(groundMat, ballMat, { friction: 0.3, restitution: 0.6 });
        const ballWallContact = new CANNON.ContactMaterial(wallMat, ballMat, { friction: 0.2, restitution: 0.7 });
        world.addContactMaterial(ballGroundContact);
        world.addContactMaterial(ballWallContact);

        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(20, 30, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.left = -30;
        dirLight.shadow.camera.right = 30;
        dirLight.shadow.camera.top = 30;
        dirLight.shadow.camera.bottom = -30;
        scene.add(dirLight);

        let ball, ballBody, goalZone, goalBody;
        let obstacles = [];
        let currentLevel = 1;
        let moves = 0;
        let isComplete = false;

        const levels = [
            { setup: () => { createGround(20, 20); createBall(0, 3, 0); createGoal(0, 0.5, -8); createWalls([[-9, 1, 0, 1, 2, 18], [9, 1, 0, 1, 2, 18]]); } },
            { setup: () => { createGround(25, 25); createBall(-8, 3, 8); createGoal(8, 0.5, -8); createWalls([[-3, 1, 5, 1, 2, 12], [3, 1, 5, 1, 2, 12], [-6, 1, -2, 6, 2, 1], [6, 1, -2, 6, 2, 1], [0, 1, 3, 1, 2, 6]]); } },
            { setup: () => { createGround(30, 30); createBall(0, 5, 10); createGoal(0, 0.5, -10); for(let i=0;i<5;i++) createBox(0, 1+i*0.5, 5-i*2.5, 6, 1, 3); createWalls([[-14, 1, 0, 1, 2, 28], [14, 1, 0, 1, 2, 28]]); } },
            { setup: () => { createGround(20, 30); createBall(0, 3, 12); createGoal(0, 0.5, -12); for(let i=0;i<8;i++) createRing(0, 3, 10-i*3, 4, 0.3); createWalls([[-9, 1, 0, 1, 2, 28], [9, 1, 0, 1, 2, 28]]); } },
            { setup: () => { createGround(25, 25); createBall(0, 15, 0); createGoal(8, 0.5, 0); for(let i=0;i<5;i++) createBox(0, 2+i*2, 0, 8-i, 1, 8-i); createWalls([[-11, 1, 0, 1, 2, 25], [11, 1, 0, 1, 2, 25]]); } },
            { setup: () => { createGround(30, 30); createBall(-10, 3, 10); createGoal(10, 0.5, -10); createWalls([[-5, 1, 5, 1, 2, 20], [5, 1, -5, 1, 2, 20], [0, 1, 8, 10, 2, 1], [0, 1, -8, 10, 2, 1]]); } },
            { setup: () => { createGround(25, 30); createBall(0, 3, 12); createGoal(0, 0.5, -12); [[-4, 6], [4, 3], [-3, -3], [5, -8], [0, -10]].forEach(([x,z]) => createBox(x, 1.5, z, 3, 3, 3)); createWalls([[-11, 1, 0, 1, 2, 30], [11, 1, 0, 1, 2, 30]]); } },
            { setup: () => { createGround(20, 35); createBall(0, 3, 15); createGoal(0, 0.5, -15); createWalls([[-9, 1, 0, 1, 2, 35], [9, 1, 0, 1, 2, 35], [-2, 1, 5, 1, 2, 10], [2, 1, -5, 1, 2, 10], [-3, 1, -2, 1, 2, 8], [3, 1, 2, 1, 2, 8]]); } },
            { setup: () => { createGround(30, 30); createBall(10, 3, 10); createGoal(0, 0.5, 0); for(let i=0;i<12;i++) { const a=i*0.5, r=12-i; createBox(Math.cos(a)*r, 1.5, Math.sin(a)*r, 3, 3, 0.5); } createWalls([[-14, 1, 0, 1, 2, 30], [14, 1, 0, 1, 2, 30]]); } },
            { setup: () => { createGround(35, 40); createBall(-12, 5, 15); createGoal(12, 0.5, -15); createWalls([[-16, 1, 0, 1, 2, 40], [16, 1, 0, 1, 2, 40], [-5, 1, 8, 1, 2, 10], [5, 1, -8, 1, 2, 10], [0, 1, 0, 8, 2, 1]]); for(let i=0;i<3;i++) createBox(-8+i*4, 1.5, 0, 2, 3, 2); for(let i=0;i<4;i++) createRing(8, 3, 10-i*3, 3, 0.3); } }
        ];

        function createGround(width, depth) {
            const geometry = new THREE.PlaneGeometry(width, depth);
            const material = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.8, metalness: 0.2 });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.x = -Math.PI / 2;
            mesh.receiveShadow = true;
            scene.add(mesh);
            const grid = new THREE.GridHelper(new THREE.PlaneGeometry(width, depth), 20, 0x00ffff, 0x004444);
            grid.position.y = 0.01;
            scene.add(grid);
            const shape = new CANNON.Box(new CANNON.Vec3(width/2, 0.1, depth/2));
            const body = new CANNON.Body({ mass: 0, material: groundMat });
            body.addShape(shape);
            body.position.set(0, -0.1, 0);
            world.addBody(body);
        }

        function createBall(x, y, z) {
            if(ball) { scene.remove(ball); world.removeBody(ballBody); }
            const geometry = new THREE.SphereGeometry(1, 32, 32);
            const material = new THREE.MeshStandardMaterial({ color: 0x00ff88, roughness: 0.3, metalness: 0.7, emissive: 0x00ff88, emissiveIntensity: 0.3 });
            ball = new THREE.Mesh(geometry, material);
            ball.castShadow = true;
            scene.add(ball);
            const shape = new CANNON.Sphere(1);
            ballBody = new CANNON.Body({ mass: 5, material: ballMat });
            ballBody.addShape(shape);
            ballBody.position.set(x, y, z);
            ballBody.linearDamping = 0.3;
            ballBody.angularDamping = 0.3;
            world.addBody(ballBody);
        }

        function createGoal(x, y, z) {
            if(goalZone) { scene.remove(goalZone); world.removeBody(goalBody); }
            const geometry = new THREE.CylinderGeometry(2, 2, 0.2, 32);
            const material = new THREE.MeshStandardMaterial({ color: 0xff0044, emissive: 0xff0044, emissiveIntensity: 0.8, transparent: true, opacity: 0.7 });
            goalZone = new THREE.Mesh(geometry, material);
            goalZone.position.set(x, y, z);
            goalZone.receiveShadow = true;
            scene.add(goalZone);
            const light = new THREE.PointLight(0xff0044, 2, 10);
            light.position.set(x, y+2, z);
            scene.add(light);
            const shape = new CANNON.Cylinder(2, 2, 0.2, 16);
            const q = new CANNON.Quaternion();
            q.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
            goalBody = new CANNON.Body({ mass: 0 });
            goalBody.addShape(shape, new CANNON.Vec3(0,0,0), q);
            goalBody.position.set(x, y, z);
            world.addBody(goalBody);
        }

        function createBox(x, y, z, w, h, d) {
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = new THREE.MeshStandardMaterial({ color: 0x4444ff, roughness: 0.5, metalness: 0.5, emissive: 0x2222aa, emissiveIntensity: 0.3 });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            obstacles.push({ mesh, type: 'static' });
            const shape = new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2));
            const body = new CANNON.Body({ mass: 0, material: wallMat });
            body.addShape(shape);
            body.position.set(x, y, z);
            world.addBody(body);
            obstacles.push({ body, type: 'physics' });
        }

        function createWalls(wallData) { wallData.forEach(([x, y, z, w, h, d]) => createBox(x, y, z, w, h, d)); }

        function createRing(x, y, z, radius, thickness) {
            const geometry = new THREE.TorusGeometry(radius, thickness, 16, 32);
            const material = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 0.5, metalness: 0.8 });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            scene.add(mesh);
            obstacles.push({ mesh, type: 'static' });
        }

        function loadLevel(levelNum) {
            obstacles.forEach(obj => { if(obj.mesh) scene.remove(obj.mesh); if(obj.body) world.removeBody(obj.body); });
            obstacles = [];
            if(goalZone) scene.remove(goalZone);
            if(ball) scene.remove(ball);
            if(ballBody) world.removeBody(ballBody);
            isComplete = false;
            document.getElementById('message').style.display = 'none';
            document.getElementById('level').textContent = `УРОВЕНЬ ${levelNum}`;
            moves = 0;
            updateMoves();
            levels[levelNum - 1].setup();
            camera.position.set(0, 20, 25);
            camera.lookAt(0, 0, 0);
        }

        function updateMoves() { document.getElementById('moves').textContent = `Ходы: ${moves}`; }

        function createParticles(color) {
            for(let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.background = color;
                particle.style.width = '10px';
                particle.style.height = '10px';
                particle.style.left = (window.innerWidth/2 + (Math.random()-0.5)*200) + 'px';
                particle.style.top = (window.innerHeight/2 + (Math.random()-0.5)*200) + 'px';
                particle.style.setProperty('--tx', (Math.random()-0.5)*300 + 'px');
                particle.style.setProperty('--ty', (Math.random()-0.5)*300 + 'px');
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        function checkWin() {
            if(isComplete) return;
            const dx = ballBody.position.x - goalBody.position.x;
            const dz = ballBody.position.z - goalBody.position.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            if(dist < 1.5 && ballBody.position.y < 2) {
                isComplete = true;
                createParticles('#00ff88');
                document.getElementById('message').textContent = '🎉 УРОВЕНЬ ПРОЙДЕН! 🎉';
                document.getElementById('message').style.display = 'block';
                setTimeout(() => {
                    if(currentLevel < 10) { currentLevel++; loadLevel(currentLevel); }
                    else { document.getElementById('message').textContent = '🏆 ВСЕ УРОВНИ ПРОЙДЕНЫ! 🏆'; document.getElementById('message').style.color = '#ffd700'; }
                }, 2000);
            }
        }

        function checkFall() { if(ballBody.position.y < -5) loadLevel(currentLevel); }

        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let cameraAngle = { x: 0, y: Math.PI/4 };
        let cameraDistance = 25;

        renderer.domElement.addEventListener('mousedown', (e) => { if(e.button === 0) isDragging = true; previousMousePosition = { x: e.clientX, y: e.clientY }; });
        renderer.domElement.addEventListener('mouseup', (e) => {
            if(e.button === 0 && isDragging && !isComplete) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;
                if(Math.abs(deltaX) > 10 || Math.abs(deltaY) > 10) {
                    const force = 15;
                    const direction = new CANNON.Vec3(-deltaX * 0.1, -deltaY * 0.05, -Math.sign(deltaX) * Math.abs(deltaX) * 0.1);
                    direction.scale(force, direction);
                    ballBody.applyImpulse(direction, ballBody.position);
                    moves++;
                    updateMoves();
                }
            }
            isDragging = false;
        });
        renderer.domElement.addEventListener('mousemove', (e) => {
            if(e.buttons === 2) {
                cameraAngle.x -= (e.clientX - previousMousePosition.x) * 0.01;
                cameraAngle.y = Math.max(0.1, Math.min(Math.PI/2 - 0.1, cameraAngle.y + (e.clientY - previousMousePosition.y) * 0.01));
                updateCamera();
            }
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });
        renderer.domElement.addEventListener('wheel', (e) => { cameraDistance = Math.max(10, Math.min(50, cameraDistance + e.deltaY * 0.05)); updateCamera(); });
        renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

        function updateCamera() {
            camera.position.x = Math.sin(cameraAngle.x) * Math.cos(cameraAngle.y) * cameraDistance;
            camera.position.z = Math.cos(cameraAngle.x) * Math.cos(cameraAngle.y) * cameraDistance;
            camera.position.y = Math.sin(cameraAngle.y) * cameraDistance + 5;
            camera.lookAt(0, 2, 0);
        }

        document.getElementById('restart').addEventListener('click', () => loadLevel(currentLevel));
        updateCamera();
        loadLevel(1);

        const timeStep = 1 / 60;
        function animate() {
            requestAnimationFrame(animate);
            world.step(timeStep);
            if(ball && ballBody) { ball.position.copy(ballBody.position); ball.quaternion.copy(ballBody.quaternion); }
            checkWin();
            checkFall();
            if(goalZone) goalZone.rotation.y += 0.02;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
