<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C4 Bomb - CS2 Style</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-family: Arial, sans-serif;
            font-size: 14px;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <div id="info">C4 BOMB (CS2 STYLE)<br>ЛКМ - Вращение | Колесо - Масштаб</div>
    <!-- Подключаем Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Подключаем OrbitControls для управления камерой -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // 1. Инициализация сцены
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        
        // 2. Камера
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 35);

        // 3. Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 4. Контролы (вращение)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 5. Освещение
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const backLight = new THREE.DirectionalLight(0xffaa00, 0.3);
        backLight.position.set(-10, 10, -10);
        scene.add(backLight);

        // 6. Создание модели бомбы (C4 Style)
        const bombGroup = new THREE.Group();

        // Материалы
        const caseMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xd4a35a, // Песочный/желтый цвет кейса
            roughness: 0.4,
            metalness: 0.1
        });
        
        const detailMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a1a, // Черные детали
            roughness: 0.7,
            metalness: 0.2
        });

        const ledMaterial = new THREE.MeshBasicMaterial({
            color: 0xff0000,
            transparent: true,
            opacity: 0.9
        });

        // Основной корпус (прямоугольник)
        const mainGeo = new THREE.BoxGeometry(10, 6, 3);
        const mainMesh = new THREE.Mesh(mainGeo, caseMaterial);
        mainMesh.castShadow = true;
        bombGroup.add(mainMesh);

        // Верхняя панель (черная)
        const panelGeo = new THREE.BoxGeometry(9, 5, 0.2);
        const panelMesh = new THREE.Mesh(panelGeo, detailMaterial);
        panelMesh.position.y = 3.05;
        panelMesh.castShadow = true;
        bombGroup.add(panelMesh);

        // Дисплей (LED экран)
        const screenGeo = new THREE.PlaneGeometry(4, 1.5);
        const screenMesh = new THREE.Mesh(screenGeo, ledMaterial);
        screenMesh.position.set(0, 3.1, 1.51);
        bombGroup.add(screenMesh);

        // Рамка дисплея
        const frameGeo = new THREE.BoxGeometry(4.4, 1.9, 0.1);
        const frameMesh = new THREE.Mesh(frameGeo, detailMaterial);
        frameMesh.position.set(0, 3.1, 1.55);
        bombGroup.add(frameMesh);

        // Кнопки под дисплеем (ряд кнопок)
        const buttonGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 16);
        buttonGeo.rotateX(Math.PI / 2);
        
        for(let i = -1.5; i <= 1.5; i += 0.75) {
            const btn = new THREE.Mesh(buttonGeo, detailMaterial);
            btn.position.set(i, 2.2, 1.55);
            bombGroup.add(btn);
        }

        // Антенна
        const antennaBaseGeo = new THREE.CylinderGeometry(0.4, 0.6, 0.5, 8);
        const antennaBase = new THREE.Mesh(antennaBaseGeo, detailMaterial);
        antennaBase.position.set(3.5, 3.25, 0);
        bombGroup.add(antennaBase);

        const antennaRodGeo = new THREE.CylinderGeometry(0.1, 0.1, 4, 8);
        const antennaRod = new THREE.Mesh(antennaRodGeo, detailMaterial);
        antennaRod.position.set(3.5, 5.5, 0);
        antennaRod.rotation.z = -0.2;
        bombGroup.add(antennaRod);

        // Провода (упрощенно через тонкие цилиндры)
        const wireGeo = new THREE.CylinderGeometry(0.15, 0.15, 2, 8);
        wireGeo.rotateZ(Math.PI / 2);
        
        const wire1 = new THREE.Mesh(wireGeo, new THREE.MeshStandardMaterial({color: 0xff0000}));
        wire1.position.set(-2, 0, 1.6);
        wire1.rotation.y = 0.5;
        bombGroup.add(wire1);

        const wire2 = new THREE.Mesh(wireGeo, new THREE.MeshStandardMaterial({color: 0x00ff00}));
        wire2.position.set(-1, -0.5, 1.6);
        wire2.rotation.y = -0.5;
        bombGroup.add(wire2);
        
        const wire3 = new THREE.Mesh(wireGeo, new THREE.MeshStandardMaterial({color: 0x0000ff}));
        wire3.position.set(0, 0, 1.6);
        bombGroup.add(wire3);

        // Надпись "C4" (имитация)
        const labelGeo = new THREE.BoxGeometry(2, 0.5, 0.1);
        const labelMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const label = new THREE.Mesh(labelGeo, labelMat);
        label.position.set(0, -2, 1.51);
        bombGroup.add(label);

        scene.add(bombGroup);

        // 7. Анимация
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.05;
            
            // Мигание дисплея
            const intensity = (Math.sin(time * 10) + 1) / 2;
            ledMaterial.color.setHex(intensity > 0.5 ? 0xff0000 : 0x550000);
            
            controls.update();
            renderer.render(scene, camera);
        }

        // Обработка изменения размера окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
