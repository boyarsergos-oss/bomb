<!DOCTYPE html>
<html>
<head>
    <title>Желтый шар с крыльями</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Сцена, камера, рендерер
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Небо

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Свет
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        // 1. Желтый шар (Тело)
        const bodyGeometry = new THREE.SphereGeometry(1.5, 32, 32);
        const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0xFFFF00, roughness: 0.4 });
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        scene.add(body);

        // 2. Крылья (Используем форму для создания объемного крыла)
        const createWingShape = () => {
            const shape = new THREE.Shape();
            shape.moveTo(0, 0);
            shape.bezierCurveTo(0.5, -0.5, 1.5, -0.8, 2.5, -0.2); // Нижний край
            shape.bezierCurveTo(1.8, 0.5, 1.0, 0.8, 0.5, 0.4);   // Верхний край
            shape.bezierCurveTo(0.2, 0.2, 0, 0.1, 0, 0);         // Возврат к началу
            return shape;
        };

        const extrudeSettings = {
            steps: 2,
            depth: 0.4,      // Толщина крыла
            bevelEnabled: true,
            bevelThickness: 0.1,
            bevelSize: 0.1,
            bevelSegments: 3
        };

        const wingGeometry = new THREE.ExtrudeGeometry(createWingShape(), extrudeSettings);
        const wingMaterial = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.5 });

        // Левое крыло
        const leftWing = new THREE.Mesh(wingGeometry, wingMaterial);
        leftWing.position.set(-1.4, 0, 0);
        leftWing.rotation.y = Math.PI / 2; // Поворот чтобы торчало вбок
        leftWing.rotation.z = Math.PI / 6; // Немного вверх
        scene.add(leftWing);

        // Правое крыло (зеркальное)
        const rightWing = new THREE.Mesh(wingGeometry, wingMaterial);
        rightWing.position.set(1.4, 0, 0);
        rightWing.rotation.y = -Math.PI / 2;
        rightWing.rotation.z = Math.PI / 6;
        rightWing.scale.x = -1; // Отражаем по оси X
        scene.add(rightWing);

        // Анимация (только рендер, без вращения объектов)
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Ресайз окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
