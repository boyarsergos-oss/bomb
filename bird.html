<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Круглая птичка • Flappy стиль</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
    }
    #info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 14px;
      letter-spacing: 1px;
      pointer-events: none;
      backdrop-filter: blur(5px);
      z-index: 200;
    }
    #hint {
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      backdrop-filter: blur(4px);
      z-index: 200;
    }
    #death-hint {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      backdrop-filter: blur(4px);
      display: none;
      z-index: 200;
    }
    #view-selector {
      background: rgba(0,0,0,0.85);
      padding: 30px 40px;
      border-radius: 20px;
      text-align: center;
      color: white;
      backdrop-filter: blur(8px);
    }
    #view-selector h2 {
      margin: 0 0 20px 0;
      font-size: 24px;
      letter-spacing: 1px;
    }
    .view-btn {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .view-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
    }
    .view-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div id="info" style="display: none;">🐥 КРУГЛАЯ ПТИЧКА • вид сзади</div>
  <div id="hint" style="display: none;">␣ ПРОБЕЛ: рывок вверх (Flappy Bird) | V: сменить вид</div>
  <div id="death-hint">🖱️ Крути мышкой для осмотра</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { CSS2DRenderer } from 'three/addons/renderers/CSS2DRenderer.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ==================== НАСТРОЙКИ СЦЕНЫ ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xa0d8ef);
    scene.fog = new THREE.Fog(0xa0d8ef, 15, 60);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.5, 200);
    
    // Настройки видов камеры
    const viewModes = {
      rear: { name: 'rear', offsetX: 0, offsetY: 2.8, offsetZ: -6.5 },      // вид сзади (текущий)
      side: { name: 'side', offsetX: -25, offsetY: 2.8, offsetZ: 0 },         // вид сбоку (ещё более отдалённый)
      firstPerson: { name: 'firstPerson', offsetX: 0, offsetY: 0.5, offsetZ: 1.05 } // вид от первого лица (на уровне клюва)
    };
    let currentViewMode = 'rear';
    
    camera.position.set(0, 4.3, -6.5);
    camera.lookAt(0, 1.5, 0);
    
    // Контролы для вращения камеры (включаются только при смерти)
    let controls = null;

    const renderer = new THREE.WebGLRenderer({ 
      antialias: true,
      powerPreference: "high-performance"
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'auto';
    labelRenderer.domElement.style.zIndex = '150';
    document.body.appendChild(labelRenderer.domElement);

    // ==================== МЕНЮ ВЫБОРА КАМЕРЫ (3D ОБЪЕКТ) ====================
    // Создаём панель для меню выбора камеры как 3D объект
    const viewSelectorDiv = document.createElement('div');
    viewSelectorDiv.id = 'view-selector';
    viewSelectorDiv.innerHTML = `
      <h2>🎮 Выберите вид камеры</h2>
      <button class="view-btn" data-view="rear">📷 Вид сзади</button>
      <button class="view-btn" data-view="side">📷 Вид сбоку</button>
      <button class="view-btn" data-view="firstPerson">👁️ Вид от первого лица</button>
    `;
    
    // Позиционируем div в центре экрана через CSS
    viewSelectorDiv.style.position = 'absolute';
    viewSelectorDiv.style.top = '50%';
    viewSelectorDiv.style.left = '50%';
    viewSelectorDiv.style.transform = 'translate(-50%, -50%)';
    viewSelectorDiv.style.zIndex = '200';
    
    // Создаём CSS2DObject для меню
    const viewSelectorLabel = new THREE.CSS2DObject(viewSelectorDiv);
    // Позиционируем меню перед камерой в начальной позиции
    viewSelectorLabel.position.set(0, 1.5, -4);
    scene.add(viewSelectorLabel);
    
    // Включаем pointer events для кнопок меню
    viewSelectorDiv.style.pointerEvents = 'auto';

    // ==================== ОСВЕЩЕНИЕ ====================
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    
    const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
    sunLight.position.set(10, 20, 5);
    sunLight.castShadow = true;
    sunLight.receiveShadow = true;
    sunLight.shadow.mapSize.width = 1024;
    sunLight.shadow.mapSize.height = 1024;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 80;
    sunLight.shadow.camera.left = -20;
    sunLight.shadow.camera.right = 20;
    sunLight.shadow.camera.top = 20;
    sunLight.shadow.camera.bottom = -20;
    sunLight.shadow.bias = -0.0005;
    scene.add(sunLight);
    
    const fillLight = new THREE.DirectionalLight(0xccddff, 0.6);
    fillLight.position.set(-5, 0, -5);
    scene.add(fillLight);

    // ==================== ЗЕМЛЯ ====================
    // Создаём несколько сегментов земли для бесконечного эффекта
    const groundSegments = [];
    const groundSegmentLength = 100;
    const numGroundSegments = 5; // Количество сегментов
    
    for (let i = 0; i < numGroundSegments; i++) {
      const groundGeometry = new THREE.PlaneGeometry(groundSegmentLength, 200);
      const groundMaterial = new THREE.MeshStandardMaterial({ 
        color: 0x7cb342, 
        roughness: 0.9,
        side: THREE.DoubleSide
      });
      const ground = new THREE.Mesh(groundGeometry, groundMaterial);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -4.0;
      ground.position.z = 50 + i * groundSegmentLength;
      ground.receiveShadow = true;
      scene.add(ground);
      groundSegments.push(ground);
    }
    
    // Массивы для объектов мира, чтобы двигать их
    const grassBlades = [];
    const clouds = [];
    const obstacles = []; // Массив препятствий (труб)
    
    // Уровень земли и радиус птички (должны быть объявлены до createObstacle)
    const groundLevel = -4.0;
    const birdRadius = 0.9;
    
    // Параметры для спавна препятствий
    const obstacleSpawnInterval = 25; // Расстояние между препятствиями
    const obstacleGapHeight = 6.0; // Высота проёма между трубами (увеличено)
    const obstacleWidth = 2.5; // Ширина трубы
    const obstacleDepth = 2.0; // Глубина трубы
    
    // Диапазон высот для центра прохода (от пола до потолка)
    // Пол на y = -4.0, потолок камеры ~20.0, птичка радиусом 0.9
    // Центр прохода должен быть в диапазоне, чтобы проход был доступен
    const gapCenterMinY = groundLevel + obstacleGapHeight / 2 + 0.5; // Минимальная позиция центра прохода
    const gapCenterMaxY = 20.0 - obstacleGapHeight / 2 - 0.5; // Максимальная позиция центра прохода
    
    for (let i = 0; i < 60; i++) {
      const blade = new THREE.Mesh(
        new THREE.ConeGeometry(0.08, 0.3, 4),
        new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.7 })
      );
      blade.position.x = (Math.random() - 0.5) * 25;
      blade.position.z = (Math.random() - 0.5) * 25;
      blade.position.y = -2.65;
      blade.castShadow = true;
      blade.receiveShadow = true;
      grassBlades.push(blade);
      scene.add(blade);
    }

    // Функция создания пары труб (препятствия)
    function createObstacle(zPosition) {
      const obstacleGroup = new THREE.Group();
      
      // Случайная позиция центра прохода по вертикали
      const gapCenterY = gapCenterMinY + Math.random() * (gapCenterMaxY - gapCenterMinY);
      
      // Вычисляем позиции верхней и нижней трубы на основе центра прохода
      const lowerPipeTopY = gapCenterY - obstacleGapHeight / 2;
      const upperPipeBottomY = gapCenterY + obstacleGapHeight / 2;
      
      const pipeMaterial = new THREE.MeshStandardMaterial({ 
        color: 0x2e7d32, 
        roughness: 0.5,
        metalness: 0.2
      });
      
      // Нижняя труба (от земли до низа прохода)
      const lowerPipeHeight = lowerPipeTopY - groundLevel;
      const lowerPipeGeometry = new THREE.BoxGeometry(obstacleWidth, lowerPipeHeight, obstacleDepth);
      const lowerPipe = new THREE.Mesh(lowerPipeGeometry, pipeMaterial);
      lowerPipe.position.y = groundLevel + lowerPipeHeight / 2;
      lowerPipe.castShadow = true;
      lowerPipe.receiveShadow = true;
      
      // Хитбокс нижней трубы (зелёная прозрачная коробка для отладки)
      const lowerPipeHitboxGeometry = new THREE.BoxGeometry(obstacleWidth, lowerPipeHeight, obstacleDepth);
      const lowerPipeHitboxMaterial = new THREE.MeshBasicMaterial({ 
        color: 0x00ff00, 
        transparent: true, 
        opacity: 0.3,
        wireframe: true
      });
      const lowerPipeHitbox = new THREE.Mesh(lowerPipeHitboxGeometry, lowerPipeHitboxMaterial);
      lowerPipeHitbox.position.copy(lowerPipe.position);
      obstacleGroup.add(lowerPipeHitbox);
      
      obstacleGroup.add(lowerPipe);
      
      // Верхняя труба (от верха прохода до "бесконечности" - значительно выше видимой области)
      const upperPipeHeight = 100.0; // Делаем трубу очень высокой для эффекта бесконечности
      const upperPipeGeometry = new THREE.BoxGeometry(obstacleWidth, upperPipeHeight, obstacleDepth);
      const upperPipe = new THREE.Mesh(upperPipeGeometry, pipeMaterial);
      upperPipe.position.y = upperPipeBottomY + upperPipeHeight / 2; // Поднимаем центр трубы высоко вверх
      upperPipe.castShadow = true;
      upperPipe.receiveShadow = true;
      
      // Хитбокс верхней трубы (зелёная прозрачная коробка для отладки)
      const upperPipeHitboxGeometry = new THREE.BoxGeometry(obstacleWidth, upperPipeHeight, obstacleDepth);
      const upperPipeHitboxMaterial = new THREE.MeshBasicMaterial({ 
        color: 0x00ff00, 
        transparent: true, 
        opacity: 0.3,
        wireframe: true
      });
      const upperPipeHitbox = new THREE.Mesh(upperPipeHitboxGeometry, upperPipeHitboxMaterial);
      upperPipeHitbox.position.copy(upperPipe.position);
      obstacleGroup.add(upperPipeHitbox);
      
      obstacleGroup.add(upperPipe);
      
      // Крышка на нижней трубе
      const lowerCapGeometry = new THREE.BoxGeometry(obstacleWidth + 0.3, 0.3, obstacleDepth + 0.3);
      const lowerCap = new THREE.Mesh(lowerCapGeometry, pipeMaterial);
      lowerCap.position.y = lowerPipeTopY + 0.15;
      lowerCap.castShadow = true;
      lowerCap.receiveShadow = true;
      
      // Хитбокс крышки нижней трубы
      const lowerCapHitboxGeometry = new THREE.BoxGeometry(obstacleWidth + 0.3, 0.3, obstacleDepth + 0.3);
      const lowerCapHitboxMaterial = new THREE.MeshBasicMaterial({ 
        color: 0x00ff00, 
        transparent: true, 
        opacity: 0.3,
        wireframe: true
      });
      const lowerCapHitbox = new THREE.Mesh(lowerCapHitboxGeometry, lowerCapHitboxMaterial);
      lowerCapHitbox.position.copy(lowerCap.position);
      obstacleGroup.add(lowerCapHitbox);
      
      obstacleGroup.add(lowerCap);
      
      // Крышка на верхней трубе
      const upperCapGeometry = new THREE.BoxGeometry(obstacleWidth + 0.3, 0.3, obstacleDepth + 0.3);
      const upperCap = new THREE.Mesh(upperCapGeometry, pipeMaterial);
      upperCap.position.y = upperPipeBottomY - 0.15;
      upperCap.castShadow = true;
      upperCap.receiveShadow = true;
      
      // Хитбокс крышки верхней трубы
      const upperCapHitboxGeometry = new THREE.BoxGeometry(obstacleWidth + 0.3, 0.3, obstacleDepth + 0.3);
      const upperCapHitboxMaterial = new THREE.MeshBasicMaterial({ 
        color: 0x00ff00, 
        transparent: true, 
        opacity: 0.3,
        wireframe: true
      });
      const upperCapHitbox = new THREE.Mesh(upperCapHitboxGeometry, upperCapHitboxMaterial);
      upperCapHitbox.position.copy(upperCap.position);
      obstacleGroup.add(upperCapHitbox);
      
      obstacleGroup.add(upperCap);
      
      // Визуализация безопасной зоны (проёма между трубами) - голубая прозрачная коробка
      const safeZoneHeight = obstacleGapHeight;
      const safeZoneGeometry = new THREE.BoxGeometry(obstacleWidth, safeZoneHeight, obstacleDepth);
      const safeZoneMaterial = new THREE.MeshBasicMaterial({ 
        color: 0x00ffff, 
        transparent: true, 
        opacity: 0.15,
        wireframe: true
      });
      const safeZone = new THREE.Mesh(safeZoneGeometry, safeZoneMaterial);
      safeZone.position.y = gapCenterY;
      obstacleGroup.add(safeZone);
      
      obstacleGroup.position.z = zPosition;
      return obstacleGroup;
    }
    
    // Создаём первое препятствие
    const firstObstacle = createObstacle(obstacleSpawnInterval);
    firstObstacle.passed = false;
    obstacles.push(firstObstacle);
    scene.add(firstObstacle);

    // ==================== СОЗДАНИЕ КРУГЛОЙ ПТИЧКИ ====================
    const birdGroup = new THREE.Group();
    birdGroup.position.set(0, 1.5, 0);
    
    // Тело
    const bodyGeometry = new THREE.SphereGeometry(0.9, 32, 32);
    const bodyMaterial = new THREE.MeshStandardMaterial({ 
      color: 0xffcc00, 
      roughness: 0.3,
      metalness: 0.1,
    });
    const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
    body.castShadow = true;
    body.receiveShadow = true;
    
    // Хитбокс птички (красная прозрачная сфера для отладки)
    // Используем полный радиус birdRadius для честной коллизии, соответствующей визуальному телу
    const collisionRadius = birdRadius;
    const birdHitboxGeometry = new THREE.SphereGeometry(collisionRadius, 16, 16);
    const birdHitboxMaterial = new THREE.MeshBasicMaterial({ 
      color: 0xff0000, 
      transparent: true, 
      opacity: 0.5,
      wireframe: true
    });
    const birdHitbox = new THREE.Mesh(birdHitboxGeometry, birdHitboxMaterial);
    birdHitbox.visible = true; // Включено по умолчанию
    
    birdGroup.add(body);
    birdGroup.add(birdHitbox);

    // Глаза
    function createEye(xOffset, yOffset, zOffset) {
      const eyeGroup = new THREE.Group();
      const whitePart = new THREE.Mesh(
        new THREE.SphereGeometry(0.22, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 })
      );
      whitePart.castShadow = true;
      whitePart.receiveShadow = true;
      eyeGroup.add(whitePart);
      
      const pupil = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 })
      );
      pupil.position.set(0, 0, 0.18);
      pupil.castShadow = true;
      pupil.receiveShadow = true;
      eyeGroup.add(pupil);
      
      const highlight = new THREE.Mesh(
        new THREE.SphereGeometry(0.05, 4, 4),
        new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1, emissive: new THREE.Color(0xffffff) })
      );
      highlight.position.set(0.06, 0.07, 0.2);
      eyeGroup.add(highlight);
      
      eyeGroup.position.set(xOffset, yOffset, zOffset);
      return eyeGroup;
    }
    
    birdGroup.add(createEye(-0.35, 0.25, 0.75));
    birdGroup.add(createEye(0.35, 0.25, 0.75));

    // Щёчки
    function createCheek(xOffset, yOffset, zOffset) {
      const cheek = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0xff9999, roughness: 0.4 })
      );
      cheek.position.set(xOffset, yOffset, zOffset);
      cheek.castShadow = true;
      cheek.receiveShadow = true;
      return cheek;
    }
    birdGroup.add(createCheek(-0.45, -0.1, 0.8));
    birdGroup.add(createCheek(0.45, -0.1, 0.8));

    // Клюв
    const beakGeometry = new THREE.ConeGeometry(0.2, 0.6, 8);
    const beakMaterial = new THREE.MeshStandardMaterial({ color: 0xff6600, roughness: 0.4 });
    const beak = new THREE.Mesh(beakGeometry, beakMaterial);
    beak.position.set(0, 0.0, 1.05);
    beak.rotation.x = Math.PI / 2;
    beak.castShadow = true;
    beak.receiveShadow = true;
    birdGroup.add(beak);
    
    const lowerBeak = new THREE.Mesh(
      new THREE.ConeGeometry(0.15, 0.35, 6),
      new THREE.MeshStandardMaterial({ color: 0xff8800, roughness: 0.4 })
    );
    lowerBeak.position.set(0, -0.12, 1.0);
    lowerBeak.rotation.x = Math.PI / 2;
    lowerBeak.castShadow = true;
    lowerBeak.receiveShadow = true;
    birdGroup.add(lowerBeak);

    // --- КРЫЛЬЯ (только одна пара, большие) ---
    function createWing(side) {
      const wingGroup = new THREE.Group();
      const wingMaterial = new THREE.MeshStandardMaterial({ 
        color: 0xffaa00, 
        roughness: 0.3,
        metalness: 0.1
      });
      
      // Единственное длинное перо (основное)
      const primaryFeather = new THREE.Mesh(
        new THREE.SphereGeometry(0.35, 8, 8),
        wingMaterial
      );
      primaryFeather.scale.set(1.8, 0.25, 0.5);
      primaryFeather.position.set(side * 0.5, -0.05, 0.15);
      primaryFeather.rotation.z = side * 0.15;
      primaryFeather.castShadow = true;
      primaryFeather.receiveShadow = true;
      wingGroup.add(primaryFeather);
      
      // Положение всей группы прямо на теле
      wingGroup.position.set(side * 0.65, 0.3, -0.1);
      wingGroup.rotation.x = 0.35;
      wingGroup.rotation.z = side * 0.35;
      wingGroup.rotation.y = side * 0.25;
      
      return wingGroup;
    }
    
    const leftWing = createWing(-1);
    const rightWing = createWing(1);
    birdGroup.add(leftWing);
    birdGroup.add(rightWing);

    // --- ХВОСТ (веер) ---
    function createTail() {
      const tailGroup = new THREE.Group();
      const tailMaterial = new THREE.MeshStandardMaterial({ 
        color: 0xffaa00, 
        roughness: 0.4 
      });
      const darkMaterial = new THREE.MeshStandardMaterial({ 
        color: 0xff8800, 
        roughness: 0.4 
      });
      
      // Веер из 7 перьев
      const featherCount = 7;
      const spreadAngle = Math.PI / 2.5; // ~72 градуса размах веера

      for (let i = 0; i < featherCount; i++) {
        const angle = -spreadAngle / 2 + (i / (featherCount - 1)) * spreadAngle;
        const isCenter = i === Math.floor(featherCount / 2);
        const distFromCenter = Math.abs(i - (featherCount - 1) / 2);
        const length = isCenter ? 0.6 : 0.45 - distFromCenter * 0.05;
        const width = isCenter ? 0.13 : 0.10 - distFromCenter * 0.015;

        const feather = new THREE.Mesh(
          new THREE.ConeGeometry(width, length, 6),
          isCenter ? tailMaterial : darkMaterial
        );

        // Поворот для веера: раскрываем по Z и наклоняем назад по X
        feather.rotation.z = angle;
        feather.rotation.x = -Math.PI / 2 + 0.15;
        
        // Смещение по дуге
        feather.position.set(Math.sin(angle) * 0.18, 0, -0.25 - Math.cos(angle) * 0.08);
        
        feather.castShadow = true;
        feather.receiveShadow = true;
        tailGroup.add(feather);
      
      }
      return tailGroup;


    }
    
    const tailGroup = createTail();
    tailGroup.position.set(0, -0.15, -0.85);
    
    birdGroup.add(tailGroup);

    scene.add(birdGroup);

    // ==================== ОБЛАКА ====================
    function createCloud(x, y, z) {
      const cloudGroup = new THREE.Group();
      const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8, transparent: true, opacity: 0.85 });
      const positions = [
        [0, 0, 0], [0.6, 0.2, 0.1], [-0.5, 0.1, -0.1], [0.3, 0.4, 0.3], [-0.3, -0.2, 0.2], [0.1, -0.3, -0.2]
      ];
      positions.forEach(pos => {
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.4 + Math.random()*0.3, 7), whiteMat);
        sphere.position.set(pos[0], pos[1], pos[2]);
        cloudGroup.add(sphere);
      });
      cloudGroup.position.set(x, y, z);
      return cloudGroup;
    }
    
    for (let i = 0; i < 30; i++) {
      const cloud = createCloud(
        (Math.random() - 0.5) * 45,
        12 + Math.random() * 8, // Облака всегда выше 12 единиц (выше потолка камеры)
        (Math.random() - 0.5) * 80 - 20
      );
      clouds.push(cloud);
      scene.add(cloud);
    }

    // ==================== ФИЗИКА И ДВИЖЕНИЕ ====================
    const gravity = -18.0;
    const flapVelocity = 7.5;
    const maxFallSpeed = -20.0;
    // groundLevel и birdRadius уже объявлены выше (строки 130-131)
    const minY = groundLevel + birdRadius + 0.05;
    
    let birdVelocityY = 0.0;
    let forwardSpeed = 8.0; // Скорость полёта вперёд
    let distanceTraveled = 0; // Пройденное расстояние
    let isGameOver = false; // Флаг окончания игры
    let score = 0; // Счёт пролетевших труб
    let gameStarted = false; // Игра ещё не началась (ждём выбора вида)
    
    // Обработчик выбора вида камеры при старте
    const viewButtons = viewSelectorDiv.querySelectorAll('.view-btn');
    
    viewButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const selectedView = btn.getAttribute('data-view');
        currentViewMode = selectedView;
        
        // Обновляем текст в info
        const viewNames = {
          rear: 'вид сзади',
          side: 'вид сбоку',
          firstPerson: 'вид от первого лица'
        };
        document.getElementById('info').textContent = '🐥 КРУГЛАЯ ПТИЧКА • ' + viewNames[currentViewMode];
        
        // Сразу устанавливаем камеру в правильную позицию для выбранного вида
        const viewMode = viewModes[currentViewMode];
        camera.position.set(
          birdGroup.position.z * 0 + viewMode.offsetX,
          birdGroup.position.y + viewMode.offsetY,
          birdGroup.position.z + viewMode.offsetZ
        );
        if (currentViewMode === 'firstPerson') {
          camera.lookAt(birdGroup.position.x, birdGroup.position.y + 0.5, birdGroup.position.z + 5);
        } else {
          camera.lookAt(birdGroup.position.x, birdGroup.position.y + 0.6, birdGroup.position.z);
        }
        
        // Скрываем селектор и показываем интерфейс игры
        viewSelectorDiv.style.display = 'none';
        document.getElementById('info').style.display = 'block';
        document.getElementById('hint').style.display = 'block';
        
        gameStarted = true;
      });
    });
    
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (gameStarted && !isGameOver) {
          birdVelocityY = flapVelocity;
        }
      }
      // Переключение видов камеры на клавишу V
      if (e.code === 'KeyV' && gameStarted && !isGameOver) {
        e.preventDefault();
        const viewKeys = Object.keys(viewModes);
        const currentIndex = viewKeys.indexOf(currentViewMode);
        const nextIndex = (currentIndex + 1) % viewKeys.length;
        currentViewMode = viewKeys[nextIndex];
        
        // Обновляем текст в info
        const viewNames = {
          rear: 'вид сзади',
          side: 'вид сбоку',
          firstPerson: 'вид от первого лица'
        };
        document.getElementById('info').textContent = '🐥 КРУГЛАЯ ПТИЧКА • ' + viewNames[currentViewMode];
      }
    });

    // ==================== АНИМАЦИЯ ====================
    let wingAngle = 0;
    const wingFlapSpeed = 18; // Увеличено с 10 до 18 для более быстрого махания
    const clock = new THREE.Clock();
    
    const cameraLerpSpeed = 6.0;
    const rotationLerpSpeed = 8.0;

    function animate() {
      const delta = Math.min(clock.getDelta(), 0.1);
      
      if (gameStarted && !isGameOver) {
        // Движение птички вперёд (по положительной оси Z)
        distanceTraveled += forwardSpeed * delta;
        birdGroup.position.z = distanceTraveled;
        
        birdVelocityY += gravity * delta;
        if (birdVelocityY < maxFallSpeed) birdVelocityY = maxFallSpeed;
        
        birdGroup.position.y += birdVelocityY * delta;
        
        if (birdGroup.position.y <= minY) {
          birdGroup.position.y = minY;
          birdVelocityY = 0;
        }
        if (birdGroup.position.y > 20.0) {
          birdGroup.position.y = 20.0;
          birdVelocityY = 0;
        }
        
        // Проверка столкновений с трубами
        const birdPos = birdGroup.position.clone();
        
        for (const obstacle of obstacles) {
          // Проверяем только препятствия поблизости (с запасом)
          if (Math.abs(obstacle.position.z - birdPos.z) > 5) continue;
          
          // Получаем все меши препятствия
          obstacle.children.forEach(child => {
            if (child.isMesh && child.visible) {
              // Пропускаем отладочные хитбоксы (wireframe) и безопасную зону
              if (child.material.wireframe) return;
              
              // Получаем bounding box только для визуальных частей труб
              const obstacleBox = new THREE.Box3().setFromObject(child);
              
              // Находим ближайшую точку на коробке трубы к центру птички
              const closestPoint = new THREE.Vector3();
              closestPoint.x = Math.max(obstacleBox.min.x, Math.min(birdPos.x, obstacleBox.max.x));
              closestPoint.y = Math.max(obstacleBox.min.y, Math.min(birdPos.y, obstacleBox.max.y));
              closestPoint.z = Math.max(obstacleBox.min.z, Math.min(birdPos.z, obstacleBox.max.z));
              
              // Вычисляем расстояние от центра птички до ближайшей точки
              const distanceSq = birdPos.distanceToSquared(closestPoint);
              
              // Столкновение, если расстояние меньше радиуса птички
              // Используем полный birdRadius для соответствия хитбокса визуальному телу
              const collisionRadius = birdRadius;
              if (distanceSq < collisionRadius * collisionRadius) {
                isGameOver = true;
                // Включаем контролы камеры для осмотра места смерти
                if (!controls) {
                  controls = new OrbitControls(camera, renderer.domElement);
                  controls.enableDamping = true;
                  controls.dampingFactor = 0.05;
                  controls.screenSpacePanning = false;
                  controls.minDistance = 3;
                  controls.maxDistance = 20;
                }
                controls.enabled = true;
                controls.target.copy(birdGroup.position);
              }
            }
          });
        }
        
        // Обновляем цель контролов если они активны (для плавного слежения во время игры)
        if (controls && controls.enabled) {
          controls.target.lerp(birdGroup.position, 0.1);
        }
        
        // Наклон: взлетает — смотрит вверх (-45°), падает — вниз (+45°)
        const speedThreshold = 0.5;
        let targetRotX = 0;
        if (birdVelocityY > speedThreshold) {
          targetRotX = THREE.MathUtils.degToRad(-45);
        } else if (birdVelocityY < -speedThreshold) {
          targetRotX = THREE.MathUtils.degToRad(45);
        }
        birdGroup.rotation.x += (targetRotX - birdGroup.rotation.x) * Math.min(rotationLerpSpeed * delta, 1);
        
        // Анимация крыльев (махи большими крыльями)
        wingAngle += delta * wingFlapSpeed;
        const flapValue = Math.sin(wingAngle) * 0.9;
        leftWing.rotation.x = 0.35 + flapValue * 0.7;
        rightWing.rotation.x = 0.35 + flapValue * 0.7;
        leftWing.rotation.z = -0.35 + flapValue * 0.1;
        rightWing.rotation.z = 0.35 - flapValue * 0.1;
      }
      
      // Камера следует за птичкой (только если контролы не активны)
      if (!controls || !controls.enabled) {
        const viewMode = viewModes[currentViewMode];
        // Для вида от первого лица камера на клюве и полностью повторяет движения птицы
        if (currentViewMode === 'firstPerson') {
          // Позиция камеры: позиция птички + смещение к клюву
          camera.position.set(
            birdGroup.position.x + viewMode.offsetX,
            birdGroup.position.y + viewMode.offsetY,
            birdGroup.position.z + viewMode.offsetZ
          );
          
          // Направление взгляда: берём направление вперёд птички и применяем её повороты
          const lookAtDistance = 10;
          const lookAtX = birdGroup.position.x + Math.sin(birdGroup.rotation.y) * lookAtDistance;
          const lookAtY = birdGroup.position.y + viewMode.offsetY + Math.sin(-birdGroup.rotation.x) * lookAtDistance;
          const lookAtZ = birdGroup.position.z + Math.cos(birdGroup.rotation.y) * lookAtDistance;
          camera.lookAt(lookAtX, lookAtY, lookAtZ);
        } else {
          const targetCamX = birdGroup.position.z * 0 + viewMode.offsetX;
          const targetCamY = birdGroup.position.y + viewMode.offsetY;
          const targetCamZ = birdGroup.position.z + viewMode.offsetZ;
          
          camera.position.x += (targetCamX - camera.position.x) * Math.min(cameraLerpSpeed * delta, 1);
          camera.position.y += (targetCamY - camera.position.y) * Math.min(cameraLerpSpeed * delta, 1);
          camera.position.z += (targetCamZ - camera.position.z) * Math.min(cameraLerpSpeed * delta, 1);
          camera.lookAt(birdGroup.position.x, birdGroup.position.y + 0.6, birdGroup.position.z);
        }
      } else if (controls && controls.enabled) {
        // Если контролы активны, просто обновляем их target и сами контролы
        controls.target.copy(birdGroup.position);
        // controls.update() вызывается ниже после всех проверок
      }
      
      // Обновляем позицию меню выбора камеры, чтобы оно всегда было перед камерой
      if (!gameStarted && viewSelectorDiv.style.display !== 'none') {
        // Меню остаётся на месте в центре экрана (позиция задаётся через CSS)
        // CSS2DObject автоматически проецирует 3D координаты на экран
        // Позиционируем меню так, чтобы оно было в центре экрана
        viewSelectorLabel.position.copy(camera.position);
        viewSelectorLabel.lookAt(camera.position.clone().add(new THREE.Vector3(0, 0, -1)));
      }
      
      // Обновляем контролы в конце кадра (для инерции)
      if (controls && controls.enabled) {
        controls.update();
      }
      
      // Циклическое перемещение облаков и травы вслед за птичкой
      const cycleDistance = 80; // Расстояние, через которое объекты повторяются
      const birdZ = birdGroup.position.z;
      
      // Перемещение сегментов земли (бесконечная земля)
      groundSegments.forEach(segment => {
        if (segment.position.z < birdZ - 60) {
          segment.position.z += numGroundSegments * groundSegmentLength;
        }
      });
      
      // Перемещение облаков (теперь летим в плюс Z, поэтому объекты, которые остались сзади (меньше birdZ), телепортируются вперед)
      clouds.forEach(cloud => {
        if (cloud.position.z < birdZ - 20) {
          cloud.position.z += cycleDistance;
        }
      });
      
      // Перемещение травинок
      grassBlades.forEach(blade => {
        if (blade.position.z < birdZ - 20) {
          blade.position.z += cycleDistance;
        }
      });
      
      // Спавн новых препятствий и перемещение старых
      // Если птичка приблизилась к последнему препятствию, создаём новое
      const lastObstacle = obstacles[obstacles.length - 1];
      if (lastObstacle && birdZ > lastObstacle.position.z - obstacleSpawnInterval) {
        const newObstacleZ = lastObstacle.position.z + obstacleSpawnInterval;
        const newObstacle = createObstacle(newObstacleZ);
        newObstacle.passed = false;
        obstacles.push(newObstacle);
        scene.add(newObstacle);
      }
      
      // Проверяем, пролетела ли птичка мимо препятствия (счёт)
      for (let i = 0; i < obstacles.length; i++) {
        if (!obstacles[i].passed && birdZ > obstacles[i].position.z) {
          obstacles[i].passed = true;
          score++;
        }
      }
      
      // Удаляем препятствия, которые остались далеко позади
      for (let i = obstacles.length - 1; i >= 0; i--) {
        if (obstacles[i].position.z < birdZ - 30) {
          scene.remove(obstacles[i]);
          obstacles.splice(i, 1);
        }
      }
      
      // Отображение сообщения о проигрыше
      const deathHintEl = document.getElementById('death-hint');
      if (isGameOver) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = 'white';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('ИГРА ОКОНЧЕНА', canvas.width / 2, canvas.height / 2 - 30);
        
        ctx.font = '24px Arial';
        ctx.fillText('Нажмите ПРОБЕЛ для рестарта', canvas.width / 2, canvas.height / 2 + 30);
        
        // Показываем подсказку про управление камерой
        deathHintEl.style.display = 'block';
      } else {
        // Скрываем подсказку когда игра активна
        deathHintEl.style.display = 'none';
        
        // Очищаем холст перед отрисовкой счёта
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Отображаем счёт
        ctx.fillStyle = 'white';
        ctx.font = 'bold 36px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Счёт: ' + score, canvas.width / 2, 50);
      }
      
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
      
      requestAnimationFrame(animate);
    }

    // Создаём canvas для отображения сообщений
    const canvas = document.createElement('canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.position = 'absolute';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.pointerEvents = 'none';
    canvas.style.zIndex = '50';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    
    // Обновляем размер canvas при ресайзе
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();

    console.log('🐣 Птичка готова! Хвост сделан веером.');
  </script>
</body>
</html>
