<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Круглая птичка • Управление пробелом</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
    }
    #info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 14px;
      letter-spacing: 1px;
      pointer-events: none;
      backdrop-filter: blur(5px);
    }
    #hint {
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div id="info">🐥 КРУГЛАЯ ПТИЧКА • вид сзади</div>
  <div id="hint">␣ ПРОБЕЛ: лететь вверх</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { CSS2DRenderer } from 'three/addons/renderers/CSS2DRenderer.js';

    // ==================== НАСТРОЙКИ СЦЕНЫ ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xa0d8ef);
    scene.fog = new THREE.Fog(0xa0d8ef, 15, 60);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.5, 200);
    camera.position.set(0, 4.3, -6.5);
    camera.lookAt(0, 1.5, 0);

    const renderer = new THREE.WebGLRenderer({ 
      antialias: true,
      powerPreference: "high-performance"
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    // ==================== ОСВЕЩЕНИЕ ====================
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    
    const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
    sunLight.position.set(10, 20, 5);
    sunLight.castShadow = true;
    sunLight.receiveShadow = true;
    sunLight.shadow.mapSize.width = 1024;
    sunLight.shadow.mapSize.height = 1024;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 80;
    sunLight.shadow.camera.left = -20;
    sunLight.shadow.camera.right = 20;
    sunLight.shadow.camera.top = 20;
    sunLight.shadow.camera.bottom = -20;
    sunLight.shadow.bias = -0.0005;
    scene.add(sunLight);
    
    const fillLight = new THREE.DirectionalLight(0xccddff, 0.6);
    fillLight.position.set(-5, 0, -5);
    scene.add(fillLight);

    // ==================== ЗЕМЛЯ ====================
    const groundGeometry = new THREE.PlaneGeometry(60, 60);
    const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x7cb342, roughness: 0.9 });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -2.8;
    ground.receiveShadow = true;
    scene.add(ground);
    
    for (let i = 0; i < 60; i++) {
      const blade = new THREE.Mesh(
        new THREE.ConeGeometry(0.08, 0.3, 4),
        new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.7 })
      );
      blade.position.x = (Math.random() - 0.5) * 25;
      blade.position.z = (Math.random() - 0.5) * 25;
      blade.position.y = -2.65;
      blade.castShadow = true;
      blade.receiveShadow = true;
      scene.add(blade);
    }

    // ==================== СОЗДАНИЕ КРУГЛОЙ ПТИЧКИ ====================
    const birdGroup = new THREE.Group();
    birdGroup.position.set(0, 1.5, 0);
    
    // Тело
    const bodyGeometry = new THREE.SphereGeometry(0.9, 32, 32);
    const bodyMaterial = new THREE.MeshStandardMaterial({ 
      color: 0xffcc00, 
      roughness: 0.3,
      metalness: 0.1,
    });
    const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
    body.castShadow = true;
    body.receiveShadow = true;
    birdGroup.add(body);

    // Глаза
    function createEye(xOffset, yOffset, zOffset) {
      const eyeGroup = new THREE.Group();
      const whitePart = new THREE.Mesh(
        new THREE.SphereGeometry(0.22, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 })
      );
      whitePart.castShadow = true;
      whitePart.receiveShadow = true;
      eyeGroup.add(whitePart);
      
      const pupil = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 })
      );
      pupil.position.set(0, 0, 0.18);
      pupil.castShadow = true;
      pupil.receiveShadow = true;
      eyeGroup.add(pupil);
      
      const highlight = new THREE.Mesh(
        new THREE.SphereGeometry(0.05, 4, 4),
        new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1, emissive: new THREE.Color(0xffffff) })
      );
      highlight.position.set(0.06, 0.07, 0.2);
      eyeGroup.add(highlight);
      
      eyeGroup.position.set(xOffset, yOffset, zOffset);
      return eyeGroup;
    }
    
    birdGroup.add(createEye(-0.35, 0.25, 0.75));
    birdGroup.add(createEye(0.35, 0.25, 0.75));

    // Щёчки
    function createCheek(xOffset, yOffset, zOffset) {
      const cheek = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0xff9999, roughness: 0.4 })
      );
      cheek.position.set(xOffset, yOffset, zOffset);
      cheek.castShadow = true;
      cheek.receiveShadow = true;
      return cheek;
    }
    birdGroup.add(createCheek(-0.45, -0.1, 0.8));
    birdGroup.add(createCheek(0.45, -0.1, 0.8));

    // Клюв
    const beakGeometry = new THREE.ConeGeometry(0.2, 0.6, 8);
    const beakMaterial = new THREE.MeshStandardMaterial({ color: 0xff6600, roughness: 0.4 });
    const beak = new THREE.Mesh(beakGeometry, beakMaterial);
    beak.position.set(0, 0.0, 1.05);
    beak.rotation.x = Math.PI / 2;
    beak.castShadow = true;
    beak.receiveShadow = true;
    birdGroup.add(beak);
    
    const lowerBeak = new THREE.Mesh(
      new THREE.ConeGeometry(0.15, 0.35, 6),
      new THREE.MeshStandardMaterial({ color: 0xff8800, roughness: 0.4 })
    );
    lowerBeak.position.set(0, -0.12, 1.0);
    lowerBeak.rotation.x = Math.PI / 2;
    lowerBeak.castShadow = true;
    lowerBeak.receiveShadow = true;
    birdGroup.add(lowerBeak);

    // Крылья
    function createWing(side) {
      const wingGroup = new THREE.Group();
      const wingMain = new THREE.Mesh(
        new THREE.SphereGeometry(0.45, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.3, metalness: 0.1 })
      );
      wingMain.scale.set(0.5, 0.25, 0.8);
      wingMain.castShadow = true;
      wingMain.receiveShadow = true;
      wingGroup.add(wingMain);
      
      const feather = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0xffbb22, roughness: 0.3 })
      );
      feather.scale.set(0.4, 0.15, 0.5);
      feather.position.set(0, -0.08, 0.45);
      feather.castShadow = true;
      feather.receiveShadow = true;
      wingGroup.add(feather);
      
      wingGroup.position.set(side * 0.9, 0.25, 0.1);
      wingGroup.rotation.x = 0.3;
      wingGroup.rotation.z = side * 0.4;
      wingGroup.rotation.y = side * 0.2;
      return wingGroup;
    }
    
    const leftWing = createWing(-1);
    const rightWing = createWing(1);
    birdGroup.add(leftWing);
    birdGroup.add(rightWing);

    // Хвост
    const tailGeometry = new THREE.ConeGeometry(0.25, 0.6, 6);
    const tailMaterial = new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.4 });
    const tail = new THREE.Mesh(tailGeometry, tailMaterial);
    tail.position.set(0, 0.05, -0.85);
    tail.rotation.x = -Math.PI / 2;
    tail.castShadow = true;
    tail.receiveShadow = true;
    birdGroup.add(tail);
    
    for (let i = -1; i <= 1; i+=2) {
      const smallFeather = new THREE.Mesh(
        new THREE.ConeGeometry(0.18, 0.45, 5),
        new THREE.MeshStandardMaterial({ color: 0xffbb33, roughness: 0.4 })
      );
      smallFeather.position.set(i * 0.22, -0.05, -0.9);
      smallFeather.rotation.x = -Math.PI / 2 + i * 0.3;
      smallFeather.rotation.z = i * 0.5;
      smallFeather.castShadow = true;
      smallFeather.receiveShadow = true;
      birdGroup.add(smallFeather);
    }

    scene.add(birdGroup);

    // ==================== ОБЛАКА ====================
    function createCloud(x, y, z) {
      const cloudGroup = new THREE.Group();
      const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8, transparent: true, opacity: 0.85 });
      const positions = [
        [0, 0, 0], [0.6, 0.2, 0.1], [-0.5, 0.1, -0.1], [0.3, 0.4, 0.3], [-0.3, -0.2, 0.2], [0.1, -0.3, -0.2]
      ];
      positions.forEach(pos => {
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.4 + Math.random()*0.3, 7), whiteMat);
        sphere.position.set(pos[0], pos[1], pos[2]);
        cloudGroup.add(sphere);
      });
      cloudGroup.position.set(x, y, z);
      return cloudGroup;
    }
    
    for (let i = 0; i < 30; i++) {
      const cloud = createCloud(
        (Math.random() - 0.5) * 45,
        4 + Math.random() * 8,
        (Math.random() - 0.5) * 40
      );
      scene.add(cloud);
    }

    // ==================== ФИЗИКА И УПРАВЛЕНИЕ ====================
    const gravity = -12.0;          // ускорение падения
    const flapStrength = 7.5;       // сила подъёма при нажатии пробела
    const maxFallSpeed = -8.0;      // максимальная скорость падения
    const groundLevel = -2.8;
    const birdRadius = 0.9;         // для ограничения столкновения с землёй
    const minY = groundLevel + birdRadius + 0.05; // примерно -1.85
    
    let birdVelocityY = 0;
    let isFlapping = false;         // true, пока зажат пробел
    
    // Обработчики клавиш
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        isFlapping = true;
      }
    });
    
    window.addEventListener('keyup', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        isFlapping = false;
      }
    });
    
    // Потеря фокуса – сброс флага, чтобы птичка не зависла в воздухе
    window.addEventListener('blur', () => {
      isFlapping = false;
    });

    // ==================== АНИМАЦИЯ ====================
    let wingAngle = 0;
    const wingFlapSpeed = 9;
    const clock = new THREE.Clock();
    
    // Параметры камеры
    const cameraOffsetY = 2.8;   // смещение камеры по Y относительно птички
    const cameraZ = -6.5;
    const cameraX = 0;
    const cameraLerpSpeed = 8.0; // плавность следования камеры

    function animate() {
      const delta = Math.min(clock.getDelta(), 0.1);
      
      // --- Физика птички ---
      if (isFlapping) {
        // При нажатом пробеле добавляем тягу вверх
        birdVelocityY += flapStrength * delta;
        // Немного ограничим максимальную скорость вверх (опционально)
        if (birdVelocityY > 12.0) birdVelocityY = 12.0;
      } else {
        // Гравитация
        birdVelocityY += gravity * delta;
        if (birdVelocityY < maxFallSpeed) birdVelocityY = maxFallSpeed;
      }
      
      // Обновляем позицию птички
      birdGroup.position.y += birdVelocityY * delta;
      
      // Столкновение с землёй
      if (birdGroup.position.y <= minY) {
        birdGroup.position.y = minY;
        birdVelocityY = 0;
      }
      
      // Ограничение сверху (чтобы не улетела слишком высоко)
      if (birdGroup.position.y > 10.0) {
        birdGroup.position.y = 10.0;
        birdVelocityY = 0;
      }
      
      // --- Анимация крыльев ---
      wingAngle += delta * wingFlapSpeed;
      const flapValue = Math.sin(wingAngle) * 0.9;
      leftWing.rotation.x = 0.3 + flapValue * 0.8;
      rightWing.rotation.x = 0.3 + flapValue * 0.8;
      leftWing.rotation.z = -0.4 + flapValue * 0.15;
      rightWing.rotation.z = 0.4 - flapValue * 0.15;
      
      // --- Камера следует за птичкой по высоте ---
      const targetCamY = birdGroup.position.y + cameraOffsetY;
      camera.position.y += (targetCamY - camera.position.y) * Math.min(cameraLerpSpeed * delta, 1);
      // X и Z остаются фиксированными
      camera.position.x = cameraX;
      camera.position.z = cameraZ;
      
      // Камера смотрит на птичку (точка чуть выше центра)
      camera.lookAt(0, birdGroup.position.y + 0.6, 0);
      
      // Рендер
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
      
      requestAnimationFrame(animate);
    }

    animate();

    // ==================== РЕСАЙЗ ====================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    console.log('🐣 Птичка готова! Пробел – взлететь, отпустить – падать.');
  </script>
</body>
</html>
