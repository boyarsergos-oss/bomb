<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Птичка</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Сцена
        const scene = new THREE.Scene();
        
        // Камера
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);
        
        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // Свет
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);
        
        // Круглая птичка (сфера)
        const birdGeometry = new THREE.SphereGeometry(0.5, 32, 32);
        const birdMaterial = new THREE.MeshPhongMaterial({ color: 0xFFD700 });
        const bird = new THREE.Mesh(birdGeometry, birdMaterial);
        scene.add(bird);
        
        // Клюв (конус)
        const beakGeometry = new THREE.ConeGeometry(0.15, 0.3, 8);
        const beakMaterial = new THREE.MeshPhongMaterial({ color: 0xFF6600 });
        const beak = new THREE.Mesh(beakGeometry, beakMaterial);
        beak.rotation.x = Math.PI / 2;
        beak.position.set(0, 0, 0.5);
        bird.add(beak);
        
        // Глаза
        const eyeGeometry = new THREE.SphereGeometry(0.08, 16, 16);
        const eyeMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });
        
        const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        leftEye.position.set(-0.2, 0.15, 0.4);
        bird.add(leftEye);
        
        const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        rightEye.position.set(0.2, 0.15, 0.4);
        bird.add(rightEye);
        
        // Земля
        const groundGeometry = new THREE.PlaneGeometry(20, 20);
        const groundMaterial = new THREE.MeshPhongMaterial({ color: 0x90EE90 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -1.5;
        scene.add(ground);
        
        // Анимация
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.03;
            
            // Плавное движение птички по кругу
            bird.position.x = Math.sin(time) * 2;
            bird.position.z = Math.cos(time) * 2;
            bird.position.y = Math.sin(time * 2) * 0.3;
            
            // Птичка всегда смотрит в направлении движения
            bird.lookAt(
                Math.sin(time + 0.1) * 2,
                Math.sin((time + 0.1) * 2) * 0.3,
                Math.cos(time + 0.1) * 2
            );
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Обработка изменения размера окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
