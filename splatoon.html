<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splatoon Battle - 4 Teams</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }
        
        #gameCanvas {
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        .sidebar {
            color: white;
            min-width: 250px;
        }
        
        .team-score {
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .team-score.player {
            border: 3px solid #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        
        .controls {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        .controls h3 {
            margin-bottom: 10px;
        }
        
        .controls p {
            margin: 5px 0;
            font-size: 14px;
        }
        
        .timer {
            font-size: 24px;
            text-align: center;
            margin: 20px 0;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 100;
        }
        
        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        .restart-btn {
            padding: 15px 40px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .restart-btn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="sidebar">
            <h2 style="text-align: center; margin-bottom: 20px;">🎨 Splatoon Battle</h2>
            <div class="timer" id="timer">Время: 180</div>
            
            <div class="team-score player" id="score0" style="background: rgba(255, 100, 100, 0.3);">
                🔴 Красная команда (Игрок): <span id="percent0">25.0</span>%
            </div>
            <div class="team-score" id="score1" style="background: rgba(100, 100, 255, 0.3);">
                🔵 Синяя команда: <span id="percent1">25.0</span>%
            </div>
            <div class="team-score" id="score2" style="background: rgba(100, 255, 100, 0.3);">
                🟢 Зелёная команда: <span id="percent2">25.0</span>%
            </div>
            <div class="team-score" id="score3" style="background: rgba(255, 255, 100, 0.3);">
                🟡 Жёлтая команда: <span id="percent3">25.0</span>%
            </div>
            
            <div class="controls">
                <h3>🎮 Управление</h3>
                <p><strong>WASD</strong> или <strong>Стрелки</strong> - Движение</p>
                <p><strong>ЛКМ</strong> - Стрелять краской</p>
                <p><strong>Пробел</strong> - Рывок</p>
            </div>
        </div>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2 id="winnerText">Игра окончена!</h2>
        <div id="finalScores"></div>
        <button class="restart-btn" onclick="restartGame()">Играть снова</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Команды
        const TEAMS = [
            { id: 0, name: 'Красная', color: '#FF6464', isPlayer: true },
            { id: 1, name: 'Синяя', color: '#6464FF', isPlayer: false },
            { id: 2, name: 'Зелёная', color: '#64FF64', isPlayer: false },
            { id: 3, name: 'Жёлтая', color: '#FFFF64', isPlayer: false }
        ];
        
        // Игровые константы
        const GAME_DURATION = 180; // секунды
        const PLAYER_SPEED = 4;
        const DASH_SPEED = 8;
        const BULLET_SPEED = 8;
        const BULLET_RADIUS = 8;
        const PAINT_SPREAD = 25;
        const PLAYER_RADIUS = 15;
        
        let gameRunning = true;
        let timeLeft = GAME_DURATION;
        let lastTime = Date.now();
        
        // Карта (территория)
        let territory = [];
        for (let y = 0; y < canvas.height; y += 4) {
            territory[y] = [];
            for (let x = 0; x < canvas.width; x += 4) {
                territory[y][x] = Math.floor(Math.random() * 4); // Начальное распределение
            }
        }
        
        // Игрок
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            team: 0,
            vx: 0,
            vy: 0,
            isDashing: false,
            dashCooldown: 0
        };
        
        // Боты
        const bots = [];
        for (let i = 0; i < 12; i++) {
            bots.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                team: (i % 3) + 1, // Боты в командах 1-3
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                shootTimer: 0,
                changeDirTimer: 0
            });
        }
        
        // Пули/краска
        let bullets = [];
        
        // Управление
        const keys = {};
        let mouseX = 0;
        let mouseY = 0;
        let mouseDown = false;
        
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') {
                player.isDashing = true;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            if (e.code === 'Space') {
                player.isDashing = false;
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        
        canvas.addEventListener('mousedown', () => mouseDown = true);
        canvas.addEventListener('mouseup', () => mouseDown = false);
        
        // Обновление территории
        function updateTerritory(x, y, team, radius) {
            const startX = Math.max(0, Math.floor((x - radius) / 4));
            const endX = Math.min(canvas.width / 4, Math.ceil((x + radius) / 4));
            const startY = Math.max(0, Math.floor((y - radius) / 4));
            const endY = Math.min(canvas.height / 4, Math.ceil((y + radius) / 4));
            
            for (let py = startY; py < endY; py++) {
                for (let px = startX; px < endX; px++) {
                    const dist = Math.sqrt(Math.pow(px * 4 + 2 - x, 2) + Math.pow(py * 4 + 2 - y, 2));
                    if (dist < radius) {
                        territory[py * 4][px * 4] = team;
                    }
                }
            }
        }
        
        // Подсчёт процентов
        function calculateScores() {
            const counts = [0, 0, 0, 0];
            let total = 0;
            
            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    counts[territory[y][x]]++;
                    total++;
                }
            }
            
            return counts.map(c => ((c / total) * 100).toFixed(1));
        }
        
        // Отрисовка территории
        function drawTerritory() {
            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    ctx.fillStyle = TEAMS[territory[y][x]].color;
                    ctx.fillRect(x, y, 4, 4);
                }
            }
        }
        
        // Отрисовка игрока
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Тело
            ctx.beginPath();
            ctx.arc(0, 0, PLAYER_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = TEAMS[player.team].color;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Направление взгляда
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            ctx.rotate(angle);
            
            // Оружие
            ctx.fillStyle = '#333';
            ctx.fillRect(10, -5, 20, 10);
            
            ctx.restore();
            
            // Индикатор игрока
            ctx.beginPath();
            ctx.arc(player.x, player.y, PLAYER_RADIUS + 5, 0, Math.PI * 2);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        // Отрисовка ботов
        function drawBots() {
            bots.forEach(bot => {
                ctx.beginPath();
                ctx.arc(bot.x, bot.y, PLAYER_RADIUS - 3, 0, Math.PI * 2);
                ctx.fillStyle = TEAMS[bot.team].color;
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }
        
        // Отрисовка пуль
        function drawBullets() {
            bullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, BULLET_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = TEAMS[bullet.team].color;
                ctx.fill();
                
                // Блеск
                ctx.beginPath();
                ctx.arc(bullet.x - 2, bullet.y - 2, BULLET_RADIUS / 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();
            });
        }
        
        // Обновление игрока
        function updatePlayer() {
            let speed = player.isDashing && player.dashCooldown <= 0 ? DASH_SPEED : PLAYER_SPEED;
            
            if (player.isDashing && player.dashCooldown <= 0) {
                player.dashCooldown = 60; // 1 секунда кулдаун
            }
            
            if (player.dashCooldown > 0) {
                player.dashCooldown--;
            }
            
            player.vx = 0;
            player.vy = 0;
            
            if (keys['KeyW'] || keys['ArrowUp']) player.vy = -speed;
            if (keys['KeyS'] || keys['ArrowDown']) player.vy = speed;
            if (keys['KeyA'] || keys['ArrowLeft']) player.vx = -speed;
            if (keys['KeyD'] || keys['ArrowRight']) player.vx = speed;
            
            player.x += player.vx;
            player.y += player.vy;
            
            // Границы
            player.x = Math.max(PLAYER_RADIUS, Math.min(canvas.width - PLAYER_RADIUS, player.x));
            player.y = Math.max(PLAYER_RADIUS, Math.min(canvas.height - PLAYER_RADIUS, player.y));
            
            // Стрельба
            if (mouseDown) {
                const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
                bullets.push({
                    x: player.x,
                    y: player.y,
                    vx: Math.cos(angle) * BULLET_SPEED,
                    vy: Math.sin(angle) * BULLET_SPEED,
                    team: player.team,
                    life: 60
                });
            }
            
            // Захват территории
            updateTerritory(player.x, player.y, player.team, PAINT_SPREAD);
        }
        
        // Обновление ботов
        function updateBots() {
            bots.forEach(bot => {
                bot.changeDirTimer--;
                if (bot.changeDirTimer <= 0) {
                    bot.changeDirTimer = 30 + Math.random() * 60;
                    const angle = Math.random() * Math.PI * 2;
                    bot.vx = Math.cos(angle) * 2;
                    bot.vy = Math.sin(angle) * 2;
                }
                
                bot.x += bot.vx;
                bot.y += bot.vy;
                
                // Границы
                if (bot.x < PLAYER_RADIUS || bot.x > canvas.width - PLAYER_RADIUS) bot.vx *= -1;
                if (bot.y < PLAYER_RADIUS || bot.y > canvas.height - PLAYER_RADIUS) bot.vy *= -1;
                
                bot.x = Math.max(PLAYER_RADIUS, Math.min(canvas.width - PLAYER_RADIUS, bot.x));
                bot.y = Math.max(PLAYER_RADIUS, Math.min(canvas.height - PLAYER_RADIUS, bot.y));
                
                // Стрельба
                bot.shootTimer--;
                if (bot.shootTimer <= 0) {
                    bot.shootTimer = 20 + Math.random() * 30;
                    const target = bot.team === 1 ? player : bots[Math.floor(Math.random() * bots.length)];
                    const angle = Math.atan2(target.y - bot.y, target.x - bot.x);
                    bullets.push({
                        x: bot.x,
                        y: bot.y,
                        vx: Math.cos(angle) * BULLET_SPEED * 0.7,
                        vy: Math.sin(angle) * BULLET_SPEED * 0.7,
                        team: bot.team,
                        life: 60
                    });
                }
                
                // Захват территории
                updateTerritory(bot.x, bot.y, bot.team, PAINT_SPREAD * 0.5);
            });
        }
        
        // Обновление пуль
        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                bullet.life--;
                
                // Захват территории при попадании
                updateTerritory(bullet.x, bullet.y, bullet.team, BULLET_RADIUS);
                
                if (bullet.life <= 0 || 
                    bullet.x < 0 || bullet.x > canvas.width ||
                    bullet.y < 0 || bullet.y > canvas.height) {
                    bullets.splice(i, 1);
                }
            }
        }
        
        // Обновление UI
        function updateUI() {
            const scores = calculateScores();
            for (let i = 0; i < 4; i++) {
                document.getElementById(`percent${i}`).textContent = scores[i];
            }
            
            document.getElementById('timer').textContent = `Время: ${timeLeft}`;
        }
        
        // Проверка окончания игры
        function checkGameOver() {
            if (timeLeft <= 0) {
                gameRunning = false;
                const scores = calculateScores();
                const maxScore = Math.max(...scores);
                const winnerIndex = scores.indexOf(maxScore);
                const winner = TEAMS[winnerIndex];
                
                const gameOverDiv = document.getElementById('gameOver');
                const winnerText = document.getElementById('winnerText');
                const finalScores = document.getElementById('finalScores');
                
                if (winner.isPlayer) {
                    winnerText.textContent = '🏆 ПОБЕДА! Ваша команда победила!';
                    winnerText.style.color = '#4CAF50';
                } else {
                    winnerText.textContent = `💀 Поражение! Победила ${winner.name} команда!`;
                    winnerText.style.color = '#FF6464';
                }
                
                finalScores.innerHTML = TEAMS.map((t, i) => 
                    `<p style="color: ${t.color}; font-size: 18px;">${t.name}: ${scores[i]}%</p>`
                ).join('');
                
                gameOverDiv.style.display = 'block';
            }
        }
        
        // Игровой цикл
        function gameLoop() {
            if (!gameRunning) return;
            
            // Очистка
            ctx.fillStyle = '#2a2a3e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Обновление
            const now = Date.now();
            if (now - lastTime >= 1000) {
                timeLeft--;
                lastTime = now;
                checkGameOver();
            }
            
            updatePlayer();
            updateBots();
            updateBullets();
            updateUI();
            
            // Отрисовка
            drawTerritory();
            drawBullets();
            drawBots();
            drawPlayer();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Перезапуск игры
        function restartGame() {
            gameRunning = true;
            timeLeft = GAME_DURATION;
            lastTime = Date.now();
            bullets = [];
            
            // Сброс территории
            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    territory[y][x] = Math.floor(Math.random() * 4);
                }
            }
            
            // Сброс игрока
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            
            // Сброс ботов
            bots.forEach(bot => {
                bot.x = Math.random() * canvas.width;
                bot.y = Math.random() * canvas.height;
            });
            
            document.getElementById('gameOver').style.display = 'none';
            gameLoop();
        }
        
        // Старт игры
        gameLoop();
    </script>
</body>
</html>
